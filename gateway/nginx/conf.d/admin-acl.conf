# admin-acl.conf — RFC-1918 IP allow-list for admin/portal/audit/compliance paths.
#
# Nginx location blocks use inline allow/deny directives (not this geo variable)
# because Nginx allow/deny are evaluated before if{} and proxy_pass, making them
# the most reliable mechanism. This geo map is kept for documentation and for any
# future use (e.g. if() guards in auth-bypass scenarios), but the enforcing
# mechanism is the explicit allow/deny in the relevant location blocks.
#
# Protected paths: /admin, /portal, /api/v1/audit/, /api/v1/compliance/,
#                  /api/v1/admin/ (see mcp-proxy.conf).

geo $admin_allowed {
    default          0;
    127.0.0.0/8      1;   # loopback
    10.0.0.0/8       1;   # RFC-1918 class A
    172.16.0.0/12    1;   # RFC-1918 class B (Docker bridge ranges)
    192.168.0.0/16   1;   # RFC-1918 class C
}

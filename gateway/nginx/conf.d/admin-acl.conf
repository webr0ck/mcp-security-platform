# admin-acl.conf — RFC-1918 allow map for admin panel restriction.
# Include this file at http{} level (before any server{} blocks) via nginx.conf
# or via conf.d/ inclusion — conf.d/*.conf is included inside the http{} block
# in nginx.conf, so geo{} here lands correctly in http{} context.
#
# The $admin_allowed variable is referenced by allow/deny in /admin and /portal
# location blocks in mcp-proxy.conf.

geo $admin_allowed {
    default          0;
    127.0.0.0/8      1;   # loopback
    10.0.0.0/8       1;   # RFC-1918 class A
    172.16.0.0/12    1;   # RFC-1918 class B (Docker bridge ranges)
    192.168.0.0/16   1;   # RFC-1918 class C
}

# mcp-proxy.conf — MCP Security Platform virtual host configuration
# TLS 1.3 only. mTLS enforced on /api/v1/tools/ (INV-009).
# Secrets (cert paths, CA cert) come from mounted step-ca-data volume.
# Never hardcode any credential or secret value in this file (INV-008).

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Return 301 for all HTTP traffic; clients must use HTTPS
    return 301 https://$host$request_uri;
}

# ─── HTTPS vhost ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # -------------------------------------------------------------------------
    # TLS certificate and key (issued by step-ca, mounted from step-ca-data)
    # The gateway service obtains its own server cert from step-ca at startup.
    # Path convention matches the step-ca-data volume mount in docker-compose.yml.
    # -------------------------------------------------------------------------
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # CA certificate — used to verify client certs in mTLS blocks
    ssl_client_certificate /etc/nginx/certs/ca.crt;

    # Default: do NOT require client cert for all paths (API key clients exist)
    # mTLS is opt-in per-location (see /api/v1/tools/ block below)
    ssl_verify_client optional;

    # -------------------------------------------------------------------------
    # Security response headers (apply to all responses)
    # -------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    add_header X-Request-Id $request_id always;

    # Remove headers that leak upstream info
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # -------------------------------------------------------------------------
    # Common proxy settings (applied to all proxy_pass locations)
    # -------------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id      $request_id;

    # Forward the mTLS client cert CN to the proxy so it can resolve identity
    # (proxy trusts this header only because it originates from Nginx, not the internet)
    proxy_set_header X-Client-Cert-CN  $ssl_client_s_dn_cn;

    # Timeouts: generous enough for LLM risk scoring, tight enough to prevent slowloris
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    30s;

    # =========================================================================
    # /api/v1/tools/ — mTLS REQUIRED (INV-009)
    # This location block mandates a valid client certificate issued by step-ca.
    # Unauthenticated requests (no cert, invalid cert) are rejected with 401
    # at the gateway layer, before reaching the proxy application.
    # =========================================================================
    location /api/v1/tools/ {
        # Require a valid client certificate — reject if absent or invalid
        if ($ssl_client_verify != SUCCESS) {
            # 401 so the client knows to present a cert (not a generic 403)
            return 401 '{"error":"client_certificate_required","message":"mTLS client certificate required for this endpoint"}';
        }

        # Rate limit: per client CN, 2 req/s with a small burst for retries
        limit_req zone=agent burst=5 nodelay;

        # Specifically block direct invocation without mTLS (belt-and-suspenders)
        # The proxy's auth middleware is the second gate (INV-009 defense in depth)

        proxy_pass http://proxy:8000;
    }

    # =========================================================================
    # /api/ — All other API paths (API key or OIDC JWT authentication)
    # No mTLS required here; authentication is handled by the proxy middleware.
    # Rate limited per source IP (not per cert CN).
    # =========================================================================
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://proxy:8000;
    }

    # =========================================================================
    # /health — Gateway-level health endpoint (no auth, for load balancer probes)
    # =========================================================================
    location /health {
        # Deny any external access from non-RFC1918 addresses in prod
        # (load balancer probes will come from internal addresses)
        access_log off;
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # =========================================================================
    # Grafana UI (proxy_pass to Grafana on internal observability-net)
    # Grafana is exposed through Nginx so it sits behind TLS and security headers.
    # =========================================================================
    location /grafana/ {
        # Grafana is not on gateway-net by default in dev; this block is
        # populated in production where grafana joins gateway-net.
        # Grafana's root_url must be set to https://<host>/grafana/
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
    }

    # =========================================================================
    # Catch-all: return 404 for any unrecognised path
    # =========================================================================
    location / {
        return 404 '{"error":"not_found"}';
        add_header Content-Type application/json;
    }

    # -------------------------------------------------------------------------
    # ModSecurity — MCP JSON-RPC specific rules
    # modsecurity is already enabled at the http block level in nginx.conf.
    # The modsecurity_rules_file here loads our CUSTOM MCP rules in addition to
    # the OWASP CRS base rules loaded by the image's /etc/modsecurity.d/modsec_includes.conf.
    # Nginx ModSecurity loads rules files cumulatively per server context.
    # -------------------------------------------------------------------------
    modsecurity on;
    modsecurity_rules_file /etc/modsecurity.d/custom/mcp-jsonrpc-rules.conf;
    # Note: The owasp/modsecurity-crs image pre-configures CRS via modsec_includes.conf
    # at the http level. Our custom rules extend (not replace) the base CRS ruleset.
}

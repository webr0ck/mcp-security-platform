# mcp-proxy.conf — MCP Security Platform virtual host configuration
# TLS 1.3 only. mTLS enforced on /api/v1/tools/ (INV-009).
# Secrets (cert paths, CA cert) come from mounted step-ca-data volume.
# Never hardcode any credential or secret value in this file (INV-008).

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Return 301 for all HTTP traffic; clients must use HTTPS
    return 301 https://$host$request_uri;
}

# ─── HTTPS vhost ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # -------------------------------------------------------------------------
    # TLS certificate and key (issued by step-ca, mounted from step-ca-data)
    # The gateway service obtains its own server cert from step-ca at startup.
    # Path convention matches the step-ca-data volume mount in docker-compose.yml.
    # -------------------------------------------------------------------------
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # CA certificate — used to verify client certs in mTLS blocks
    ssl_client_certificate /etc/nginx/certs/ca.crt;

    # Default: do NOT require client cert for all paths (API key clients exist)
    # mTLS is opt-in per-location (see /api/v1/tools/ block below)
    ssl_verify_client optional;

    # -------------------------------------------------------------------------
    # Security response headers (apply to all responses)
    # -------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    add_header X-Request-Id $request_id always;

    # Remove headers that leak upstream info
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # -------------------------------------------------------------------------
    # Common proxy settings (applied to all proxy_pass locations)
    # -------------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id      $request_id;

    # Forward the mTLS client cert CN to the proxy ONLY for the mTLS-required
    # path. For every other path the header is forced to "" so a client cannot
    # spoof their identity by either (a) sending the header directly, or
    # (b) presenting a valid cert (under ssl_verify_client optional) on a
    # non-mTLS path. The proxy treats X-Client-Cert-CN as authoritative, so
    # the gateway is responsible for ensuring it is only populated for paths
    # where the cert is actually required and verified.
    proxy_set_header X-Client-Cert-CN  $client_cert_cn_safe;

    # GW-001: Shared gateway secret so the proxy can trust X-Client-Cert-CN.
    # The proxy's auth.py checks X-Gateway-Secret and denies CN-based auth
    # when this header is missing or wrong (fail-closed when secret is configured).
    # Set GATEWAY_SHARED_SECRET in the environment and generate the include at deploy time:
    #   echo "proxy_set_header X-Gateway-Secret \"$GATEWAY_SHARED_SECRET\";" \
    #        > /etc/nginx/secrets/gateway-secret.conf
    # For lab (GATEWAY_SHARED_SECRET unset in proxy), this include may be empty.
    # NEVER hardcode the secret value in this file (INV-008).
    include /etc/nginx/secrets/gateway-secret.conf;

    # Timeouts: generous enough for LLM risk scoring, tight enough to prevent slowloris
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    30s;

    # =========================================================================
    # /api/v1/tools/ — mTLS REQUIRED (INV-009)
    # This location block mandates a valid client certificate issued by step-ca.
    # Unauthenticated requests (no cert, invalid cert) are rejected with 401
    # at the gateway layer, before reaching the proxy application.
    # =========================================================================
    location /api/v1/tools/ {
        # Require a valid client certificate — reject if absent or invalid
        if ($ssl_client_verify != SUCCESS) {
            # 401 so the client knows to present a cert (not a generic 403)
            return 401 '{"error":"client_certificate_required","message":"mTLS client certificate required for this endpoint"}';
        }

        # Rate limit: per client CN, 2 req/s with a small burst for retries
        limit_req zone=agent burst=5 nodelay;

        # Specifically block direct invocation without mTLS (belt-and-suspenders)
        # The proxy's auth middleware is the second gate (INV-009 defense in depth)

        proxy_pass http://proxy:8000;
    }

    # =========================================================================
    # /api/ — All other API paths (API key or OIDC JWT authentication)
    # No mTLS required here; authentication is handled by the proxy middleware.
    # Rate limited per source IP (not per cert CN).
    # =========================================================================
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://proxy:8000;
    }

    # =========================================================================
    # /health — Gateway-level health endpoint (no auth, for load balancer probes)
    # =========================================================================
    location /health {
        # Deny any external access from non-RFC1918 addresses in prod
        # (load balancer probes will come from internal addresses)
        access_log off;
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # =========================================================================
    # /grafana/ — Grafana dashboard proxy (Standard + POC tiers only)
    # Returns 503 if Grafana service is not running (engine-only tier).
    # =========================================================================
    location /grafana/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://grafana:3000/;
        proxy_intercept_errors on;
        error_page 502 503 504 = @grafana_unavailable;
    }

    location @grafana_unavailable {
        default_type application/json;
        return 503 '{"error":"grafana_not_available","hint":"Grafana is only included in the standard and poc deployment tiers"}';
    }

    # =========================================================================
    # /auth/ — Credential-broker OAuth enrollment + IdP callback (CB-001).
    #
    #   /auth/enroll/{service}   : authenticated by the proxy AuthMiddleware
    #                              (API-key / OIDC). NOT mTLS — so the CN header
    #                              is force-blanked by $client_cert_cn_safe and
    #                              the proxy derives identity from the bearer.
    #   /auth/callback/{service} : the IdP redirects the user's browser here
    #                              with no client credential. Identity is NOT
    #                              taken from any header — it is recovered from
    #                              the single-use server-side nonce minted at
    #                              /auth/enroll. The header stays blanked here
    #                              too, defeating the F-001/CB-001 spoof.
    # =========================================================================
    location /auth/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://proxy:8000;
    }

    # =========================================================================
    # /admin — Admin panel (LAN-only)
    # allow/deny enforced from geo map in admin-acl.conf (http{} context).
    # =========================================================================
    location /admin {
        allow 127.0.0.0/8;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://proxy:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;
        proxy_set_header X-Client-Cert-CN  "";
    }

    # =========================================================================
    # /portal — Multi-role portal UI (LAN-only)
    # =========================================================================
    location /portal {
        allow 127.0.0.0/8;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://proxy:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;
        proxy_set_header X-Client-Cert-CN  "";
    }

    # =========================================================================
    # /mcp — MCP Streamable-HTTP endpoint (the platform's PRIMARY surface).
    # Auth + OPA policy + audit are enforced by the proxy. SSE/streaming needs
    # buffering off, a long read timeout, and chunked encoding (mirrors the lab
    # tier). Without this block the production gateway 404'd the headline flow.
    # =========================================================================
    location /mcp {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://proxy:8000;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # =========================================================================
    # /.well-known/ — OAuth 2.1 / OIDC discovery (oauth-protected-resource,
    # oauth-authorization-server). MUST be public (no auth) — MCP clients fetch
    # this to bootstrap the PKCE login flow.
    # =========================================================================
    location /.well-known/ {
        proxy_pass http://proxy:8000;
        access_log off;
    }

    # =========================================================================
    # /oauth/ — Dynamic client registration (RFC 7591) + OAuth metadata served
    # by the proxy. Public; rate-limited per source IP.
    # =========================================================================
    location /oauth/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://proxy:8000;
    }

    # =========================================================================
    # Catch-all: return 404 for any unrecognised path
    # =========================================================================
    location / {
        return 404 '{"error":"not_found"}';
        add_header Content-Type application/json;
    }

    # -------------------------------------------------------------------------
    # ModSecurity — MCP JSON-RPC specific rules
    # modsecurity is already enabled at the http block level in nginx.conf.
    # The modsecurity_rules_file here loads our CUSTOM MCP rules in addition to
    # the OWASP CRS base rules loaded by the image's /etc/modsecurity.d/modsec_includes.conf.
    # Nginx ModSecurity loads rules files cumulatively per server context.
    # -------------------------------------------------------------------------
    modsecurity on;
    modsecurity_rules_file /etc/modsecurity.d/custom/mcp-jsonrpc-rules.conf;
    # Note: The owasp/modsecurity-crs image pre-configures CRS via modsec_includes.conf
    # at the http level. Our custom rules extend (not replace) the base CRS ruleset.
}

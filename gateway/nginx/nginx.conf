# nginx.conf — MCP Security Platform Gateway
# Nginx 1.25 global configuration.
# TLS 1.3 only. ModSecurity enabled. Structured JSON access logging.
# All secret values come from environment variables — never hardcoded here.

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# Load ModSecurity dynamic module (pre-loaded in owasp/modsecurity-crs image)
load_module modules/ngx_http_modsecurity_module.so;

events {
    worker_connections  1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Structured JSON access log format (INV fields from ARCHITECTURE.md §4.1)
    # Fields: time, remote_addr, ssl_client_s_dn_cn, request, status,
    #         body_bytes_sent, upstream_addr, upstream_response_time, request_id
    # -------------------------------------------------------------------------
    log_format json_access escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"ssl_client_s_dn_cn":"$ssl_client_s_dn_cn",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_x_request_id":"$http_x_request_id",'
            '"request_time":"$request_time",'
            '"http_user_agent":"$http_user_agent",'
            '"ssl_protocol":"$ssl_protocol"'
        '}';

    access_log  /var/log/nginx/access.log  json_access;

    # -------------------------------------------------------------------------
    # X-Client-Cert-CN: only populate on the path that mandates mTLS
    # (/api/v1/tools/). For every other request URI the value is forced to
    # the empty string so a client cannot spoof their identity to the proxy
    # by either sending the header directly or presenting a valid cert on a
    # path where mTLS is not required (ssl_verify_client = optional).
    # -------------------------------------------------------------------------
    map $request_uri $client_cert_cn_safe {
        default                  "";
        "~^/api/v1/tools/"       $ssl_client_s_dn_cn;
    }

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;  # Never reveal Nginx version

    # Client body size: match NGINX_CLIENT_MAX_BODY_SIZE env var default
    client_max_body_size 10m;

    # -------------------------------------------------------------------------
    # Rate limiting zones (per ARCHITECTURE.md §4.1, threat T6)
    # zone=agent: keyed on mTLS client CN; 2 req/s per client cert
    # zone=api: keyed on binary IP; 30 req/min for API key clients
    # -------------------------------------------------------------------------
    limit_req_zone $ssl_client_s_dn_cn zone=agent:10m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/m;

    # Return 429 on rate limit rather than 503 (clearer to clients)
    limit_req_status 429;

    # -------------------------------------------------------------------------
    # ModSecurity global config
    # -------------------------------------------------------------------------
    modsecurity on;
    modsecurity_rules_file /etc/modsecurity.d/modsec_includes.conf;

    # -------------------------------------------------------------------------
    # SSL/TLS hardening (TLS 1.3 only, per INV-009 and ARCHITECTURE.md §6)
    # -------------------------------------------------------------------------
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;  # TLS 1.3 handles cipher selection natively
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;  # Forward secrecy: disable session ticket resumption

    # OCSP stapling (requires the CA chain to be provided)
    ssl_stapling on;
    ssl_stapling_verify on;

    # -------------------------------------------------------------------------
    # Gzip (disabled by default to avoid CRIME/BREACH on sensitive data)
    # -------------------------------------------------------------------------
    gzip off;

    # Include vhost configs
    include /etc/nginx/conf.d/*.conf;
}

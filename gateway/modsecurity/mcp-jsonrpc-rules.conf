# mcp-jsonrpc-rules.conf — ModSecurity custom rules for MCP JSON-RPC traffic
#
# Rule ID namespace: 9001000–9001999 (custom range, outside OWASP CRS 900000-999999 range)
# These rules complement the OWASP CRS base ruleset loaded by the image.
#
# Philosophy:
#   - BLOCK hard on known-dangerous patterns (tools that escape the sandbox)
#   - ALERT (log, do not block) on prompt injection signatures — OPA + proxy
#     are the authoritative gates; WAF alerts feed anomaly detection.
#   - BLOCK on structural abuse (oversized body, illegal HTTP methods).
#
# Reference: ARCHITECTURE.md §7.3 (Attack Surfaces: MCP JSON-RPC endpoint)
# Security: INV-008 — no secrets here. Rule keys and values are policy, not secrets.

SecRuleEngine On

# ─── 1. HTTP Method Allowlist ─────────────────────────────────────────────────
# MCP JSON-RPC uses POST (invocations) and GET (health/status queries).
# Admin REST API also uses PUT (upsert) and DELETE (revoke).
# Any other method is unexpected and likely an exploit probe.
# Skip for admin API paths which use the full REST method set.
SecRule REQUEST_URI "@beginsWith /api/v1/admin/" \
    "id:9001000,\
     phase:1,\
     pass,\
     nolog,\
     ctl:ruleRemoveById=9001001,\
     ctl:ruleRemoveById=911100"

SecRule REQUEST_METHOD "!@within POST GET PUT DELETE PATCH" \
    "id:9001001,\
     phase:1,\
     block,\
     t:none,\
     log,\
     msg:'MCP-WAF: Disallowed HTTP method',\
     logdata:'Method: %{REQUEST_METHOD}',\
     tag:'mcp-security-platform',\
     tag:'method-enforcement',\
     severity:'CRITICAL',\
     status:405"

# ─── 2. Request Body Size Limit ───────────────────────────────────────────────
# Block requests with a JSON body larger than 1 MB.
# Oversized bodies are a vector for DoS and parser exploitation.
# Note: Nginx client_max_body_size is set to 10m; this is a stricter WAF gate
# for MCP-specific traffic where 1 MB is far more than any valid tool call needs.
SecRule REQUEST_HEADERS:Content-Length "@gt 1048576" \
    "id:9001002,\
     phase:1,\
     block,\
     t:none,\
     log,\
     msg:'MCP-WAF: Request body exceeds 1 MB limit',\
     logdata:'Content-Length: %{REQUEST_HEADERS.Content-Length}',\
     tag:'mcp-security-platform',\
     tag:'body-size',\
     severity:'WARNING',\
     status:413"

# Also catch chunked transfers where Content-Length is absent but body is large
SecRequestBodyLimit 1048576
SecRequestBodyNoFilesLimit 1048576

# ─── 3. Dangerous Tool Name Patterns ─────────────────────────────────────────
# Block tool invocations where params.name matches known shell-escape tool names.
# These patterns match tools that provide raw OS command execution — a critical
# risk in MCP environments where AI agents can call arbitrary tools.
#
# Pattern rationale:
#   - shell_exec, system_call, exec_command, run_command: direct OS execution
#   - eval, subprocess: code injection vectors
# The regex is anchored to the "name" field in the JSON-RPC params object.
SecRule REQUEST_BODY \
    "@rx \x22name\x22\s*:\s*\x22(shell_exec|system_call|exec_command|run_command|eval|subprocess_run|os_exec|cmd_exec)\x22" \
    "id:9001010,\
     phase:2,\
     block,\
     capture,\
     t:none,t:lowercase,\
     log,\
     msg:'MCP-WAF: Dangerous tool name in params.name',\
     logdata:'Matched tool name: %{TX.0}',\
     tag:'mcp-security-platform',\
     tag:'tool-name-enforcement',\
     tag:'OWASP_CRS-COMMAND_INJECTION',\
     severity:'CRITICAL',\
     status:403"

# ─── 4. Prompt Injection Signature Detection (ALERT only, do not block) ───────
# These patterns indicate potential prompt injection in tool arguments.
# We DETECT and LOG but do not block, because:
#   a) The proxy's Tool Manifest Auditor + OPA are the authoritative gates.
#   b) False positives here would break legitimate tool calls.
#   c) WAF alerts feed the anomaly detection baseline (ARCHITECTURE.md §5.1 step 10).
#
# WAF alert is surfaced via Nginx access log with ModSecurity alert code,
# then scraped by Promtail → Loki → Grafana alert rule.

SecRule REQUEST_BODY \
    "@rx (?i)(ignore\s+(?:all\s+)?previous\s+instructions)" \
    "id:9001020,\
     phase:2,\
     pass,\
     capture,\
     t:none,\
     log,\
     noauditlog,\
     msg:'MCP-WAF: ALERT — prompt injection signature: ignore previous instructions',\
     logdata:'Matched: %{TX.0}',\
     tag:'mcp-security-platform',\
     tag:'prompt-injection',\
     severity:'WARNING'"

SecRule REQUEST_BODY \
    "@rx (?i)(you\s+are\s+now\s+(?:a|an|the)\s+\w+)" \
    "id:9001021,\
     phase:2,\
     pass,\
     capture,\
     t:none,\
     log,\
     noauditlog,\
     msg:'MCP-WAF: ALERT — prompt injection signature: persona reassignment',\
     logdata:'Matched: %{TX.0}',\
     tag:'mcp-security-platform',\
     tag:'prompt-injection',\
     severity:'WARNING'"

SecRule REQUEST_BODY \
    "@rx (?i)(DAN\s+mode|do\s+anything\s+now)" \
    "id:9001022,\
     phase:2,\
     pass,\
     capture,\
     t:none,\
     log,\
     noauditlog,\
     msg:'MCP-WAF: ALERT — prompt injection signature: DAN mode jailbreak',\
     logdata:'Matched: %{TX.0}',\
     tag:'mcp-security-platform',\
     tag:'prompt-injection',\
     severity:'WARNING'"

SecRule REQUEST_BODY \
    "@rx (?i)(jailbreak|prompt\s+injection|system\s+prompt\s+override)" \
    "id:9001023,\
     phase:2,\
     pass,\
     capture,\
     t:none,\
     log,\
     noauditlog,\
     msg:'MCP-WAF: ALERT — prompt injection signature: explicit jailbreak term',\
     logdata:'Matched: %{TX.0}',\
     tag:'mcp-security-platform',\
     tag:'prompt-injection',\
     severity:'WARNING'"

# ─── 5. Rate Abuse Detection ──────────────────────────────────────────────────
# Complement Nginx rate limiting (which operates per-connection).
# ModSecurity IP-based collection counter for requests in a 600-second window.
# Threshold: >100 requests per IP per 10 minutes triggers a flag.
# This is a WAF-layer signal; actual enforcement is via Nginx rate limit zones.
#
# Note: ModSecurity IP collection uses shared memory; effective across workers.

SecAction \
    "id:9001030,\
     phase:1,\
     pass,\
     nolog,\
     initcol:ip=%{REMOTE_ADDR},\
     setvar:ip.mcp_request_count=+1,\
     expirevar:ip.mcp_request_count=600"

SecRule ip:mcp_request_count "@gt 100" \
    "id:9001031,\
     phase:1,\
     pass,\
     log,\
     msg:'MCP-WAF: ALERT — rate abuse detected: >100 requests in 10 minutes from single IP',\
     logdata:'IP: %{REMOTE_ADDR}, count: %{ip.mcp_request_count}',\
     tag:'mcp-security-platform',\
     tag:'rate-abuse',\
     severity:'WARNING'"

# ─── 6. Content-Type enforcement for MCP API paths ────────────────────────────
# POST requests to /api/ must declare JSON content type.
# This eliminates a class of multipart/form-data upload tricks.
SecRule REQUEST_METHOD "POST" \
    "chain,\
     id:9001040,\
     phase:1,\
     block,\
     t:none,\
     log,\
     msg:'MCP-WAF: POST request missing JSON Content-Type',\
     tag:'mcp-security-platform',\
     tag:'content-type',\
     severity:'NOTICE',\
     status:415"
    SecRule REQUEST_URI "@beginsWith /api/" \
        "chain"
        SecRule REQUEST_HEADERS:Content-Type "!@rx application/json" \
            "t:none"

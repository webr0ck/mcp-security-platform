---
# Lab overlay — add real upstream targets and a local OIDC provider.
#
# Usage:
#   podman compose \
#     -f docker-compose.yml \
#     -f docker-compose.dev.yml \
#     -f podman-compose.lab.yml \
#     up -d
#
# All lab services live on lab-net (bridge, internal: false) so localhost
# ports are reachable from the host browser.  The seeder also joins
# internal-net and vault-net to reach mcp-db and mcp-vault.

# ── MCP server hardening profile (Task 2.3, ISO-F1.6) ────────────────────────
# Applied to every lab MCP service via YAML merge key (<<: *mcp-hardening).
# Matches the sandbox hardening profile in docker-compose.yml plus a seccomp
# filter and resource limits appropriate for lab MCP workloads.
#
# Seccomp: sandbox/files/seccomp/mcp-sandbox.json (relative to repo root).
# In rootless Podman the seccomp path must be absolute or relative to the
# podman-compose working directory; both resolve correctly from the repo root.
#
# read_only: true — MCP servers should write nothing to the container FS.
# /tmp is writable via tmpfs if needed (add per-service if required).
#
# Non-root user: set per Dockerfile (USER 1001); the compose user: field
# is redundant when the image enforces it, but explicit here for clarity.
x-mcp-hardening: &mcp-hardening
  read_only: true
  security_opt:
    - no-new-privileges:true
    - seccomp:${PWD}/sandbox/files/seccomp/mcp-sandbox.json
  cap_drop:
    - ALL
  # pids via deploy.resources.limits.pids, NOT the top-level `pids_limit`
  # shorthand: `podman compose` (the built-in subcommand — distinct from the
  # standalone podman-compose Python tool) silently duplicates `pids_limit`
  # into an internal deploy.resources.limits.pids representation and then
  # hands docker-compose a merged file with BOTH present, which the real v2
  # binary rejects: "can't set distinct values on 'pids_limit' and
  # 'deploy.resources.limits.pids'". Confirmed empirically: removing every
  # `pids_limit` occurrence in this file was the only thing that made
  # `podman compose ... config` succeed; the standalone `podman-compose` tool
  # never had this problem either way. Since lab-setup.sh uses `podman
  # compose` (see LAB_COMPOSE there), this file must avoid pids_limit
  # entirely — any per-service override must repeat the FULL deploy.resources
  # block (memory/cpus + pids), not just override pids_limit as a sibling key,
  # because `<<: *mcp-hardening` merge does not deep-merge a service's own
  # `deploy:` key into the anchor's `deploy:` — it replaces it.
  deploy:
    resources:
      limits:
        memory: 256m
        cpus: "0.5"
        pids: 64
  user: "1001:1001"
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=32m

services:

  # ── Keycloak IDP (replaces/augments Dex for full OAuth2 + PKCE + token exchange)
  lab-keycloak:
    # Bumped from 24.0 (2026-07-11): Codex (OAuth 2.1 client) rejects the
    # authorization callback for missing the RFC 9207 `iss` response
    # parameter, which KC only started sending starting in 26.x.
    image: quay.io/keycloak/keycloak:26.0
    container_name: lab-keycloak
    command: ["start-dev", "--import-realm", "--features=token-exchange,admin-fine-grained-authz"]
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-adminpassword}
      # KC_HOSTNAME_STRICT=true: KC always uses the configured hostname for
      # frontend URLs (login pages, discovery, tokens). Without this, KC uses
      # the request Host header as the issuer, which breaks cross-machine auth
      # (browser sees localhost:8082, not the LAN IP). Backchannel (server-to-server)
      # fetches from the proxy still work with strict=true.
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      # KC 26's "hostname:v2" provider (default since 26.0) replaced the KC 24
      # KC_HOSTNAME_URL/KC_HOSTNAME_STRICT-only config with a single KC_HOSTNAME
      # that takes the full external URL directly — KC 26 refuses to start
      # ("hostname is not configured") without it, even with KC_HOSTNAME_URL set.
      # KC_HOSTNAME_URL kept too: still read by v1-style tooling and doesn't hurt.
      KC_HOSTNAME: "${LAB_GATEWAY_URL:-http://${LAB_HOST:-localhost}:8082}"
      # Tell KC its external frontend URL so all generated URLs use the LAN address.
      # ponytail: KC proxied through nginx at HTTPS — avoids SameSite cookie issues
      KC_HOSTNAME_URL: "${LAB_GATEWAY_URL:-http://${LAB_HOST:-localhost}:8082}"
      # Variable substitution in realm import (Keycloak 24 supports KC_* env vars in realm JSON)
      KC_PROXY_CLIENT_SECRET: ${KC_PROXY_CLIENT_SECRET:-mcp-proxy-secret}
      KC_GRAFANA_CLIENT_SECRET: ${KC_GRAFANA_CLIENT_SECRET:-grafana-secret}
      DEX_ALICE_PASSWORD: ${DEX_ALICE_PASSWORD:-labpassword}
      DEX_BOB_PASSWORD: ${DEX_BOB_PASSWORD:-labpassword}
      LAB_HOST: ${LAB_HOST:-localhost}
      # LAB_HOST_URL is substituted into realm-mcp.json's frontendUrl attribute
      # (Keycloak 24 env-var interpolation in realm import: ${LAB_HOST_URL:default}).
      LAB_HOST_URL: "${LAB_GATEWAY_URL:-http://${LAB_HOST:-localhost}:8082}"
      # Cap JVM heap so the Quarkus build phase isn't OOM-killed in rootless Podman (6 GB machine)
      JAVA_OPTS_KC_HEAP: "-Xms64m -Xmx512m"
    volumes:
      - ./lab/keycloak/realm-mcp.json:/opt/keycloak/data/import/realm-mcp.json:ro
      - lab-keycloak-data:/opt/keycloak/data
    ports:
      - "8082:8080"    # Keycloak admin console + OIDC endpoints
    networks:
      - lab-net
      - gateway-net    # proxy must reach Keycloak for JWKS and token validation
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080 && echo -e \"GET /realms/mcp HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && head -1 <&3 | grep -q 200' && exit 0 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ── Keycloak seeder — updates client secrets from env vars post-import ─────
  lab-keycloak-seeder:
    build:
      context: ./lab/keycloak
      dockerfile: Dockerfile.seeder
    image: lab-keycloak-seeder:lab
    container_name: lab-keycloak-seeder
    restart: "no"
    depends_on:
      lab-keycloak:
        condition: service_healthy
    volumes:
      - ./lab/keycloak/seed.sh:/seed.sh:ro
    command: ["bash", "/seed.sh"]
    environment:
      KC_URL: http://lab-keycloak:8080
      KC_REALM: mcp
      KC_ADMIN: admin
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-adminpassword}
      KC_PROXY_CLIENT_SECRET: ${KC_PROXY_CLIENT_SECRET:-mcp-proxy-secret}
      KC_GRAFANA_CLIENT_SECRET: ${KC_GRAFANA_CLIENT_SECRET:-grafana-secret}
    networks:
      - lab-net

  # ── Local OIDC / OAuth2 provider (Dex — kept for backward compatibility) ────
  lab-dex:
    image: ghcr.io/dexidp/dex:v2.38.0
    container_name: lab-dex
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./lab/dex/config.lab.yaml:/etc/dex/config.yaml:ro
    ports:
      - "5556:5556"
    networks:
      - lab-net
      - gateway-net    # proxy must reach Dex for JWKS and token validation
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5556/dex/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Lab Grafana (port 3001 — avoids conflict with observability on 3000) ────
  # Also joins observability-net so it can reach mcp-loki:3100.
  # Keycloak SSO is wired via generic_oauth; fallback to local admin remains.
  lab-grafana:
    image: grafana/grafana-oss:11.0.0
    container_name: lab-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${LAB_GRAFANA_ADMIN_PASSWORD:-labpassword}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Keycloak SSO via generic_oauth
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Keycloak"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${KC_GRAFANA_CLIENT_SECRET:-grafana-secret}
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email roles"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "http://${LAB_HOST:-localhost}:8082/realms/mcp/protocol/openid-connect/auth"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "http://lab-keycloak:8080/realms/mcp/protocol/openid-connect/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "http://lab-keycloak:8080/realms/mcp/protocol/openid-connect/userinfo"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(roles[*], 'grafana-admin') && 'Admin' || contains(roles[*], 'grafana-editor') && 'Editor' || 'Viewer'"
      GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: "true"
    volumes:
      - lab-grafana-data:/var/lib/grafana
      - ./lab/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - lab-net
      - observability-net
      - mcp-grafana-backend-net   # HIGH-2: reachable by lab-mcp-grafana only
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── NetBox backing database ──────────────────────────────────────────────────
  lab-netbox-db:
    image: postgres:16-alpine
    container_name: lab-netbox-db
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: ${LAB_NETBOX_DB_PASSWORD:-labpassword}
    volumes:
      - lab-netbox-db-data:/var/lib/postgresql/data
    networks:
      - lab-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netbox"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── NetBox Redis cache / task queue ─────────────────────────────────────────
  lab-netbox-redis:
    image: redis:7-alpine
    container_name: lab-netbox-redis
    command: redis-server --requirepass ${LAB_NETBOX_REDIS_PASSWORD:-labpassword}
    networks:
      - lab-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${LAB_NETBOX_REDIS_PASSWORD:-labpassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── NetBox IPAM / DCIM ───────────────────────────────────────────────────────
  lab-netbox:
    image: netboxcommunity/netbox:v4.2
    container_name: lab-netbox
    ports:
      - "8090:8080"
    depends_on:
      lab-netbox-db:
        condition: service_healthy
      lab-netbox-redis:
        condition: service_healthy
    environment:
      DB_HOST: lab-netbox-db
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: ${LAB_NETBOX_DB_PASSWORD:-labpassword}
      REDIS_HOST: lab-netbox-redis
      REDIS_PASSWORD: ${LAB_NETBOX_REDIS_PASSWORD:-labpassword}
      SECRET_KEY: ${LAB_NETBOX_SECRET_KEY:-change-me-32-chars-minimum-here}
      SUPERUSER_EMAIL: admin@lab.local
      SUPERUSER_PASSWORD: ${LAB_NETBOX_ADMIN_PASSWORD:-labpassword}
      # Fixes a bootstrap gap: without this, netboxcommunity/netbox mints a
      # random, uncaptured superuser API token on first boot, so the seeder's
      # create_netbox_token() (lab/seeder/seed.py) has nothing to authenticate
      # with after a volume wipe (LAB_NETBOX_ADMIN_TOKEN was never set anywhere)
      # and every NetBox seed call 403s. SUPERUSER_API_TOKEN makes the token
      # deterministic across resets, matching how Vault's bootstrap token works.
      SUPERUSER_API_TOKEN: ${LAB_NETBOX_ADMIN_TOKEN:-fcea2b11ef1f9b4111a7c94aae2dd3d2dd328794}
      ALLOWED_HOSTS: "lab-netbox localhost 127.0.0.1 ${LAB_HOST:-localhost}"
      SKIP_SUPERUSER: "false"
    networks:
      - lab-net
      - mcp-netbox-backend-net   # HIGH-2: reachable by mcp-netbox only
    healthcheck:
      # 403 = auth required = NetBox is up; curl -f fails on >=400 so use -s + grep
      test: ["CMD-SHELL", "curl -s http://localhost:8080/api/ | grep -q 'detail\\|Authentication' && exit 0 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s
    restart: unless-stopped

  # ── Grafana MCP Server — official grafana/mcp-grafana image (52 tools) ─────
  # Uses the upstream grafana/mcp-grafana binary with streamable-http transport
  # so the proxy can route to /mcp (same path used by all other MCP servers).
  # GRAFANA_SERVICE_ACCOUNT_TOKEN is seeded by lab/seeder/seed.py and written
  # to .env.lab. The container name matches the upstream_url in tool_registry.
  lab-mcp-grafana:
    # A-03 WAIVER: cannot use <<: *mcp-hardening fully because grafana/mcp-grafana:0.14.0
    # upstream image runs as an unknown non-root UID (not 1001) and writes to /tmp at startup,
    # so read_only:true and user:"1001:1001" both break it. Waiver approved for lab tier.
    # Compensating controls applied manually below (same set as anchor minus read_only+user).
    image: docker.io/grafana/mcp-grafana:0.14.0
    container_name: lab-mcp-grafana
    entrypoint:
      - /app/mcp-grafana
      - -transport
      - streamable-http
      - -address
      - 0.0.0.0:8000
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp:${PWD}/sandbox/files/seccomp/mcp-sandbox.json
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 64
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    ports:
      - "127.0.0.1:8100:8000"
    environment:
      GRAFANA_URL: "http://lab-grafana:3000"
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${GRAFANA_SERVICE_ACCOUNT_TOKEN}
    depends_on:
      lab-grafana:
        condition: service_healthy
    networks:
      - mcp-grafana-backend-net   # HIGH-2: dedicated MCP<->backend net (replaces shared lab-net)
      - mcp-grafana-net   # pairwise net with proxy only
    healthcheck:
      # The grafana/mcp-grafana image ships NO wget/curl (distroless-ish, only
      # bash+coreutils), so the previous wget probe always exited 127 -> forever unhealthy.
      # Use bash /dev/tcp to do a real HTTP GET and assert a 200 from /mcp.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8000; printf 'GET /mcp HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3; head -c 15 <&3 | grep -q 200"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── NetBox MCP Server — per-user broker-injected token (Case 3, PRD-0002) ───
  # Our own server.py reads Authorization header injected by the broker at call
  # time (user mode). No static NETBOX_TOKEN env — tokens are per-user in DB.
  mcp-netbox:
    <<: *mcp-hardening
    build:
      context: ./lab/mcp-servers/netbox
      dockerfile: Dockerfile
    image: mcp-netbox-server:lab
    container_name: mcp-netbox
    ports:
      - "127.0.0.1:8101:8000"
    environment:
      NETBOX_URL: "http://lab-netbox:8080"
      TRANSPORT: "http"
      HOST: "0.0.0.0"
      PORT: "8000"
    depends_on:
      lab-netbox:
        condition: service_healthy
    networks:
      - mcp-netbox-backend-net   # HIGH-2: dedicated MCP<->backend net (replaces shared lab-net)
      - mcp-netbox-net   # pairwise net with proxy only; replaces internal-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Lab Tickets MCP Server — RFC 8693 token exchange (Case 4, PRD-0002) ─────
  # proxy exchanges the caller's KC bearer for aud=lab-tickets via token exchange,
  # then injects the exchanged token as Authorization: Bearer to this server.
  # The server validates that azp=mcp-proxy and aud=lab-tickets in the JWT.
  lab-mcp-lab-tickets:
    <<: *mcp-hardening
    build:
      context: ./lab/mcp-servers/lab-tickets
    container_name: lab-mcp-lab-tickets
    ports:
      - "127.0.0.1:8109:8000"
    environment:
      KC_ISSUER: "http://lab-keycloak:8080/realms/mcp"
      HOST: "0.0.0.0"
      PORT: "8000"
    depends_on:
      lab-keycloak:
        condition: service_healthy
    networks:
      - mcp-lab-tickets-net   # pairwise net with proxy only
      # lab-net restored (was dropped by HIGH-2): this RS validates the exchanged
      # KC JWT itself, so it MUST reach lab-keycloak for JWKS. A new pairwise net
      # would renumber every 10.89.x subnet (see the networks note at file end).
      - lab-net
    healthcheck:
      # /mcp requires a valid exchanged JWT (401s an unauth'd initialize), so
      # probe the unauthenticated /health liveness route instead.
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\" 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Gitea — self-hosted Git server (Bitbucket equivalent) ───────────────────
  lab-gitea:
    build: ./lab/gitea
    image: lab-gitea:lab
    container_name: lab-gitea
    ports:
      - "3002:3000"
      - "2222:22"
    environment:
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__server__DOMAIN: ${LAB_HOST:-localhost}
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__ROOT_URL: "http://${LAB_HOST:-localhost}:3002/"
      GITEA__server__SSH_PORT: "2222"
      GITEA__log__LEVEL: warn
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-gitadmin}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD:-labpassword}
      GITEA_ADMIN_EMAIL: ${GITEA_ADMIN_EMAIL:-admin@lab.local}
    volumes:
      - lab-gitea-data:/data
    networks:
      - lab-net
      - mcp-gitea-backend-net   # HIGH-2: reachable by lab-mcp-gitea only
    healthcheck:
      test: ["CMD-SHELL", "wget -T 30 -qO- http://localhost:3000/api/healthz 2>/dev/null | grep -q 'pass' && exit 0 || exit 1"]
      interval: 15s
      timeout: 35s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  # ── Gitea MCP Server ─────────────────────────────────────────────────────────
  # GITEA_TOKEN removed (Task 2.5): credential is broker-injected via credential_store.
  # The proxy injects the token as Authorization header; server.py reads it from there.
  lab-mcp-gitea:
    <<: *mcp-hardening
    build: ./lab/mcp-servers/gitea
    image: lab-mcp-gitea:lab
    container_name: lab-mcp-gitea
    # override hardening default (64): FastMCP streamable_http worker threads.
    # `<<:` merge does not deep-merge `deploy:` — repeat memory/cpus so this
    # override doesn't silently drop them (see x-mcp-hardening's comment).
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 256
    ports:
      - "127.0.0.1:8102:8000"
    environment:
      GITEA_URL: "http://lab-gitea:3000"
      TRANSPORT: "http"
      HOST: "0.0.0.0"
      PORT: "8000"
    depends_on:
      lab-gitea:
        condition: service_healthy
    networks:
      - mcp-gitea-backend-net   # HIGH-2: dedicated MCP<->backend net (replaces shared lab-net)
      - mcp-gitea-net   # pairwise net with proxy only; replaces internal-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # CR-14 / WP-B1: scanner-worker needs lab-net to reach the AT3 test
  # fixture git host (lab-gitea-tls / lab-mcp-gitea) — the same reason the
  # proxy service itself is on lab-net (see its comment above). This is a
  # LAB-ONLY relaxation: production (base docker-compose.yml alone) keeps
  # scanner-worker off lab-net entirely, reachable only via
  # scanner-worker-db-net + the allowlisted scanner-worker-egress-net.
  scanner-worker:
    networks:
      - lab-net
    environment:
      # lab-gitea-tls is an internal AT3 test fixture standing in for an
      # enterprise git host (git_providers row 'gitea-lab') — it must bypass
      # the allowlisting egress proxy (which only knows real external hosts
      # like github.com), same as lab-mcp-m365's NO_PROXY for its mock stubs.
      # NOTE: the self-signed-cert TRUST override (GIT_SSL_CAINFO) is applied
      # separately and TEMPORARILY by
      # lab/tests/acceptance/fixtures/setup_gitea_fixtures.sh — same reason
      # the proxy's own equivalent override isn't baked in here permanently
      # (it would silently break every real-github.com clone for the rest of
      # the lab's life). See that script + fixtures/compose.scanner-worker-git-ca-override.yml.
      NO_PROXY: "lab-gitea-tls,lab-gitea,lab-mcp-gitea,localhost,127.0.0.1"

  # ── M365 MCP Server — softeria/ms-365-mcp-server via Graph app-only token ───
  # AZURE_CLIENT_SECRET removed (Task 2.5): credential is broker-injected via
  # credential_store (entra_client_credentials mode). Proxy injects it at call time.
  # Egress traffic to *.microsoftonline.com / *.graph.microsoft.com routes via
  # the egress proxy on the mcp-egress-net (Task 2.4).
  lab-mcp-m365:
    <<: *mcp-hardening
    build: ./lab/mcp-servers/m365
    image: lab-mcp-m365:lab
    container_name: lab-mcp-m365
    # override hardening default (64): stateless_http uses more worker threads.
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 512
    ports:
      - "127.0.0.1:8103:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      SERVER_NAME: "m365-mcp"
      # Entra app-only identity fields (not secret) — needed for token exchange.
      AZURE_TENANT_ID: "${AZURE_TENANT_ID}"
      AZURE_CLIENT_ID: "${AZURE_CLIENT_ID}"
      # AZURE_CLIENT_SECRET deliberately absent — injected by broker at call time.
      M365_USER: "${M365_USER:-}"
      REQUIRE_DELEGATED: "${REQUIRE_DELEGATED:-}"
      NATIVE_AUTH: "${NATIVE_AUTH:-}"
      M365_RESOURCE_URL: "${M365_RESOURCE_URL:-http://localhost:8000/mcp}"
      # AZURE_MODE=mock: redirect token + Graph calls to lab stubs (PRD-0002 case 1)
      M365_TOKEN_URL: "${M365_TOKEN_URL:-}"
      M365_GRAPH_BASE: "${M365_GRAPH_BASE:-}"
      # Route Entra/Graph egress through the allowlisting forward proxy (Task 2.4).
      # NO_PROXY must include mock stub hostnames so they bypass the squid proxy.
      HTTPS_PROXY: "http://lab-egress-proxy:3128"
      NO_PROXY: "lab-mcp-m365,lab-mock-idp,lab-mock-graph,localhost,127.0.0.1"
    networks:
      - mcp-m365-net    # pairwise net with proxy only; replaces internal-net
      - mcp-egress-net  # egress-only path to lab-egress-proxy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Entra ID MCP — directory lookup (users/groups), same app registration
  # ── as lab-mcp-m365, always app-only (2026-07-14) ───────────────────────────
  # list_users/list_groups are Graph endpoints that work fine with application
  # permissions — unlike /me-style endpoints, no delegated per-user token needed.
  lab-mcp-entra-id:
    <<: *mcp-hardening
    build: ./lab/mcp-servers/entra-id
    image: lab-mcp-entra-id:lab
    container_name: lab-mcp-entra-id
    ports:
      - "127.0.0.1:8107:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      SERVER_NAME: "entra-id-mcp"
      AZURE_TENANT_ID: "${AZURE_TENANT_ID}"
      AZURE_CLIENT_ID: "${AZURE_CLIENT_ID}"
      # AZURE_CLIENT_SECRET deliberately absent — injected by broker at call time
      # via X-Entra-Client-Secret (injection_mode=entra_client_credentials), same
      # as lab-mcp-m365.
      M365_TOKEN_URL: "${M365_TOKEN_URL:-}"
      M365_GRAPH_BASE: "${M365_GRAPH_BASE:-}"
      HTTPS_PROXY: "http://lab-egress-proxy:3128"
      NO_PROXY: "lab-mcp-entra-id,lab-mock-idp,lab-mock-graph,localhost,127.0.0.1"
    networks:
      - mcp-entra-id-net  # pairwise net with proxy only
      - mcp-egress-net    # egress-only path to lab-egress-proxy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Egress proxy — allowlisting forward proxy for lab MCP servers (Task 2.4) ─
  # Squid is the only service with mcp-egress-net (internet-reachable).
  # lab-mcp-m365 routes its Entra/Graph calls through here via HTTPS_PROXY env.
  # All other lab MCP services are on internal-only nets — they cannot reach
  # the internet at all (no mcp-egress-net membership).
  #
  # Security: squid.conf is mounted read-only; no platform networks attached.
  # Allowlist: lab/egress-proxy/squid.conf (auditable policy file).
  # TODO: pin ubuntu/squid image by digest — run:
  #   podman pull ubuntu/squid:latest && podman inspect --format='{{index .RepoDigests 0}}' ubuntu/squid:latest
  lab-egress-proxy:
    image: ubuntu/squid:latest
    container_name: lab-egress-proxy
    # Rootless Podman cannot setgid/setuid inside the container. Start as proxy
    # user (uid/gid 13) so Squid doesn't need to change users at runtime.
    user: "13:13"
    volumes:
      - ./lab/egress-proxy/squid.conf:/etc/squid/squid.conf:ro
    networks:
      - mcp-egress-net  # connects to lab MCP servers needing egress
      - scanner-worker-egress-net  # CR-14: connects scanner-worker needing egress
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # needed to bind port 3128
    read_only: false  # squid needs to write to its cache dir (even when caching disabled)
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "squid -k check 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── gateway: Podman/macOS compatibility override ─────────────────────────────
  # ── RAG Assistant — developer onboarding + doc search MCP server ────────────
  lab-rag-assistant:
    <<: *mcp-hardening
    build: ./lab/mcp-servers/rag-assistant
    image: lab-rag-assistant:lab
    container_name: lab-rag-assistant
    # override hardening default (64): FastMCP streamable_http worker threads.
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 256
    ports:
      - "127.0.0.1:8104:8000"
    environment:
      DOCS_DIR: "/app/docs"
      KB_DIR: "/app/kb"
      TRANSPORT: "http"
      HOST: "0.0.0.0"
      PORT: "8000"
    volumes:
      # Mount platform docs and KB read-only so the index stays current
      - ./docs:/app/docs:ro
    networks:
      - lab-net
      - mcp-rag-assistant-net   # pairwise net with proxy only; replaces internal-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Echo MCP — stress-test and auth-verification target ─────────────────────
  lab-mcp-echo:
    <<: *mcp-hardening
    build:
      context: ./lab/mcp-servers/echo
    image: lab-mcp-echo:lab
    container_name: lab-mcp-echo
    ports:
      - "127.0.0.1:8105:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      SERVER_NAME: "echo-mcp"
      FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION: "false"
    networks:
      # HIGH-2: dropped shared lab-net (echo has no backend) — no MCP-to-MCP path
      - mcp-echo-net   # pairwise net with proxy only; replaces internal-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Test-API MCP — onboarding acceptance-test target (2026-07-14) ───────────
  # Fronts the local policy-document test API (policy_api_server.py) with two
  # tool families against the SAME backend: read tools need no credential
  # (injection_mode=none), add_policy_line requires a broker-injected Basic
  # credential (injection_mode=basic_auth) — mirrors the pattern used to test
  # echo-basic/echo-sa/echo-dex-external against one shared upstream.
  lab-mcp-test-api:
    <<: *mcp-hardening
    build:
      context: ./lab/mcp-servers/test-api
    image: lab-mcp-test-api:lab
    container_name: lab-mcp-test-api
    ports:
      - "127.0.0.1:8106:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      SERVER_NAME: "test-api-mcp"
      POLICY_API_READ_URL: "http://127.0.0.1:9191"
      POLICY_API_RW_URL: "http://127.0.0.1:9292"
      POLICY_BEARER_TOKEN: "security-token"
      FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION: "false"
    networks:
      - mcp-test-api-net   # pairwise net with proxy only; backend API runs in-container on loopback
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Catfacts MCP — real, no-auth, live third-party upstream (T5) ────────────
  # Every other injection_mode='none' lab server talks to itself or a local/
  # mocked backend. This one hits a genuinely external, live REST API
  # (catfact.ninja) with no auth at all — the missing "simple real upstream"
  # case. Egress routes through lab-egress-proxy (allowlisted in squid.conf),
  # same pattern as lab-mcp-m365's Entra/Graph egress.
  lab-mcp-catfacts:
    <<: *mcp-hardening
    build:
      context: ./lab/mcp-servers/catfacts
    image: lab-mcp-catfacts:lab
    container_name: lab-mcp-catfacts
    ports:
      - "127.0.0.1:8110:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      SERVER_NAME: "catfacts-mcp"
      HTTPS_PROXY: "http://lab-egress-proxy:3128"
      NO_PROXY: "lab-mcp-catfacts,localhost,127.0.0.1"
    networks:
      - mcp-catfacts-net   # pairwise net with proxy only; replaces internal-net
      - mcp-egress-net     # egress-only path to lab-egress-proxy -> catfact.ninja
    healthcheck:
      # require_proxy=True (SDK default, unlike echo's debug-canary override) means
      # /mcp 403s without an X-User-Sub header; /health is the SDK's always-open
      # liveness route (H1 in context.py) — use it here instead of echo's /mcp probe.
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)\" 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Fetch MCP — vendored adaptation of the official MCP reference "fetch"
  # server (modelcontextprotocol/servers, src/fetch, commit a72e93e — see
  # lab/mcp-servers/fetch/server.py docstring). T3: proves onboarding of a
  # real upstream open-source MCP server, not another hand-built lab fixture.
  # Same egress-only pattern as catfacts: real external HTTP calls, no auth.
  lab-mcp-fetch:
    <<: *mcp-hardening
    build:
      context: ./lab/mcp-servers/fetch
    image: lab-mcp-fetch:lab
    container_name: lab-mcp-fetch
    ports:
      - "127.0.0.1:8111:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      SERVER_NAME: "fetch-mcp"
      HTTPS_PROXY: "http://lab-egress-proxy:3128"
      NO_PROXY: "lab-mcp-fetch,localhost,127.0.0.1"
    networks:
      - mcp-fetch-net      # pairwise net with proxy only
      - mcp-egress-net     # egress-only path to lab-egress-proxy -> example.com
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)\" 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Notes MCP — per-user isolated notes (approach A credential injection) ───
  # Task 2.2b: removed from proxy-redis-net + REDIS_PASSWORD env.
  # Notes uses its own private Redis sidecar (lab-notes-redis) on notes-private-net.
  # The proxy reaches notes via mcp-notes-net (pairwise, no Redis there).
  # Two networks:
  #   mcp-notes-net    — proxy ↔ lab-mcp-notes (pairwise, no Redis)
  #   notes-private-net — lab-mcp-notes ↔ lab-notes-redis (no proxy, no platform)
  lab-mcp-notes:
    <<: *mcp-hardening
    build:
      context: ./lab/mcp-servers/notes
    image: lab-mcp-notes:lab
    container_name: lab-mcp-notes
    # override hardening default (64): FastMCP streamable_http worker threads.
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 256
    ports:
      - "127.0.0.1:8106:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      REDIS_URL: "redis://lab-notes-redis:6379/0"
      FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION: "false"
    depends_on:
      lab-notes-redis:
        condition: service_healthy
    networks:
      - mcp-notes-net      # proxy ↔ lab-mcp-notes pairwise
      - notes-private-net  # lab-mcp-notes ↔ lab-notes-redis only
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Notes private Redis — isolated sidecar, no auth required (no external access) ──
  lab-notes-redis:
    image: redis:7-alpine
    container_name: lab-notes-redis
    command: redis-server --save ""   # no persistence needed for ephemeral lab notes
    networks:
      - notes-private-net   # ONLY reachable from lab-mcp-notes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ── Self-Service MCP — per-identity MCP permission management ───────────────
  # Task 2.2b: removed from proxy-db-net + DATABASE_URL env.
  # Now a thin HTTP client of the proxy profile API (proxy/app/routers/profiles.py).
  # Authentication: SELF_SERVICE_API_KEY — a service API key seeded into api_keys
  # by lab/seeder/seed.py and granted "agent" role. The proxy injects X-User-Sub/
  # X-User-Role into every call; the self-service server forwards those as the
  # `principal` parameter when calling the proxy profile API on behalf of the user.
  # The proxy is reachable via mcp-self-service-net (pairwise, internal: true).
  lab-mcp-self-service:
    <<: *mcp-hardening
    build:
      context: ./mcp-servers/self-service
    image: lab-mcp-self-service:lab
    container_name: lab-mcp-self-service
    # override hardening default (64): FastMCP streamable_http worker threads.
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 256
    ports:
      - "127.0.0.1:8108:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      # Proxy profile API endpoint (reachable via pairwise net)
      PROXY_PROFILE_API_URL: "http://mcp-proxy:8000/api/v1/profiles"
      # Service API key — seeded by lab/seeder/seed.py into api_keys table
      # Fail-fast: no default — must be set in .env.lab by the seeder.
      # Generate with: openssl rand -hex 32 (seeder writes it to .env.lab).
      SELF_SERVICE_API_KEY: "${SELF_SERVICE_API_KEY:?SELF_SERVICE_API_KEY must be set in .env.lab (run lab seeder first)}"
      FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION: "false"
    networks:
      - mcp-self-service-net   # pairwise with proxy only; no DB/Redis access
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Search MCP — shared SA scenario (approach B credential injection) ────────
  lab-mcp-search:
    <<: *mcp-hardening
    build:
      context: ./lab/mcp-servers/search
    image: lab-mcp-search:lab
    container_name: lab-mcp-search
    ports:
      - "127.0.0.1:8107:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION: "false"
    networks:
      # HIGH-2: dropped shared lab-net (no backend) — no MCP-to-MCP path
      - mcp-search-net   # pairwise net with proxy only; replaces internal-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Production config requires step-ca server cert at /etc/nginx/certs/ which is
  # not provisioned automatically. Lab uses:
  #   - lab/nginx/nginx.conf as a writable placeholder (CRS template overwrites it)
  #   - lab/nginx/conf.d with mTLS-free config using CRS self-signed cert
  # docker-compose merges volumes by target, so these replace the base mounts.
  gateway:
    # modsecurity-crs 4.14.0-nginx-alpine tag no longer exists; use latest CRS4 + nginx.
    image: owasp/modsecurity-crs:4.25.0-nginx-lts
    # read_only: true from *security-hardening blocks nginx template init writes.
    read_only: false
    # rootless Podman: run as root so nginx master can bind ports 80/443 inside
    # the container's network namespace (maps to 8088/8443 on the host).
    user: root
    # Restore caps dropped by *security-hardening: nginx chowns cache/temp dirs to
    # the worker user (uid 101) at startup; SETUID/SETGID needed for worker privilege drop.
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    # 91-update-resolver.sh uses `sed -i` (creates temp + renames) which fails on
    # bind mounts in rootless Podman. Run the CRS init steps explicitly (no shell
    # loop vars — $var in compose command strings is expanded at create time, not
    # at container runtime, producing empty strings). Skip step 91; remove the
    # literal "resolver RESOLVERS" placeholder with grep instead.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "[ -x /docker-entrypoint.d/01-check-low-port.sh ] && /docker-entrypoint.d/01-check-low-port.sh || true;
        [ -x /docker-entrypoint.d/10-generate-certificate.sh ] && /docker-entrypoint.d/10-generate-certificate.sh || true;
        [ -x /docker-entrypoint.d/10-listen-on-ipv6-by-default.sh ] && /docker-entrypoint.d/10-listen-on-ipv6-by-default.sh || true;
        [ -f /docker-entrypoint.d/15-local-resolvers.envsh ] && . /docker-entrypoint.d/15-local-resolvers.envsh || true;
        [ -x /docker-entrypoint.d/20-envsubst-on-templates.sh ] && /docker-entrypoint.d/20-envsubst-on-templates.sh || true;
        [ -x /docker-entrypoint.d/30-tune-worker-processes.sh ] && /docker-entrypoint.d/30-tune-worker-processes.sh || true;
        [ -x /docker-entrypoint.d/90-copy-modsecurity-config.sh ] && /docker-entrypoint.d/90-copy-modsecurity-config.sh || true;
        grep -v 'resolver RESOLVERS' /etc/nginx/nginx.conf > /tmp/nginx-patched.conf 2>/dev/null && cat /tmp/nginx-patched.conf > /etc/nginx/nginx.conf || true;
        echo '# replaced by mcp-proxy-lab.conf' > /etc/nginx/conf.d/default.conf;
        exec nginx -g 'daemon off;'"
    # Gateway ports driven by GATEWAY_HTTP_PORT / GATEWAY_HTTPS_PORT in .env.lab
    # (8088:80 and 8443:443) — no port override needed here.
    volumes:
      - ./lab/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./lab/nginx/conf.d:/etc/nginx/conf.d
      - ./lab/nginx/lab-certs:/etc/nginx/lab-certs:ro
      # PRD-0006 R-2: step-ca CA is in lab-certs above; the generated X-Gateway-Secret
      # include (gitignored) enables the proxy to trust the mTLS CN.
      - ./lab/nginx/secrets:/etc/nginx/secrets:ro
      # bind-mount all three modsecurity.d config files — the container rootfs is read_only:true
      # so 90-copy-modsecurity-config.sh cannot create new files there at runtime.
      - ./lab/modsecurity-crs/modsecurity.conf:/etc/modsecurity.d/modsecurity.conf
      - ./lab/modsecurity-crs/modsecurity-override.conf:/etc/modsecurity.d/modsecurity-override.conf
      - ./lab/modsecurity-crs/setup.conf:/etc/modsecurity.d/setup.conf

  # ── Alertmanager: null receiver + read_only: false for rootless Podman ───────
  # *security-hardening sets read_only: true which prevents tmpfs writes in Podman.
  # Lab uses a null receiver so alertmanager starts without needing real webhook URLs.
  alertmanager:
    read_only: false
    volumes:
      - ./lab/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  # ── Redis: rootless Podman — start as redis user directly so su-exec is never called
  redis:
    user: "redis"
    security_opt:
      - no-new-privileges:false
    ports:
      - "127.0.0.1:6379:6379"

  # ── MinIO: remap host ports to avoid clash with other projects on :9000/:9001 ──
  minio:
    ports:
      - "9002:9000"
      - "9003:9001"

  # ── minio-init: RELEASE tag pinned in docker-compose.yml no longer exists; use latest ──
  minio-init:
    image: minio/mc:latest

  # ── step-ca: secret handled via top-level secrets block (file: ./lab/step-ca-password) ──
  # No volume-bind override needed; podman-compose resolves it via secrets:.

  # ── labeler-renewal (T3): docker-compose.yml's base definition pip-installs
  # `cryptography` at container start on observability-net, which has no pypi
  # egress in this lab — crash-loops. infra/pki/Dockerfile.labeler-renewal
  # bakes the dependency in at build time instead. Distinct image tag (not
  # python:3.12-slim) so the local build doesn't clobber that shared base tag.
  labeler-renewal:
    image: mcp-labeler-renewal:lab
    build:
      context: ./infra/pki
      dockerfile: Dockerfile.labeler-renewal
    command: ["python3", "/scripts/renew-labeler-leaf.py"]

  # ── Vault — LAB ONLY: switch to dev mode (in-memory, well-known root token).
  # The base compose runs Vault with a file storage backend that requires
  # init+unseal. For lab smoke tests we want a one-command bring-up, so the
  # overlay flips Vault into dev mode and exposes the API port to the host.
  # NEVER apply this overlay in production.
  vault:
    # PERSISTENT lab Vault (replaces the old in-memory `-dev` mode). File storage on
    # the vault-data volume means the encrypted barrier — including the broker master
    # secret (KEK) — survives restarts, so the KEK never has to be persisted as
    # plaintext on disk. auto-unseal.sh self-heals (init-if-needed + unseal) on every
    # (re)start. See lab/vault/auto-unseal.sh and lab/vault/local.hcl for the model.
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
      # Fixed bootstrap token minted by the wrapper so the proxy/seeder authenticate
      # with a static literal. Only valid against a live, unsealed Vault (not offline
      # key material). Reuses the existing VAULT_TOKEN literal.
      VAULT_BOOTSTRAP_TOKEN: "${VAULT_TOKEN:-lab-root-token}"
      VAULT_CONFIG_FILE: "/vault/lab/local.hcl"
      # Clear the production VAULT_LOCAL_CONFIG inherited from base — the wrapper
      # points Vault at the bind-mounted HCL config instead.
      VAULT_LOCAL_CONFIG: ""
      VAULT_DISABLE_MLOCK: "1"
    # rootless Podman: run our wrapper directly (bypasses docker-entrypoint.sh's
    # setcap, unsupported in rootless user namespaces). disable_mlock in the HCL
    # config means mlock/setcap is never needed.
    entrypoint: ["/usr/local/bin/vault-auto-unseal.sh"]
    command: []
    read_only: false
    security_opt:
      - no-new-privileges:false
    volumes:
      - vault-data:/vault/data
      - ./lab/vault/local.hcl:/vault/lab/local.hcl:ro
      - ./lab/vault/auto-unseal.sh:/usr/local/bin/vault-auto-unseal.sh:ro
    ports:
      # Remapped to 8201 — port 8200 is used by isl-vault from intentional-secrets-lab
      # A-01: 127.0.0.1 binding — prevents Tailscale peers from reaching Vault directly.
      - "127.0.0.1:8201:8200"
    healthcheck:
      # Healthy ONLY when initialised AND unsealed (sys/health returns 200 only then),
      # so dependents (seeder) wait for the wrapper to finish unsealing. Plain HTTP.
      # NOTE: podman-compose auto-wraps a string test in CMD-SHELL, so the string must
      # NOT include its own CMD-SHELL prefix (doing so double-wraps → always exit 1).
      test: "wget -qO- http://127.0.0.1:8200/v1/sys/health > /dev/null 2>&1"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ── Promtail: Podman/macOS compatibility override ────────────────────────────
  # Production promtail.yml uses docker_sd_configs which require
  # /var/run/docker.sock and /var/lib/docker/containers. Neither exists in
  # rootless Podman on macOS. Override volumes (by target-path merge) with
  # a lab config that uses static scrape only.
  promtail:
    user: "0:1000"
    # Disable SELinux label enforcement so the container can connect to the
    # Podman socket. Required in Fedora CoreOS (SELinux-enforcing) Podman VMs.
    security_opt:
      - label=disable
    volumes:
      - ./observability/loki/promtail-lab.yml:/etc/promtail/promtail.yml:ro
      # Mount the ACTUAL socket (not the /run/docker.sock symlink — symlink
      # target doesn't resolve inside the container's namespace).
      # Path is resolved by Podman daemon inside the VM.
      - /run/user/501/podman/podman.sock:/var/run/docker.sock
      # Override the production /var/lib/docker/containers mount.
      - /tmp:/var/lib/docker/containers:ro

  # ── Proxy: dev-style build + hot-reload (was in docker-compose.dev.yml) ──────
  # Drop docker-compose.dev.yml from the lab stack to avoid MinIO port conflicts.
  # We reproduce only the parts the lab needs here.
  # ── Mock IdP — click-to-login OAuth 2.1 / OIDC for lab testing ─────────────
  lab-mock-idp:
    build: ./lab/mock-idp
    image: lab-mock-idp:lab
    container_name: lab-mock-idp
    ports:
      - "8888:8888"
    environment:
      HOST: "0.0.0.0"
      PORT: "8888"
      MOCK_IDP_ISSUER: "http://${LAB_HOST:-localhost}:8888"
    networks:
      - lab-net
      - gateway-net   # lets the proxy reach lab-mock-idp by name for JWKS / token verification
      - mcp-m365-net  # reachable from lab-mcp-m365 when AZURE_MODE=mock (M365_TOKEN_URL)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8888/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  proxy:
    depends_on:
      opa:
        condition: service_started
      lab-dex:
        condition: service_healthy
      lab-keycloak:
        condition: service_healthy
    build:
      context: .
      dockerfile: proxy/Dockerfile
      target: development
    volumes:
      - ./proxy:/app:cached
      - ./policies/rego:/app/policies:ro
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - RELOAD=true
      # SEC-05: reject inbound to proxy:8000 from anything but the gateway/loopback,
      # so MCP backends can't dial the proxy back over their per-backend network.
      # lab-mcp-self-service is a deliberate exception: it lives on the pairwise
      # mcp-self-service-net specifically to call back into /api/v1/design-assist
      # and /api/v1/submissions (see mcp-servers/self-service/server.py). It
      # authenticates those calls with its OWN service API key (client_id
      # lab-self-service) — NOT a forwarded copy of the caller's OAuth token
      # (passthrough never forwards that; see docs/spec/02-credential-broker.md
      # §3.2) — and attributes real-user ownership via the role-gated
      # X-On-Behalf-Of trust bridge (T2, ARCHITECTURE.md §5.5). This allowlist
      # only grants network-level ingress, not an authn bypass.
      - PROXY_INGRESS_ALLOWLIST_ENABLED=true
      - PROXY_INGRESS_TRUSTED_HOSTS=gateway,lab-mcp-self-service,prometheus
      # Option B: derive the OIDC callback URL from the incoming request's Host
      # header so the proxy works from any IP (LAN, Tailscale, localhost) without
      # reconfiguring PROXY_BASE_URL. Safe here because all traffic is on trusted
      # local/VPN networks and Keycloak's realm whitelists port-8000 callbacks.
      - OIDC_TRUST_FORWARDED_HOST=true
      - PROXY_BASE_URL=${PROXY_BASE_URL}
      # Lab Vault uses persistent file storage (not dev mode), so the proxy must
      # use the lab token from .env.lab — not the hardcoded "root" from dev compose.
      - VAULT_TOKEN=${VAULT_TOKEN}
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app
      --log-level debug
    ports:
      - "8000:8000"
      - "5678:5678"
    env_file:
      - .env
      - .env.lab
    networks:
      - gateway-net
      - step-ca-net
      - vault-net
      - proxy-opa-net
      - proxy-ollama-net
      - proxy-redis-net
      - proxy-db-net
      - lab-net             # lab: proxy reverse proxy to lab-netbox, lab-grafana, lab-keycloak
      # Pairwise nets — one per MCP server; replaces flat internal-net (Task 2.2a+2.2b)
      - mcp-grafana-net
      - mcp-netbox-net
      - mcp-gitea-net
      - mcp-m365-net
      - mcp-entra-id-net
      - mcp-rag-assistant-net
      - mcp-echo-net
      - mcp-test-api-net
      - mcp-catfacts-net
      - mcp-fetch-net
      - mcp-notes-net
      - mcp-self-service-net
      - mcp-search-net
      - mcp-lab-tickets-net

  # ── DB: several rootless-Podman overrides needed:
  # - user: postgres → avoid su-exec user-switch failure
  # - read_only: false → postgres needs /var/run/postgresql for lock file
  # - security_opt: no-new-privileges:false → allow internal uid management
  # - port 5434 → avoids rootlessport conflict with stale 5432 binding
  db:
    user: "postgres"
    read_only: false
    security_opt:
      - no-new-privileges:false
    # /var/run/postgresql tmpfs already defined in base compose (mode=0755).
    # Do not re-add here — compose list-merge would create a duplicate mount.
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD:-devpassword}

  # ── OPA: NOT exposed to host — reachable only from proxy on proxy-opa-net.
  # RT-005 fix: OPA has no authentication; exposing :8181 lets any host process
  # read the full grants/policy database. Use `podman exec mcp-opa ...` for dev
  # queries, or restore the port temporarily with `ports: ["127.0.0.1:8181:8181"]`.
  opa:
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-format=json"
      - "--log-level=debug"
      - "--bundle"
      - "/rego-policies"
      - "--watch"
    volumes:
      # FIX: load unsigned rego dir from a non-overlapping path. /policies holds
      # only bundle.tar.gz (prod mount), so --bundle /policies loaded nothing and
      # defaulted roots to [""] (owns all paths) -> deny-all + grants PUT 400.
      # rego/.manifest scopes roots to ["mcp"], leaving data.mcp_grants writable.
      - ./policies/rego:/rego-policies:ro

  # ── Loki: expose for direct LogQL queries from host ───────────────────────
  loki:
    ports:
      - "3100:3100"

  # ── Grafana (main observability): expose directly ─────────────────────────
  grafana:
    ports:
      - "3000:3000"

  # ── Seed script — runs once, populates Vault, Grafana, NetBox, Gitea ─────────
  lab-seeder:
    build: ./lab/seeder
    container_name: lab-seeder
    restart: "no"
    depends_on:
      lab-grafana:
        condition: service_healthy
      lab-netbox:
        condition: service_healthy
      lab-gitea:
        condition: service_healthy
      db:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - lab-net
      - internal-net
      - vault-net
    env_file:
      - .env
      - .env.lab
    # Bind-mount the host .env.lab so the seeder's secret write-backs (broker
    # master, grafana/gitea/self-service tokens) PERSIST to the host file rather
    # than vanishing into the container FS. Without this, a dev-mode Vault wipe
    # could not be recovered because the persisted master would be lost too.
    volumes:
      - ./.env.lab:/app/.env.lab
    environment:
      VAULT_ADDR: http://mcp-vault:8200
      # Write secret-backfills to the bind-mounted host file (see volumes above).
      ENV_LAB_WRITE_PATH: /app/.env.lab
      LAB_GRAFANA_URL: http://lab-grafana:3000
      LAB_NETBOX_URL: http://lab-netbox:8080
      # NetBox now boots with a deterministic SUPERUSER_API_TOKEN (see the
      # lab-netbox service above), so the seeder reads LAB_NETBOX_ADMIN_TOKEN
      # directly from .env.lab/.env.lab.example instead of the old
      # lab-setup.sh Step 8 login-then-mint dance (unprefixed NETBOX_ADMIN_TOKEN,
      # written only by full `lab-setup.sh`, never by `lab-reset`/`lab-up` —
      # which is exactly why a clean `lab-reset` always 403'd on NetBox seeding).
      LAB_NETBOX_ADMIN_TOKEN: ${LAB_NETBOX_ADMIN_TOKEN:-}
      LAB_GITEA_URL: http://lab-gitea:3000
      LAB_GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-gitadmin}
      LAB_GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD:-labpassword}
      DB_HOST: mcp-db
      DB_NAME: mcp_security
      DB_USER: mcp_app

  # ── Mock Graph API — stub for AZURE_MODE=mock (PRD-0002 case 1) ─────────────
  lab-mock-graph:
    build:
      context: ./lab/mock-graph
      dockerfile: Dockerfile
    container_name: lab-mock-graph
    networks:
      - lab-net
      - mcp-m365-net   # reachable from lab-mcp-m365 when AZURE_MODE=mock
    restart: unless-stopped
    # No 'profiles: mock' gate: the lab always runs M365 in mock mode now
    # (M365_GRAPH_BASE/M365_TOKEN_URL in .env.lab point here; entra_user_token
    # delegated flow depends on this stub being up).

# ── Named volumes ────────────────────────────────────────────────────────────
volumes:
  lab-grafana-data:
  lab-netbox-db-data:
  lab-gitea-data:
  lab-keycloak-data:

# ── Networks ─────────────────────────────────────────────────────────────────
# NOTE ON ALLOWLIST DRIFT: podman assigns these bridge subnets sequentially from
# its default 10.89.0.0/16 pool. Adding/removing/reordering a network here
# RENUMBERS the others' subnets on the next `up`. server_registry rows pin an
# upstream_allowlist_entry CIDR for the invoke-time DNS-rebind check
# (services/server_onboarding.revalidate_upstream_ip_at_invoke); a row pinned to a
# narrow /24 will start denying with `upstream_revalidation_failed` after any
# renumber. Lab convention is therefore /16 for every lab server row so it tolerates
# renumbering. If you add a network here, keep lab allowlist entries at 10.89.0.0/16.
networks:
  lab-net:
    driver: bridge
    # internal: true — prevents lab services from reaching the internet directly.
    # (Task 2.4). Host-published ports remain accessible from the host machine.
    # Services that need internet egress (lab-mcp-m365) must use mcp-egress-net
    # via the allowlisting squid proxy (lab-egress-proxy).
    internal: true
  # lab-seeder (and lab-grafana, for observability-net) needs to reach
  # networks the BASE docker-compose.yml already defines (mcp-db, mcp-vault,
  # Loki, etc.).
  #
  # These 9 networks used to be redeclared here as `external: true` with an
  # explicit `name:` matching the base file's auto-generated name
  # (`<project>_<key>`, e.g. mcp-security-platform_vault-net), on the theory
  # that this just "points at" the network the base file creates. It doesn't:
  # `external: true` tells compose the network must ALREADY exist, and
  # compose refuses to create it. Since the base file's definition has no
  # custom name either, both forms resolve to the identical final network
  # name — the override achieved nothing except making a genuinely-from-
  # scratch `up` fail outright with "network ... declared as external, but
  # could not be found" (confirmed empirically: wiped the lab, booted clean,
  # hit this immediately — this exact 3-file combination had apparently
  # never been exercised from truly nothing before). Removed entirely; the
  # base file's plain (non-external) definitions are what these lab services
  # actually attach to.
  # ── Per-MCP pairwise networks (Task 2.2a+2.2b) ───────────────────────────
  # Each is internal: true — no routing to/from the host or other containers
  # except the proxy. MCP servers cannot reach each other or platform backends.
  mcp-grafana-net:
    driver: bridge
    internal: true
  mcp-netbox-net:
    driver: bridge
    internal: true
  mcp-gitea-net:
    driver: bridge
    internal: true
  # ── HIGH-2: dedicated MCP<->backend nets (each MCP server + ONLY its backend),
  # replacing the shared lab-net path that let MCP servers reach each other. ──
  mcp-gitea-backend-net:
    driver: bridge
    internal: true
  mcp-netbox-backend-net:
    driver: bridge
    internal: true
  mcp-grafana-backend-net:
    driver: bridge
    internal: true
  mcp-m365-net:
    driver: bridge
    internal: true
  mcp-entra-id-net:
    driver: bridge
    internal: true
  mcp-rag-assistant-net:
    driver: bridge
    internal: true
  mcp-echo-net:
    driver: bridge
    internal: true
  mcp-test-api-net:
    driver: bridge
    internal: true
  mcp-catfacts-net:
    driver: bridge
    internal: true
  mcp-fetch-net:
    driver: bridge
    internal: true
  mcp-notes-net:
    driver: bridge
    internal: true
  mcp-self-service-net:
    driver: bridge
    internal: true
  mcp-search-net:
    driver: bridge
    internal: true
  mcp-lab-tickets-net:
    driver: bridge
    internal: true
  # Notes sidecar net — only lab-mcp-notes + lab-notes-redis; proxy is NOT on this net
  notes-private-net:
    driver: bridge
    internal: true
  # Egress path for lab-mcp-m365 to reach MS identity/Graph (Task 2.4)
  mcp-egress-net:
    driver: bridge
    internal: false   # this net has internet access via lab-egress-proxy NAT
  # CR-14 / WP-B1: egress path for scanner-worker to reach configured git
  # provider hosts + vuln-feed hosts. Overrides docker-compose.yml's
  # internal:true default — same allowlisting egress-proxy pattern as
  # mcp-egress-net above, reusing lab-egress-proxy rather than a second squid.
  scanner-worker-egress-net:
    driver: bridge
    internal: false   # internet access via lab-egress-proxy NAT, allowlisted

# ── Secrets ──────────────────────────────────────────────────────────────────
# Override the base docker-compose.yml's step_ca_password secret to point at
# the lab-specific password file. The base secret defines ONLY `file:` (no
# `environment:` key) — a stale comment here previously claimed the base used
# `environment:` and added a matching `environment: ""` override to "null it
# out" during the deep merge. That's wrong on current docker-compose.yml, and
# the empty string still counts as "environment is set" to a Compose Spec v2
# validator, so the merged secret ends up with BOTH `file:` and `environment:`
# — which docker-compose (real v2 binary; podman-compose now shells out to it
# as an external provider) rejects outright: "file|environment attributes are
# mutually exclusive". Just override `file:`; there is no `environment:` key
# in the base to suppress.
secrets:
  step_ca_password:
    file: ./lab/step-ca-password

---
# Lab overlay — add real upstream targets and a local OIDC provider.
#
# Usage:
#   podman compose \
#     -f docker-compose.yml \
#     -f docker-compose.dev.yml \
#     -f podman-compose.lab.yml \
#     up -d
#
# All lab services live on lab-net (bridge, internal: false) so localhost
# ports are reachable from the host browser.  The seeder also joins
# internal-net and vault-net to reach mcp-db and mcp-vault.

# ── MCP server hardening profile (Task 2.3, ISO-F1.6) ────────────────────────
# Applied to every lab MCP service via YAML merge key (<<: *mcp-hardening).
# Matches the sandbox hardening profile in docker-compose.yml plus a seccomp
# filter and resource limits appropriate for lab MCP workloads.
#
# Seccomp: sandbox/files/seccomp/mcp-sandbox.json (relative to repo root).
# In rootless Podman the seccomp path must be absolute or relative to the
# podman-compose working directory; both resolve correctly from the repo root.
#
# read_only: true — MCP servers should write nothing to the container FS.
# /tmp is writable via tmpfs if needed (add per-service if required).
#
# Non-root user: set per Dockerfile (USER 1001); the compose user: field
# is redundant when the image enforces it, but explicit here for clarity.
x-mcp-hardening: &mcp-hardening
  read_only: true
  security_opt:
    - no-new-privileges:true
    - seccomp:sandbox/files/seccomp/mcp-sandbox.json
  cap_drop:
    - ALL
  pids_limit: 64
  deploy:
    resources:
      limits:
        memory: 256m
        cpus: "0.5"
  user: "1001:1001"
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=32m

services:

  # ── Keycloak IDP (replaces/augments Dex for full OAuth2 + PKCE + token exchange)
  lab-keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: lab-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-adminpassword}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      # Variable substitution in realm import (Keycloak 24 supports KC_* env vars in realm JSON)
      KC_PROXY_CLIENT_SECRET: ${KC_PROXY_CLIENT_SECRET:-mcp-proxy-secret}
      KC_GRAFANA_CLIENT_SECRET: ${KC_GRAFANA_CLIENT_SECRET:-grafana-secret}
      DEX_ALICE_PASSWORD: ${DEX_ALICE_PASSWORD:-labpassword}
      DEX_BOB_PASSWORD: ${DEX_BOB_PASSWORD:-labpassword}
      LAB_HOST: ${LAB_HOST:-localhost}
      # Cap JVM heap so the Quarkus build phase isn't OOM-killed in rootless Podman (6 GB machine)
      JAVA_OPTS_KC_HEAP: "-Xms64m -Xmx512m"
    volumes:
      - ./lab/keycloak/realm-mcp.json:/opt/keycloak/data/import/realm-mcp.json:ro
      - lab-keycloak-data:/opt/keycloak/data
    ports:
      - "8082:8080"    # Keycloak admin console + OIDC endpoints
    networks:
      - lab-net
      - gateway-net    # proxy must reach Keycloak for JWKS and token validation
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080 && echo -e \"GET /realms/mcp HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && head -1 <&3 | grep -q 200' && exit 0 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ── Keycloak seeder — updates client secrets from env vars post-import ─────
  lab-keycloak-seeder:
    image: alpine:3.19
    container_name: lab-keycloak-seeder
    restart: "no"
    depends_on:
      lab-keycloak:
        condition: service_healthy
    volumes:
      - ./lab/keycloak/seed.sh:/seed.sh:ro
    command: ["sh", "-c", "apk add --no-cache curl jq bash -q && bash /seed.sh"]
    environment:
      KC_URL: http://lab-keycloak:8080
      KC_REALM: mcp
      KC_ADMIN: admin
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-adminpassword}
      KC_PROXY_CLIENT_SECRET: ${KC_PROXY_CLIENT_SECRET:-mcp-proxy-secret}
      KC_GRAFANA_CLIENT_SECRET: ${KC_GRAFANA_CLIENT_SECRET:-grafana-secret}
    networks:
      - lab-net

  # ── Local OIDC / OAuth2 provider (Dex — kept for backward compatibility) ────
  lab-dex:
    image: ghcr.io/dexidp/dex:v2.38.0
    container_name: lab-dex
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./lab/dex/config.lab.yaml:/etc/dex/config.yaml:ro
    ports:
      - "5556:5556"
    networks:
      - lab-net
      - gateway-net    # proxy must reach Dex for JWKS and token validation
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5556/dex/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Lab Grafana (port 3001 — avoids conflict with observability on 3000) ────
  # Also joins observability-net so it can reach mcp-loki:3100.
  # Keycloak SSO is wired via generic_oauth; fallback to local admin remains.
  lab-grafana:
    image: grafana/grafana-oss:11.0.0
    container_name: lab-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${LAB_GRAFANA_ADMIN_PASSWORD:-labpassword}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Keycloak SSO via generic_oauth
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Keycloak"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${KC_GRAFANA_CLIENT_SECRET:-grafana-secret}
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email roles"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "http://${LAB_HOST:-localhost}:8082/realms/mcp/protocol/openid-connect/auth"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "http://lab-keycloak:8080/realms/mcp/protocol/openid-connect/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "http://lab-keycloak:8080/realms/mcp/protocol/openid-connect/userinfo"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(roles[*], 'grafana-admin') && 'Admin' || contains(roles[*], 'grafana-editor') && 'Editor' || 'Viewer'"
      GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: "true"
    volumes:
      - lab-grafana-data:/var/lib/grafana
      - ./lab/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - lab-net
      - observability-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── NetBox backing database ──────────────────────────────────────────────────
  lab-netbox-db:
    image: postgres:16-alpine
    container_name: lab-netbox-db
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: ${LAB_NETBOX_DB_PASSWORD:-labpassword}
    volumes:
      - lab-netbox-db-data:/var/lib/postgresql/data
    networks:
      - lab-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netbox"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── NetBox Redis cache / task queue ─────────────────────────────────────────
  lab-netbox-redis:
    image: redis:7-alpine
    container_name: lab-netbox-redis
    command: redis-server --requirepass ${LAB_NETBOX_REDIS_PASSWORD:-labpassword}
    networks:
      - lab-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${LAB_NETBOX_REDIS_PASSWORD:-labpassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── NetBox IPAM / DCIM ───────────────────────────────────────────────────────
  lab-netbox:
    image: netboxcommunity/netbox:v4.2
    container_name: lab-netbox
    ports:
      - "8090:8080"
    depends_on:
      lab-netbox-db:
        condition: service_healthy
      lab-netbox-redis:
        condition: service_healthy
    environment:
      DB_HOST: lab-netbox-db
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: ${LAB_NETBOX_DB_PASSWORD:-labpassword}
      REDIS_HOST: lab-netbox-redis
      REDIS_PASSWORD: ${LAB_NETBOX_REDIS_PASSWORD:-labpassword}
      SECRET_KEY: ${LAB_NETBOX_SECRET_KEY:-change-me-32-chars-minimum-here}
      SUPERUSER_EMAIL: admin@lab.local
      SUPERUSER_PASSWORD: ${LAB_NETBOX_ADMIN_PASSWORD:-labpassword}
      ALLOWED_HOSTS: "lab-netbox localhost 127.0.0.1 ${LAB_HOST:-localhost}"
      SKIP_SUPERUSER: "false"
    networks:
      - lab-net
    healthcheck:
      # 403 = auth required = NetBox is up; curl -f fails on >=400 so use -s + grep
      test: ["CMD-SHELL", "curl -s http://localhost:8080/api/ | grep -q 'detail\\|Authentication' && exit 0 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s
    restart: unless-stopped

  # ── Grafana MCP Server — points to real Grafana instance ────────────────────
  # Set GRAFANA_URL and GRAFANA_SERVICE_ACCOUNT_TOKEN in .env.lab
  lab-mcp-grafana:
    <<: *mcp-hardening
    # user: override — mcp-grafana binary runs as root by default; override to 65534 (nobody)
    # TODO: confirm grafana/mcp-grafana supports non-root before removing user override
    user: "65534:65534"
    # 0.4.2 no longer exists on DockerHub; use latest stable for lab.
    image: grafana/mcp-grafana:0.14.0
    container_name: lab-mcp-grafana
    command:
      - "-transport"
      - "streamable-http"
      - "-address"
      - "0.0.0.0:8000"
    ports:
      - "127.0.0.1:8100:8000"
    environment:
      GRAFANA_URL: "${GRAFANA_URL}"
      GRAFANA_SERVICE_ACCOUNT_TOKEN: "${GRAFANA_SERVICE_ACCOUNT_TOKEN}"
    depends_on:
      lab-grafana:
        condition: service_healthy
    networks:
      - lab-net
      - mcp-grafana-net   # pairwise net with proxy only; replaces internal-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=4)\" 2>/dev/null || python3 -c \"import urllib.request,json; urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'ping','id':1}).encode(),headers={'Content-Type':'application/json'},method='POST'),timeout=4)\" 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── NetBox MCP Server — points to real NetBox instance ──────────────────────
  # Set NETBOX_URL and NETBOX_TOKEN in .env.lab
  mcp-netbox:
    <<: *mcp-hardening
    build: ./lab/mcp-servers/netbox
    image: mcp-netbox-server:lab
    container_name: mcp-netbox
    ports:
      - "127.0.0.1:8101:8000"
    environment:
      NETBOX_URL: "${NETBOX_URL}"
      NETBOX_TOKEN: "${NETBOX_TOKEN}"
      TRANSPORT: "http"
      HOST: "0.0.0.0"
      PORT: "8000"
      VERIFY_SSL: "false"
    depends_on:
      lab-netbox:
        condition: service_healthy
    networks:
      - lab-net
      - mcp-netbox-net   # pairwise net with proxy only; replaces internal-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Gitea — self-hosted Git server (Bitbucket equivalent) ───────────────────
  lab-gitea:
    build: ./lab/gitea
    image: lab-gitea:lab
    container_name: lab-gitea
    ports:
      - "3002:3000"
      - "2222:22"
    environment:
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__server__DOMAIN: ${LAB_HOST:-localhost}
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__ROOT_URL: "http://${LAB_HOST:-localhost}:3002/"
      GITEA__server__SSH_PORT: "2222"
      GITEA__log__LEVEL: warn
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-gitadmin}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD:-labpassword}
      GITEA_ADMIN_EMAIL: ${GITEA_ADMIN_EMAIL:-admin@lab.local}
    volumes:
      - lab-gitea-data:/data
    networks:
      - lab-net
    healthcheck:
      test: ["CMD-SHELL", "wget -T 30 -qO- http://localhost:3000/api/healthz 2>/dev/null | grep -q 'pass' && exit 0 || exit 1"]
      interval: 15s
      timeout: 35s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  # ── Gitea MCP Server ─────────────────────────────────────────────────────────
  # GITEA_TOKEN removed (Task 2.5): credential is broker-injected via credential_store.
  # The proxy injects the token as Authorization header; server.py reads it from there.
  lab-mcp-gitea:
    <<: *mcp-hardening
    build: ./lab/mcp-servers/gitea
    image: lab-mcp-gitea:lab
    container_name: lab-mcp-gitea
    ports:
      - "127.0.0.1:8102:8000"
    environment:
      GITEA_URL: "http://lab-gitea:3000"
      TRANSPORT: "http"
      HOST: "0.0.0.0"
      PORT: "8000"
    depends_on:
      lab-gitea:
        condition: service_healthy
    networks:
      - lab-net
      - mcp-gitea-net   # pairwise net with proxy only; replaces internal-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── M365 MCP Server — softeria/ms-365-mcp-server via Graph app-only token ───
  # AZURE_CLIENT_SECRET removed (Task 2.5): credential is broker-injected via
  # credential_store (entra_client_credentials mode). Proxy injects it at call time.
  # Egress traffic to *.microsoftonline.com / *.graph.microsoft.com routes via
  # the egress proxy on the mcp-egress-net (Task 2.4).
  lab-mcp-m365:
    <<: *mcp-hardening
    build: ./lab/mcp-servers/m365
    image: lab-mcp-m365:lab
    container_name: lab-mcp-m365
    ports:
      - "127.0.0.1:8103:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      SERVER_NAME: "m365-mcp"
      # Entra app-only identity fields (not secret) — needed for token exchange.
      AZURE_TENANT_ID: "${AZURE_TENANT_ID}"
      AZURE_CLIENT_ID: "${AZURE_CLIENT_ID}"
      # AZURE_CLIENT_SECRET deliberately absent — injected by broker at call time.
      M365_USER: "${M365_USER:-}"
      REQUIRE_DELEGATED: "${REQUIRE_DELEGATED:-}"
      NATIVE_AUTH: "${NATIVE_AUTH:-}"
      M365_RESOURCE_URL: "${M365_RESOURCE_URL:-http://203.0.113.10:8000/mcp}"
      # Route Entra/Graph egress through the allowlisting forward proxy (Task 2.4).
      HTTPS_PROXY: "http://lab-egress-proxy:3128"
      NO_PROXY: "lab-mcp-m365,localhost,127.0.0.1"
    networks:
      - mcp-m365-net    # pairwise net with proxy only; replaces internal-net
      - mcp-egress-net  # egress-only path to lab-egress-proxy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── gateway: Podman/macOS compatibility override ─────────────────────────────
  # ── RAG Assistant — developer onboarding + doc search MCP server ────────────
  lab-rag-assistant:
    <<: *mcp-hardening
    build: ./lab/mcp-servers/rag-assistant
    image: lab-rag-assistant:lab
    container_name: lab-rag-assistant
    ports:
      - "127.0.0.1:8104:8000"
    environment:
      DOCS_DIR: "/app/docs"
      KB_DIR: "/app/kb"
      TRANSPORT: "http"
      HOST: "0.0.0.0"
      PORT: "8000"
    volumes:
      # Mount platform docs and KB read-only so the index stays current
      - ./docs:/app/docs:ro
    networks:
      - lab-net
      - mcp-rag-assistant-net   # pairwise net with proxy only; replaces internal-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Echo MCP — stress-test and auth-verification target ─────────────────────
  lab-mcp-echo:
    <<: *mcp-hardening
    build:
      context: ./lab/mcp-servers/echo
    image: lab-mcp-echo:lab
    container_name: lab-mcp-echo
    ports:
      - "127.0.0.1:8105:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      SERVER_NAME: "echo-mcp"
      FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION: "false"
    networks:
      - lab-net
      - mcp-echo-net   # pairwise net with proxy only; replaces internal-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Notes MCP — per-user isolated notes (approach A credential injection) ───
  # Task 2.2b: removed from proxy-redis-net + REDIS_PASSWORD env.
  # Notes uses its own private Redis sidecar (lab-notes-redis) on notes-private-net.
  # The proxy reaches notes via mcp-notes-net (pairwise, no Redis there).
  # Two networks:
  #   mcp-notes-net    — proxy ↔ lab-mcp-notes (pairwise, no Redis)
  #   notes-private-net — lab-mcp-notes ↔ lab-notes-redis (no proxy, no platform)
  lab-mcp-notes:
    <<: *mcp-hardening
    build:
      context: ./lab/mcp-servers/notes
    image: lab-mcp-notes:lab
    container_name: lab-mcp-notes
    ports:
      - "127.0.0.1:8106:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      REDIS_URL: "redis://lab-notes-redis:6379/0"
      FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION: "false"
    depends_on:
      lab-notes-redis:
        condition: service_healthy
    networks:
      - mcp-notes-net      # proxy ↔ lab-mcp-notes pairwise
      - notes-private-net  # lab-mcp-notes ↔ lab-notes-redis only
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Notes private Redis — isolated sidecar, no auth required (no external access) ──
  lab-notes-redis:
    image: redis:7-alpine
    container_name: lab-notes-redis
    command: redis-server --save ""   # no persistence needed for ephemeral lab notes
    networks:
      - notes-private-net   # ONLY reachable from lab-mcp-notes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ── Self-Service MCP — per-identity MCP permission management ───────────────
  # Task 2.2b: removed from proxy-db-net + DATABASE_URL env.
  # Now a thin HTTP client of the proxy profile API (proxy/app/routers/profiles.py).
  # Authentication: SELF_SERVICE_API_KEY — a service API key seeded into api_keys
  # by lab/seeder/seed.py and granted "agent" role. The proxy injects X-User-Sub/
  # X-User-Role into every call; the self-service server forwards those as the
  # `principal` parameter when calling the proxy profile API on behalf of the user.
  # The proxy is reachable via mcp-self-service-net (pairwise, internal: true).
  lab-mcp-self-service:
    <<: *mcp-hardening
    build:
      context: ./lab/mcp-servers/self-service
    image: lab-mcp-self-service:lab
    container_name: lab-mcp-self-service
    ports:
      - "127.0.0.1:8108:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      # Proxy profile API endpoint (reachable via pairwise net)
      PROXY_PROFILE_API_URL: "http://mcp-proxy:8000/api/v1/profiles"
      # Service API key — seeded by lab/seeder/seed.py into api_keys table
      SELF_SERVICE_API_KEY: "${SELF_SERVICE_API_KEY:-lab-self-service-key}"
      FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION: "false"
    networks:
      - mcp-self-service-net   # pairwise with proxy only; no DB/Redis access
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Search MCP — shared SA scenario (approach B credential injection) ────────
  lab-mcp-search:
    <<: *mcp-hardening
    build:
      context: ./lab/mcp-servers/search
    image: lab-mcp-search:lab
    container_name: lab-mcp-search
    ports:
      - "127.0.0.1:8107:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION: "false"
    networks:
      - lab-net
      - mcp-search-net   # pairwise net with proxy only; replaces internal-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/mcp',data=json.dumps({'jsonrpc':'2.0','method':'initialize','id':1,'params':{'protocolVersion':'2024-11-05','capabilities':{},'clientInfo':{'name':'hc','version':'1'}}}).encode(),headers={'Content-Type':'application/json','Accept':'application/json, text/event-stream'},method='POST')); sys.exit(0 if b'serverInfo' in r.read() else 1)\" 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Production config requires step-ca server cert at /etc/nginx/certs/ which is
  # not provisioned automatically. Lab uses:
  #   - lab/nginx/nginx.conf as a writable placeholder (CRS template overwrites it)
  #   - lab/nginx/conf.d with mTLS-free config using CRS self-signed cert
  # docker-compose merges volumes by target, so these replace the base mounts.
  gateway:
    # modsecurity-crs 4.14.0-nginx-alpine tag no longer exists; use latest CRS4 + nginx.
    image: owasp/modsecurity-crs:4.25.0-nginx-lts
    # read_only: true from *security-hardening blocks nginx template init writes.
    read_only: false
    # rootless Podman: run as root so nginx master can bind ports 80/443 inside
    # the container's network namespace (maps to 8088/8443 on the host).
    user: root
    # Restore caps dropped by *security-hardening: nginx chowns cache/temp dirs to
    # the worker user (uid 101) at startup; SETUID/SETGID needed for worker privilege drop.
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    # 91-update-resolver.sh uses `sed -i` (creates temp + renames) which fails on
    # bind mounts in rootless Podman. Run the CRS init steps explicitly (no shell
    # loop vars — $var in compose command strings is expanded at create time, not
    # at container runtime, producing empty strings). Skip step 91; remove the
    # literal "resolver RESOLVERS" placeholder with grep instead.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "[ -x /docker-entrypoint.d/01-check-low-port.sh ] && /docker-entrypoint.d/01-check-low-port.sh || true;
        [ -x /docker-entrypoint.d/10-generate-certificate.sh ] && /docker-entrypoint.d/10-generate-certificate.sh || true;
        [ -x /docker-entrypoint.d/10-listen-on-ipv6-by-default.sh ] && /docker-entrypoint.d/10-listen-on-ipv6-by-default.sh || true;
        [ -f /docker-entrypoint.d/15-local-resolvers.envsh ] && . /docker-entrypoint.d/15-local-resolvers.envsh || true;
        [ -x /docker-entrypoint.d/20-envsubst-on-templates.sh ] && /docker-entrypoint.d/20-envsubst-on-templates.sh || true;
        [ -x /docker-entrypoint.d/30-tune-worker-processes.sh ] && /docker-entrypoint.d/30-tune-worker-processes.sh || true;
        [ -x /docker-entrypoint.d/90-copy-modsecurity-config.sh ] && /docker-entrypoint.d/90-copy-modsecurity-config.sh || true;
        grep -v 'resolver RESOLVERS' /etc/nginx/nginx.conf > /tmp/nginx-patched.conf 2>/dev/null && cat /tmp/nginx-patched.conf > /etc/nginx/nginx.conf || true;
        echo '# replaced by mcp-proxy-lab.conf' > /etc/nginx/conf.d/default.conf;
        exec nginx -g 'daemon off;'"
    # Gateway ports driven by GATEWAY_HTTP_PORT / GATEWAY_HTTPS_PORT in .env.lab
    # (8088:80 and 8443:443) — no port override needed here.
    volumes:
      - ./lab/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./lab/nginx/conf.d:/etc/nginx/conf.d
      - ./lab/nginx/lab-certs:/etc/nginx/lab-certs:ro
      # bind-mount all three modsecurity.d config files — the container rootfs is read_only:true
      # so 90-copy-modsecurity-config.sh cannot create new files there at runtime.
      - ./lab/modsecurity-crs/modsecurity.conf:/etc/modsecurity.d/modsecurity.conf
      - ./lab/modsecurity-crs/modsecurity-override.conf:/etc/modsecurity.d/modsecurity-override.conf
      - ./lab/modsecurity-crs/setup.conf:/etc/modsecurity.d/setup.conf

  # ── Alertmanager: null receiver + read_only: false for rootless Podman ───────
  # *security-hardening sets read_only: true which prevents tmpfs writes in Podman.
  # Lab uses a null receiver so alertmanager starts without needing real webhook URLs.
  alertmanager:
    read_only: false
    volumes:
      - ./lab/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  # ── Redis: rootless Podman — start as redis user directly so su-exec is never called
  redis:
    user: "redis"
    security_opt:
      - no-new-privileges:false

  # ── MinIO: remap host ports to avoid clash with other projects on :9000/:9001 ──
  minio:
    ports:
      - "9002:9000"
      - "9003:9001"

  # ── minio-init: RELEASE tag pinned in docker-compose.yml no longer exists; use latest ──
  minio-init:
    image: minio/mc:latest

  # ── step-ca: secret handled via top-level secrets block (file: ./lab/step-ca-password) ──
  # No volume-bind override needed; podman-compose resolves it via secrets:.

  # ── Vault — LAB ONLY: switch to dev mode (in-memory, well-known root token).
  # The base compose runs Vault with a file storage backend that requires
  # init+unseal. For lab smoke tests we want a one-command bring-up, so the
  # overlay flips Vault into dev mode and exposes the API port to the host.
  # NEVER apply this overlay in production.
  vault:
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_TOKEN:-lab-root-token}"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      # Clear the production VAULT_LOCAL_CONFIG inherited from the base compose
      # so the dev-mode command isn't told to look at a JSON config it doesn't use.
      VAULT_LOCAL_CONFIG: ""
    # rootless Podman: bypass docker-entrypoint.sh which calls `setcap` — that
    # operation is unsupported in rootless mode and causes a crash loop.
    # Run vault directly; dev mode disables mlock automatically (no IPC_LOCK needed).
    entrypoint: ["vault", "server", "-dev"]
    command: []
    read_only: false
    security_opt:
      - no-new-privileges:false
    ports:
      # Remapped to 8201 — port 8200 is used by isl-vault from intentional-secrets-lab
      - "8201:8200"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1:8200/v1/sys/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ── Promtail: Podman/macOS compatibility override ────────────────────────────
  # Production promtail.yml uses docker_sd_configs which require
  # /var/run/docker.sock and /var/lib/docker/containers. Neither exists in
  # rootless Podman on macOS. Override volumes (by target-path merge) with
  # a lab config that uses static scrape only.
  promtail:
    user: "0:1000"
    # Disable SELinux label enforcement so the container can connect to the
    # Podman socket. Required in Fedora CoreOS (SELinux-enforcing) Podman VMs.
    security_opt:
      - label=disable
    volumes:
      - ./observability/loki/promtail-lab.yml:/etc/promtail/promtail.yml:ro
      # Mount the ACTUAL socket (not the /run/docker.sock symlink — symlink
      # target doesn't resolve inside the container's namespace).
      # Path is resolved by Podman daemon inside the VM.
      - /run/user/501/podman/podman.sock:/var/run/docker.sock
      # Override the production /var/lib/docker/containers mount.
      - /tmp:/var/lib/docker/containers:ro

  # ── Proxy: dev-style build + hot-reload (was in docker-compose.dev.yml) ──────
  # Drop docker-compose.dev.yml from the lab stack to avoid MinIO port conflicts.
  # We reproduce only the parts the lab needs here.
  # ── Mock IdP — click-to-login OAuth 2.1 / OIDC for lab testing ─────────────
  lab-mock-idp:
    build: ./lab/mock-idp
    image: lab-mock-idp:lab
    container_name: lab-mock-idp
    ports:
      - "8888:8888"
    environment:
      HOST: "0.0.0.0"
      PORT: "8888"
      MOCK_IDP_ISSUER: "http://${LAB_HOST:-localhost}:8888"
    networks:
      - lab-net
      - gateway-net   # lets the proxy reach lab-mock-idp by name for JWKS / token verification
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8888/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  proxy:
    depends_on:
      opa:
        condition: service_started
      lab-dex:
        condition: service_healthy
      lab-keycloak:
        condition: service_healthy
    build:
      context: .
      dockerfile: proxy/Dockerfile
      target: development
    volumes:
      - ./proxy:/app:cached
      - ./policies/rego:/app/policies:ro
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - RELOAD=true
      # Option B: derive the OIDC callback URL from the incoming request's Host
      # header so the proxy works from any IP (LAN, Tailscale, localhost) without
      # reconfiguring PROXY_BASE_URL. Safe here because all traffic is on trusted
      # local/VPN networks and Keycloak's realm whitelists port-8000 callbacks.
      - OIDC_TRUST_FORWARDED_HOST=true
      - PROXY_BASE_URL=
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app
      --log-level debug
    ports:
      - "8000:8000"
      - "5678:5678"
    env_file:
      - .env
      - .env.lab
    networks:
      - gateway-net
      - step-ca-net
      - vault-net
      - proxy-opa-net
      - proxy-ollama-net
      - proxy-redis-net
      - proxy-db-net
      - lab-net             # lab: proxy reverse proxy to lab-netbox, lab-grafana, lab-keycloak
      # Pairwise nets — one per MCP server; replaces flat internal-net (Task 2.2a+2.2b)
      - mcp-grafana-net
      - mcp-netbox-net
      - mcp-gitea-net
      - mcp-m365-net
      - mcp-rag-assistant-net
      - mcp-echo-net
      - mcp-notes-net
      - mcp-self-service-net
      - mcp-search-net

  # ── DB: several rootless-Podman overrides needed:
  # - user: postgres → avoid su-exec user-switch failure
  # - read_only: false → postgres needs /var/run/postgresql for lock file
  # - security_opt: no-new-privileges:false → allow internal uid management
  # - port 5434 → avoids rootlessport conflict with stale 5432 binding
  db:
    user: "postgres"
    read_only: false
    security_opt:
      - no-new-privileges:false
    # /var/run/postgresql tmpfs already defined in base compose (mode=0755).
    # Do not re-add here — compose list-merge would create a duplicate mount.
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD:-devpassword}

  # ── OPA: NOT exposed to host — reachable only from proxy on proxy-opa-net.
  # RT-005 fix: OPA has no authentication; exposing :8181 lets any host process
  # read the full grants/policy database. Use `podman exec mcp-opa ...` for dev
  # queries, or restore the port temporarily with `ports: ["127.0.0.1:8181:8181"]`.
  opa:
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-format=json"
      - "--log-level=debug"
      - "--bundle"
      - "/policies"
      - "--watch"

  # ── Loki: expose for direct LogQL queries from host ───────────────────────
  loki:
    ports:
      - "3100:3100"

  # ── Grafana (main observability): expose directly ─────────────────────────
  grafana:
    ports:
      - "3000:3000"

  # ── Seed script — runs once, populates Vault, Grafana, NetBox, Gitea ─────────
  lab-seeder:
    build: ./lab/seeder
    container_name: lab-seeder
    restart: "no"
    depends_on:
      lab-grafana:
        condition: service_healthy
      lab-netbox:
        condition: service_healthy
      lab-gitea:
        condition: service_healthy
      db:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - lab-net
      - internal-net
      - vault-net
    env_file:
      - .env
      - .env.lab
    environment:
      VAULT_ADDR: http://mcp-vault:8200
      LAB_GRAFANA_URL: http://lab-grafana:3000
      LAB_NETBOX_URL: http://lab-netbox:8080
      LAB_GITEA_URL: http://lab-gitea:3000
      LAB_GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-gitadmin}
      LAB_GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD:-labpassword}
      DB_HOST: mcp-db
      DB_NAME: mcp_security
      DB_USER: mcp_app

# ── Named volumes ────────────────────────────────────────────────────────────
volumes:
  lab-grafana-data:
  lab-netbox-db-data:
  lab-gitea-data:
  lab-keycloak-data:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  lab-net:
    driver: bridge
  # Attach to networks created by the base compose so lab-seeder can reach
  # mcp-db and mcp-vault.  The project-name prefix matches the compose project
  # name derived from the directory: mcp-security-platform_.
  internal-net:
    external: true
    name: mcp-security-platform_internal-net
  vault-net:
    external: true
    name: mcp-security-platform_vault-net
  # lab-grafana joins this to reach mcp-loki:3100 for Loki datasource
  observability-net:
    external: true
    name: mcp-security-platform_observability-net
  # ── Per-MCP pairwise networks (Task 2.2a+2.2b) ───────────────────────────
  # Each is internal: true — no routing to/from the host or other containers
  # except the proxy. MCP servers cannot reach each other or platform backends.
  mcp-grafana-net:
    driver: bridge
    internal: true
  mcp-netbox-net:
    driver: bridge
    internal: true
  mcp-gitea-net:
    driver: bridge
    internal: true
  mcp-m365-net:
    driver: bridge
    internal: true
  mcp-rag-assistant-net:
    driver: bridge
    internal: true
  mcp-echo-net:
    driver: bridge
    internal: true
  mcp-notes-net:
    driver: bridge
    internal: true
  mcp-self-service-net:
    driver: bridge
    internal: true
  mcp-search-net:
    driver: bridge
    internal: true
  # Notes sidecar net — only lab-mcp-notes + lab-notes-redis; proxy is NOT on this net
  notes-private-net:
    driver: bridge
    internal: true
  # Egress path for lab-mcp-m365 to reach MS identity/Graph (Task 2.4)
  mcp-egress-net:
    driver: bridge
    internal: false   # this net has internet access via lab-egress-proxy NAT

# ── Secrets ──────────────────────────────────────────────────────────────────
# podman-compose 1.5.x does not support the Docker Compose v2 'environment:'
# secret type. Override here with a file-based definition so the lab stack can
# start without requiring STEP_CA_PROVISIONER_PASSWORD in the environment.
secrets:
  step_ca_password:
    file: ./lab/step-ca-password

# docker-compose.opa-signed.yml — F-002 / INV-012 enforcement overlay.
#
# Compose this OVER docker-compose.yml in staging/production so OPA refuses
# to load an unsigned or tampered policy bundle:
#
#   1. make sign-policy-bundle           # produces policies/bundle.tar.gz
#   2. docker compose -f docker-compose.yml -f docker-compose.opa-signed.yml up -d
#
# Dev (`make up`) keeps the read-only directory mount for iteration velocity,
# which INV-012 explicitly permits in ENVIRONMENT=development only.
#
# OPA verifies the bundle's .signatures.json against POLICY_SIGNING_KEY
# (HS256) at load time AND on every bundle refresh. scope=write means the
# signature must cover every file in the bundle.

services:
  opa:
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-format=json"
      - "--log-level=info"
      - "--set=decision_logs.console=true"
      - "--verification-key=${POLICY_SIGNING_KEY}"
      - "--verification-key-id=mcp-policy-signing-key-v1"
      - "--signing-alg=HS256"
      - "--scope=write"
      - "--bundle"
      - "/bundles/bundle.tar.gz"
    volumes:
      - ./policies/bundle.tar.gz:/bundles/bundle.tar.gz:ro

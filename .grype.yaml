# ── Vulnerability database ────────────────────────────────────────────────────
db:
  auto-update: true
  update-url: https://toolbox-data.anchore.io/grype/databases/listing.json
  # Cache DB for 24h to avoid hammering the update endpoint on every build
  max-allowed-built-age: "24h"

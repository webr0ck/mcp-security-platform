title: MCP High Anomaly Score on Tool Invocation
id: a1b2c3d4-0003-4000-8000-mcp000000003
status: stable
description: |
    A tool invocation was allowed by policy but the anomaly detection engine
    scored it > 0.85 (on a 0.0-1.0 scale). This threshold matches the OPA
    block threshold exactly (authz.rego: anomaly_score > 0.85), so every alert
    corresponds to an event that was genuinely allowed despite a critically high
    score. High anomaly scores indicate unusual call patterns: parameter
    cardinality explosion, tool-call sequences deviating from the client's
    baseline, or timing anomalies consistent with automated exfiltration.
    Mapped to ATR agent-threat pattern: exfiltration via tool calls.
references:
    - https://agentthreatrule.org/en/spec
    - https://owasp.org/www-project-top-10-for-large-language-model-applications/
author: MCP Security Platform
date: 2026-06-04
tags:
    - attack.exfiltration
    - owasp.llm.02  # Insecure Output Handling
    - mitre_atlas.AML.T0025
logsource:
    product: mcp-security-platform
    service: audit
detection:
    selection:
        event_type: TOOL_INVOCATION
        outcome: allow
        anomaly_score|gt: 0.85
    condition: selection
falsepositives:
    - Newly onboarded client whose call pattern has not yet established a baseline
    - Bulk batch job that legitimately calls the same tool many times
level: high
fields:
    - client_id
    - tool_name
    - anomaly_score
    - tool_id

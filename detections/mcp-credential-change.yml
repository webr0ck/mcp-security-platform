title: MCP Credential Change Event
id: a1b2c3d4-0004-4000-8000-mcp000000004
status: stable
description: |
    A credential was uploaded, revoked, or had its injection mode changed.
    These events should be rare and operator-initiated. Unexpected credential
    changes — especially outside business hours or from non-admin clients —
    indicate a compromised admin session or insider threat.
    Mapped to ATR agent-threat pattern: credential hijacking.
references:
    - https://agentthreatrule.org/en/spec
    - https://attack.mitre.org/techniques/T1098/
author: MCP Security Platform
date: 2026-06-04
tags:
    - attack.persistence
    - attack.t1098
    - owasp.llm.09  # Overreliance
    - mitre_atlas.AML.T0020
logsource:
    product: mcp-security-platform
    service: audit
detection:
    selection:
        event_type|contains:
            - CREDENTIAL_UPLOADED
            - CREDENTIAL_REVOKED
            - CREDENTIAL_MODE_CHANGED
    condition: selection
falsepositives:
    - Planned credential rotation during a maintenance window
    - Initial platform setup by the operator
level: medium
fields:
    - client_id
    - event_type
    - tool_id

---
# Fixture: a minimal lab compose that PASSES all MCP isolation checks.
# Used by test_check_network_isolation.py

services:
  proxy:
    image: proxy:test
    networks:
      - gateway-net
      - proxy-db-net
      - internal-net

  mcp-echo:
    image: echo:test
    networks:
      - mcp-echo-net
      - lab-net
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"

  lab-mcp-notes:
    image: notes:test
    networks:
      - mcp-notes-net
      - lab-net
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"

networks:
  gateway-net:
    driver: bridge
  proxy-db-net:
    driver: bridge
    internal: true
  internal-net:
    external: true
    name: mcp-security-platform_internal-net
  lab-net:
    driver: bridge
  mcp-echo-net:
    driver: bridge
    internal: true
  mcp-notes-net:
    driver: bridge
    internal: true

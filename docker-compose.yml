name: mcp-security-platform

# Production-like Docker Compose configuration.
# For local development overrides (hot reload, debug ports), use docker-compose.dev.yml.
# Start:             docker compose up -d
# Start with dev:    docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Security properties enforced here:
#   INV-007: MinIO WORM via minio-init (Object Lock configured at bucket creation)
#   INV-008: All secrets from .env or Docker secrets — never hardcoded
#   INV-009: mTLS enforced at gateway; proxy is not exposed to host
#   INV-012: OPA bundle signing enabled in production (ENVIRONMENT=production)
#
# Network topology (ARCHITECTURE.md §10.1):
#   gateway-net:       gateway <-> proxy (and grafana for dashboard proxy)
#   internal-net:      opa, ollama, db, redis, compliance-checker (internal: true)
#                      — proxy is NOT here (F-001); backends peer + podman lab
#   proxy-{opa,ollama,redis,db}-net: dedicated pairwise proxy<->backend (F-001)
#   observability-net: loki, promtail, grafana, alertmanager, minio, compliance-checker (internal: true)
#                      — proxy NOT here (F-001); audit ships stdout->Promtail
#   step-ca-net:       gateway, step-ca, proxy (internal: true)

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

x-restart-policy: &restart-always
  restart: always

# Shared security hardening applied to all non-gateway containers.
# Gateway (Nginx) cannot be fully read-only because it writes PID files and temp files;
# those services get tmpfs mounts instead of read_only: true.
# read_only: true pairs with tmpfs mounts on /tmp (already present per service) so
# containers have no writable layer outside declared tmpfs/volume mounts.
x-security-hardening: &security-hardening
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

networks:
  # External-facing bridge — only gateway and grafana (for dashboard proxy) are here
  gateway-net:
    driver: bridge

  # Internal service mesh — no external access; processes talk service-to-service
  internal-net:
    driver: bridge
    internal: true

  # Observability pipeline — internal; Grafana bridges to gateway-net for UI
  observability-net:
    driver: bridge
    internal: true

  # CA network — step-ca is on this isolated network
  step-ca-net:
    driver: bridge
    internal: true

  # Vault network — isolated from all other services; only the proxy reaches Vault
  vault-net:
    driver: bridge
    internal: true

  # F-001: dedicated pairwise proxy<->backend networks. The proxy is NOT on
  # the flat internal-net mesh, so a compromised sidecar (opa/ollama/redis/db)
  # can no longer reach proxy:8000 to forge an identity. Each backend keeps
  # internal-net (podman lab + peer comms) and additionally joins exactly the
  # one pairwise net the proxy dials it on.
  proxy-opa-net:
    driver: bridge
    internal: true
  proxy-ollama-net:
    driver: bridge
    internal: true
  proxy-redis-net:
    driver: bridge
    internal: true
  proxy-db-net:
    driver: bridge
    internal: true

  # CR-14 / WP-B1: pairwise scanner-worker<->db channel. scanner-worker
  # connects as scanner_worker_app (INSERT-only on scan_raw_results,
  # claim-columns-only on scan_jobs — see V063) and reaches nothing else on
  # this network; it is NOT on internal-net, so it cannot reach opa/redis/
  # ollama/proxy even if compromised by malicious repo content.
  scanner-worker-db-net:
    driver: bridge
    internal: true

  # CR-14 / WP-B1: scanner-worker egress channel. internal: true here (base
  # topology default = no internet egress at all, fail-closed-by-default);
  # the lab overlay (podman-compose.lab.yml) redefines this network with
  # internal: false and attaches it to the same allowlisting egress-proxy
  # pattern already used for lab-mcp-m365 (lab/egress-proxy/squid.conf),
  # rather than inventing a new egress mechanism.
  scanner-worker-egress-net:
    driver: bridge
    internal: true

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  loki-data:
    driver: local
  minio-data:
    driver: local
  grafana-data:
    driver: local
  ollama-models:
    driver: local
  # opa-policies is bind-mounted from ./policies/rego — not a named volume —
  # so OPA always loads the current policy files from the repo checkout.
  step-ca-data:
    driver: local
  vault-data:
    driver: local
  vault-tls:
    driver: local
  # PRD-0001 M3: shared labeler PKI volume — sidecar writes sub_ca.key + leaf.*; proxy reads leaf.* + sub_ca.crt
  labeler-data:
    driver: local
  # Shared tmpfs volume for rendered alertmanager config (init container → alertmanager)
  alertmanager-rendered:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,mode=0755"

services:

  # ============================================================
  # LAYER 1: GATEWAY
  # ============================================================

  gateway:
    # owasp/modsecurity-crs:nginx-alpine includes Nginx 1.25 + ModSecurity 3 + OWASP CRS
    # TODO @sha256: pin to immutable digest before promoting to staging/prod.
    # Run: docker pull owasp/modsecurity-crs:4.25-nginx-alpine-lts && docker inspect --format='{{index .RepoDigests 0}}' owasp/modsecurity-crs:4.25-nginx-alpine-lts
    image: owasp/modsecurity-crs:4.25-nginx-alpine-lts
    container_name: mcp-gateway
    <<: [*restart-always, *security-hardening]
    ports:
      # GATEWAY_HTTP_PORT / GATEWAY_HTTPS_PORT default to 80/443 (production).
      # Rootless Podman labs set these to 8088/8443 in .env.lab to avoid
      # binding privileged ports on the host.
      - "${GATEWAY_HTTP_PORT:-80}:80"
      - "${GATEWAY_HTTPS_PORT:-443}:443"
    volumes:
      - ./gateway/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway/nginx/conf.d:/etc/nginx/conf.d:ro
      # ModSecurity custom MCP rules (base CRS rules provided by image)
      - ./gateway/modsecurity:/etc/modsecurity.d/custom:ro
      # TLS server cert + CA cert from step-ca (read-only; step-ca owns this volume)
      - step-ca-data:/etc/nginx/certs:ro
    tmpfs:
      # Nginx needs writable /tmp for proxy temp files, body buffers, and PID
      - /tmp:size=64m,mode=1777
      - /var/cache/nginx:size=64m,mode=0755
      - /var/run:size=4m,mode=0755
      # ModSecurity CRS image creates /etc/nginx/modsecurity.d at runtime
      - /etc/nginx/modsecurity.d:size=16m,mode=0777
    networks:
      - gateway-net
      - step-ca-net
    depends_on:
      proxy:
        condition: service_healthy
      step-ca:
        condition: service_healthy
    environment:
      - NGINX_CLIENT_MAX_BODY_SIZE=${NGINX_CLIENT_MAX_BODY_SIZE:-10m}
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  step-ca:
    # Smallstep step-ca: internal CA for mTLS client/server certificates (INV-010)
    # TODO @sha256: pin to immutable digest before promoting to staging/prod.
    # Run: docker pull smallstep/step-ca:0.27.4 && docker inspect --format='{{index .RepoDigests 0}}' smallstep/step-ca:0.27.4
    image: smallstep/step-ca:0.27.4
    container_name: mcp-step-ca
    <<: [*restart-always, *security-hardening]
    # step-ca binary uses filesystem capabilities; rootless Podman requires
    # full cap set + no-new-privileges:false to exec it on macOS/Linux VM.
    # Safe: step-ca is only on step-ca-net (internal-only, no external exposure).
    security_opt:
      - no-new-privileges:false
    cap_drop: []
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
    volumes:
      - step-ca-data:/home/step
      - ./gateway/step-ca:/scripts:ro
    tmpfs:
      - /tmp:size=16m,mode=1777
    networks:
      - step-ca-net
    environment:
      - DOCKER_STEPCA_INIT_NAME=MCP Security Platform CA
      - DOCKER_STEPCA_INIT_DNS_NAMES=step-ca,localhost
      - DOCKER_STEPCA_INIT_PROVISIONER_NAME=${STEP_CA_PROVISIONER_NAME}
      # Password is injected as a Docker secret — not a plain env var (INV-008)
      - DOCKER_STEPCA_INIT_PASSWORD_FILE=/run/secrets/step_ca_password
      # INV-010: Maximum TTL is 24h — enforced in CA provisioner config
      - STEP_CA_MAX_TLS_DURATION=${STEP_CA_MAX_TLS_DURATION:-24h}
    secrets:
      - step_ca_password
    logging: *default-logging
    healthcheck:
      # step health check against the CA's own HTTPS endpoint
      test: ["CMD", "step", "ca", "health", "--ca-url", "https://localhost:9000",
             "--root", "/home/step/certs/root_ca.crt"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ============================================================
  # LAYER 2: SECURITY PROXY
  # ============================================================

  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
      target: production
    image: mcp-security-proxy:latest
    container_name: mcp-proxy
    <<: [*restart-always, *security-hardening]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    # Not exposed to host — only reachable from gateway via gateway-net
    expose:
      - "8000"
    volumes:
      # OPA policies bind-mounted read-only (git is the source of truth)
      - ./policies/rego:/app/policies:ro
      # NOTE: mcps.yaml removed (Task 9) — servers now loaded from DB registry
      # PRD-0001 M3: trust envelope labeler certs (read-only — sidecar holds sub_ca.key)
      - labeler-data:/labeler:ro
      # WP-D2 (CR-19): user/admin docs served read-only at /docs/* so portal
      # screens can link straight to the markdown source — git is the source
      # of truth, same bind-mount pattern as policies/rego above.
      - ./docs:/app/docs:ro
    tmpfs:
      - /tmp:size=64m,mode=1777
    # Non-root user (UID 1001 defined in proxy/Dockerfile)
    user: "1001:1001"
    networks:
      # F-001: inbound ONLY via gateway-net (gateway + grafana + proxy).
      # NOT on internal-net — sidecars cannot reach proxy:8000 anymore.
      - gateway-net
      # F-001: proxy is NOT on observability-net. Audit events ship via
      # stdout -> Promtail (docker_sd_configs / docker.sock), not a network
      # push, and proxy makes no call to loki/minio/alertmanager. Removing
      # it stops compliance-checker (also on observability-net) from being
      # able to reach proxy:8000.
      - step-ca-net         # cert issuance
      - vault-net           # KMS master secret (pairwise)
      - proxy-opa-net       # policy eval egress (pairwise)
      - proxy-ollama-net    # LLM risk scoring egress (pairwise)
      - proxy-redis-net     # rate/session/cache egress (pairwise)
      - proxy-db-net        # persistence egress (pairwise)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_started
    env_file:
      - .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Global per-IP anti-flood limit (middleware/audit.py::IPRateLimitMiddleware).
      # Keep production tight; the lab raises this because rootless-podman NAT +
      # Tailscale port-forwarding means every client behind that path can share
      # one apparent source IP, so a strict per-IP budget throttles ALL lab
      # traffic together rather than one real abuser.
      - IP_RATE_LIMIT_PER_MIN=${IP_RATE_LIMIT_PER_MIN:-100}
      # PRD-0001 M3: trust envelope labeler (disabled by default; run make labeler-init first)
      - TRUST_ENVELOPE_ENABLED=${TRUST_ENVELOPE_ENABLED:-false}
      - LABELER_CERT_PATH=/labeler/leaf.crt
      - LABELER_KEY_PATH=/labeler/leaf.key
      - LABELER_SUB_CA_PATH=/labeler/sub_ca.crt
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  opa:
    # OPA 0.63+ static binary image (no shell, minimal attack surface)
    image: openpolicyagent/opa:0.63.0-static
    container_name: mcp-opa
    <<: [*restart-always, *security-hardening]
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-format=json"
      - "--log-level=info"
      # INV-002: load OPA config for decision log masking of /input/params and
      # /input/arguments. This is the PRIMARY redaction path; the Promtail
      # replace stage is defense-in-depth only.
      - "--config-file=/opa-config/opa-config.yaml"
      - "--set=decision_logs.console=true"
      # INV-012: signed-only runtime policy is now the DEFAULT (HS256 symmetric,
      # identical to scripts/sign_policy_bundle.sh — no crypto-scheme change).
      # OPA verifies .signatures.json at load time AND on every bundle refresh,
      # refusing any unsigned or tampered bundle.
      # Development uses docker-compose.dev.yml which overrides with the
      # read-only directory mount (watch mode, no signature — permitted by INV-012
      # for ENVIRONMENT=development only).
      # Before starting: run `make sign-policy-bundle` to produce bundle.tar.gz.
      - "--verification-key=${POLICY_SIGNING_KEY}"
      - "--verification-key-id=mcp-policy-signing-key-v1"
      - "--signing-alg=HS256"
      # NOTE: --scope=write removed. `opa build` (the repo's only signing tool, both
      # 0.63-static and 1.17) CANNOT embed a `scope` claim into the bundle signature,
      # so every freshly signed bundle has scope=None and OPA rejected it with
      # "scope mismatch" → crashloop. The flag was never satisfiable by the repo's
      # tooling (it only survived because the bundle was never regenerated).
      # Signature integrity remains enforced via --verification-key +
      # --verification-key-id + --signing-alg (HMAC + key-id binding).
      - "--bundle"
      - "/policies/bundle.tar.gz"
    volumes:
      # Signed bundle mounted read-only — produced by `make sign-policy-bundle`.
      # OPA refuses to load if the bundle's .signatures.json does not verify
      # against POLICY_SIGNING_KEY. git is the source of truth for the Rego
      # source; bundle.tar.gz is the signed artefact derived from it.
      - ./policies/bundle.tar.gz:/policies/bundle.tar.gz:ro
      # INV-002: OPA config for decision log masking (primary redaction layer).
      - ./policies/rego/opa-config.yaml:/opa-config/opa-config.yaml:ro
    networks:
      - internal-net      # peer/lab compatibility
      - proxy-opa-net      # F-001: pairwise channel the proxy dials
    # SECURITY: OPA must NEVER be exposed to the host network in production.
    # In production: remove port mapping entirely; proxy reaches OPA via proxy-opa-net only.
    # Lab only: expose (not ports:) restricts OPA to container-internal networking only —
    # 127.0.0.1:8181 is NOT accessible from the Mac host with this configuration.
    # If you need host-side debugging in the lab, temporarily add:
    #   ports: ["127.0.0.1:8181:8181"]
    # and remove it immediately after. Never use "0.0.0.0:8181:8181" in any environment.
    expose:
      - "8181"
    # OPA static binary runs as nobody (UID 65534) by default
    user: "65534:65534"
    logging: *default-logging
    healthcheck:
      # OPA 0.63 static binary has no shell, curl, or wget.
      # Health is verified externally via http://localhost:8181/health from the host.
      # The proxy's OPA client retries on connection failure, so no blocking health
      # check is needed here. "NONE" disables the docker-level healthcheck.
      test: ["NONE"]

  ollama:
    # Ollama: local LLM inference for tool risk scoring (air-gapped, no external API)
    # TODO @sha256: pin to immutable digest before promoting to staging/prod.
    # Run: docker pull ollama/ollama:0.9.3 && docker inspect --format='{{index .RepoDigests 0}}' ollama/ollama:0.9.3
    image: ollama/ollama:0.9.3
    container_name: mcp-ollama
    <<: [*restart-always, *security-hardening]
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"
        reservations:
          memory: 512m
    volumes:
      # ollama-models persists downloaded model weights (re-pulling is slow)
      - ollama-models:/root/.ollama
    tmpfs:
      - /tmp:size=256m,mode=1777
    networks:
      - internal-net      # peer/lab compatibility
      - proxy-ollama-net   # F-001: pairwise channel the proxy dials
    expose:
      - "11434"
    environment:
      # Limit parallelism to 2 concurrent requests (risk scoring is not latency-critical)
      - OLLAMA_NUM_PARALLEL=2
      # Keep only 1 model loaded to limit memory footprint
      - OLLAMA_MAX_LOADED_MODELS=1
    logging: *default-logging
    healthcheck:
      # ollama list exits 0 when the server is ready; empty list is fine.
      # (The image ships no curl/wget; bash /dev/tcp works but ollama CLI is simpler.)
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # GPU support: uncomment if NVIDIA GPU is available on the host
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  db:
    image: postgres:16-alpine
    container_name: mcp-db
    <<: [*restart-always, *security-hardening]
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Migrations run at startup via docker-entrypoint-initdb.d (only on first init)
      - ./infra/db/migrations:/docker-entrypoint-initdb.d:ro
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/run/postgresql:size=4m,mode=0777
    networks:
      - internal-net      # compliance-checker reaches db here; podman lab
      - proxy-db-net       # F-001: pairwise channel the proxy dials
      - scanner-worker-db-net   # CR-14: pairwise channel scanner-worker dials
    # Not exposed to host — reachable from proxy (proxy-db-net) and
    # compliance-checker (internal-net) only
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-mcp_security}
      - POSTGRES_USER=${DB_USER:-mcp_app}
      # DB_PASSWORD is required — no default to force explicit configuration
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mcp_app} -d ${DB_NAME:-mcp_security}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Vault — production-style: file storage backend, manual init+unseal.
  # Dev mode (in-memory, well-known root token) is enabled ONLY in the
  # podman-compose.lab.yml overlay. Running this base compose without an
  # overlay yields a sealed Vault that requires `vault operator init` and
  # `vault operator unseal` before use — never a well-known root token.
  vault:
    image: hashicorp/vault:1.17
    container_name: mcp-vault
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
        reservations:
          memory: 128m
    environment:
      VAULT_LOCAL_CONFIG: |
        {
          "storage": {"file": {"path": "/vault/data"}},
          "listener": [{
            "tcp": {
              "address": "0.0.0.0:8200",
              "tls_disable": false,
              "tls_cert_file": "/vault/tls/server.crt",
              "tls_key_file":  "/vault/tls/server.key"
            }
          }],
          "ui": false,
          "disable_mlock": true
        }
      # Prevents the entrypoint from calling setcap (which needs CAP_SETFCAP,
      # unavailable in rootless Podman user namespaces)
      VAULT_DISABLE_MLOCK: "1"
    command: vault server -config=/vault/config/local.json
    cap_add:
      - IPC_LOCK
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    volumes:
      - vault-data:/vault/data
      - vault-tls:/vault/tls:ro
    tmpfs:
      - /vault/config:size=8m,mode=0755
      - /tmp:size=16m,mode=1777
    networks:
      - vault-net
    <<: [*security-hardening, *restart-always]
    logging: *default-logging
    healthcheck:
      # TLS listener: skip verify because step-ca root is not in the vault image trust store.
      # vault status exits 0 (active) or 1 (sealed/standby); either means Vault is up.
      # Exit codes 1 and 2 are both acceptable here — we only want to catch hard failures.
      # String form (not list) so podman-compose lab overlay can replace it (list+list concatenates).
      test: "CMD vault status -address=https://localhost:8200 -tls-skip-verify"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: mcp-redis
    <<: [*restart-always, *security-hardening]
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "0.5"
        reservations:
          memory: 64m
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --loglevel notice
    volumes:
      - redis-data:/data
    tmpfs:
      - /tmp:size=16m,mode=1777
    networks:
      - internal-net      # peer/lab compatibility
      - proxy-redis-net    # F-001: pairwise channel the proxy dials
    expose:
      - "6379"
    # Redis Alpine runs as root inside container by default; non-root requires
    # custom image. For production, consider bitnami/redis which supports non-root.
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================================
  # LAYER 3: OBSERVABILITY
  # ============================================================

  loki:
    image: grafana/loki:3.0.0
    container_name: mcp-loki
    <<: [*restart-always, *security-hardening]
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - ./observability/loki/rules:/loki/rules:ro
      - loki-data:/loki
    tmpfs:
      - /tmp:size=64m,mode=1777
    networks:
      - observability-net
    expose:
      - "3100"
    # Loki runs as nobody (65534) in the official image
    user: "10001:10001"
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  promtail:
    image: grafana/promtail:3.0.0
    container_name: mcp-promtail
    <<: [*restart-always, *security-hardening]
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./observability/loki/promtail.yml:/etc/promtail/promtail.yml:ro
      # Docker socket: required for docker_sd_configs log discovery
      # Read-only: promtail only reads container metadata and log streams via API
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /tmp:size=32m,mode=1777
    networks:
      - observability-net
    depends_on:
      loki:
        condition: service_healthy
    logging: *default-logging

  grafana:
    image: grafana/grafana-oss:11.0.0
    container_name: mcp-grafana
    <<: [*restart-always, *security-hardening]
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    tmpfs:
      - /tmp:size=32m,mode=1777
    networks:
      # observability-net: access to Loki datasource
      - observability-net
      # gateway-net: Nginx reverse proxies the Grafana UI (users access via HTTPS)
      - gateway-net
    expose:
      - "3000"
    # Grafana runs as grafana user (472) in the official image
    user: "472:472"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      # GRAFANA_ADMIN_PASSWORD is required — no default to force explicit config
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN:-localhost}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_USERS_ALLOW_SIGN_UP=false
      # Anonymous access disabled in production (INV-009: authentication required)
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      # Disable analytics / telemetry
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      # Alerting contact-point webhook URL (provisioning/alerting/contact-points.yml).
      # Must be non-empty; Grafana rejects provisioning if this is unset.
      # In production, set to your real Slack/PagerDuty webhook in .env.
      - GF_ALERTING_WEBHOOK_URL=${GF_ALERTING_WEBHOOK_URL}
      - GF_ALERTING_WEBHOOK_URL_CRITICAL=${GF_ALERTING_WEBHOOK_URL_CRITICAL}
    depends_on:
      loki:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  alertmanager-config-renderer:
    # Init container: renders alertmanager.yml template (${VAR} placeholders)
    # into a shared tmpfs volume before Alertmanager starts.
    # Uses a pre-built image with gettext (envsubst) baked in — NOT the
    # prom/alertmanager busybox image (no envsubst) and NOT a runtime apk add
    # (observability-net is internal: true, no internet access at runtime).
    # Image pinned by digest (alpine:3.20); update with:
    #   podman pull alpine:3.20 && podman inspect --format='{{index .RepoDigests 0}}' alpine:3.20
    build:
      context: ./observability/alertmanager
      dockerfile: Dockerfile.renderer
    image: mcp-alertmanager-renderer:local
    container_name: mcp-alertmanager-renderer
    restart: "no"
    # S4: Do NOT use env_file: [.env] here — that would expose GATEWAY_SHARED_SECRET
    # to a container that only needs webhook URLs.  Only the two vars consumed by
    # entrypoint.sh are injected explicitly.
    environment:
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL}
      - ALERT_WEBHOOK_URL_CRITICAL=${ALERT_WEBHOOK_URL_CRITICAL:-}
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager-template/alertmanager.yml:ro
      - ./observability/alertmanager/entrypoint.sh:/entrypoint.sh:ro
      - alertmanager-rendered:/run/alertmanager
    command: ["/bin/sh", "/entrypoint.sh"]
    networks:
      - observability-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: mcp-alertmanager
    <<: [*restart-always, *security-hardening]
    depends_on:
      alertmanager-config-renderer:
        condition: service_completed_successfully
    command:
      - "--config.file=/run/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      # Rendered config from init container (read-only for uid 65534)
      - alertmanager-rendered:/run/alertmanager:ro
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /alertmanager:size=64m,mode=0777
    networks:
      - observability-net
    expose:
      - "9093"
    # Alertmanager runs as nobody in the official image
    user: "65534:65534"
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  minio:
    # MinIO: S3-compatible WORM object store for audit log archival (INV-007)
    # Must be started before minio-init to allow bucket configuration.
    # TODO @sha256: pin to immutable digest before promoting to staging/prod.
    # Run: docker pull minio/minio:RELEASE.2025-04-22T22-12-26Z && docker inspect --format='{{index .RepoDigests 0}}' minio/minio:RELEASE.2025-04-22T22-12-26Z
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: mcp-minio
    <<: [*restart-always, *security-hardening]
    # --console-address exposes the MinIO web console on :9001 (internal only)
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    tmpfs:
      - /tmp:size=64m,mode=1777
    networks:
      observability-net:
        # Alias so both "minio" (compose DNS) and "mcp-minio" (container name /
        # MINIO_ENDPOINT in .env) resolve to the same container.
        aliases:
          - mcp-minio
    expose:
      - "9000"
      # 9001 (console) is exposed but internal only — not mapped to host in prod
      - "9001"
    environment:
      # Credentials must be set in .env — no defaults (INV-008)
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  minio-init:
    # One-shot container that configures the WORM bucket after MinIO starts.
    # Uses restart: on-failure so it retries if MinIO isn't ready yet.
    # Does NOT use restart: always — it should exit 0 after successful setup.
    # TODO @sha256: pin to immutable digest — keep in sync with minio/minio version.
    # Run: docker pull minio/mc:RELEASE.2025-07-21T05-28-08Z && docker inspect --format='{{index .RepoDigests 0}}' minio/mc:RELEASE.2025-07-21T05-28-08Z
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    container_name: mcp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - observability-net
    # S4: Do NOT use env_file: [.env] — exposes GATEWAY_SHARED_SECRET unnecessarily.
    # Only the vars consumed by setup-minio.sh are injected explicitly.
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_AUDIT_BUCKET=${MINIO_AUDIT_BUCKET:-mcp-audit-archive}
      - MINIO_RETENTION_DAYS=${MINIO_RETENTION_DAYS:-90}
    volumes:
      - ./infra/scripts/setup-minio.sh:/setup-minio.sh:ro
    entrypoint: ["/bin/sh", "/setup-minio.sh"]
    # Retry on failure (e.g., race with MinIO startup) but not on success
    restart: on-failure

  compliance-checker:
    # Daily cron job (02:00 UTC): samples 1000 audit events, checks 10 PII/credential
    # patterns, verifies hash integrity, writes report to PostgreSQL and MinIO.
    # See ARCHITECTURE.md §5.3 (Compliance Report Generation).
    build:
      context: ./observability/compliance-checker
      dockerfile: Dockerfile
    image: mcp-compliance-checker:latest
    container_name: mcp-compliance-checker
    <<: [*restart-always, *security-hardening]
    tmpfs:
      - /tmp:size=32m,mode=1777
    # Non-root user (UID 1001 defined in compliance-checker/Dockerfile)
    user: "1001:1001"
    networks:
      # Reads from PostgreSQL (internal-net)
      - internal-net
      # Writes compliance reports to MinIO (observability-net)
      - observability-net
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    # S4: Do NOT use env_file: [.env] — exposes GATEWAY_SHARED_SECRET unnecessarily.
    # Only the vars consumed by compliance-checker/checker.py are injected explicitly.
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-mcp_security}
      - COMPLIANCE_DB_USER=${COMPLIANCE_DB_USER}
      - COMPLIANCE_DB_PASSWORD=${COMPLIANCE_DB_PASSWORD}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_AUDIT_BUCKET=${MINIO_AUDIT_BUCKET:-mcp-audit-archive}
      - MINIO_COMPLIANCE_ARCHIVE_BUCKET=${MINIO_COMPLIANCE_ARCHIVE_BUCKET:-compliance-archive}
      - MINIO_RETENTION_DAYS=${MINIO_RETENTION_DAYS:-90}
      - AUDIT_LOG_HMAC_KEY=${AUDIT_LOG_HMAC_KEY:-}
      - COMPLIANCE_ALERT_WEBHOOK=${COMPLIANCE_ALERT_WEBHOOK:-}
      - COMPLIANCE_CRON_SCHEDULE=${COMPLIANCE_CRON_SCHEDULE:-0 2 * * *}
      - COMPLIANCE_SAMPLE_SIZE=${COMPLIANCE_SAMPLE_SIZE:-1000}
      - AUDIT_ARCHIVAL_CUTOFF_DAYS=${AUDIT_ARCHIVAL_CUTOFF_DAYS:-90}
      - ENABLE_AUDIT_DELETE_AFTER_ARCHIVE=${ENABLE_AUDIT_DELETE_AFTER_ARCHIVE:-0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    logging: *default-logging

  # ============================================================
  # CR-14 / WP-B1: Isolated scanner worker
  # ============================================================
  # Executes clone + scanner pipeline against UNTRUSTED, submitter-controlled
  # repository content. Structurally cannot write a PASS verdict — see
  # infra/db/migrations/V063__scanner_worker_queue.sql and
  # scanner_worker/README.md for the execution/adjudication split. Holds NO
  # proxy secret (no DB-admin creds, no Vault token, no gateway shared
  # secret) — only its own narrow scanner_worker_app DB role and its own
  # git clone token(s).
  scanner-worker:
    build:
      context: .
      dockerfile: scanner_worker/Dockerfile
    image: mcp-scanner-worker:latest
    container_name: mcp-scanner-worker
    <<: [*restart-always, *security-hardening]
    # Per-scanner timeouts are enforced in scan_engine.py (clone 120s,
    # trufflehog 180s, pip-audit 120s, mcp_checker/semgrep 300s) — the "time"
    # dimension of the CPU/mem/pids/time resource-limit requirement.
    deploy:
      resources:
        limits:
          memory: 1024m
          cpus: "1.0"
          pids: 256
        reservations:
          memory: 128m
    tmpfs:
      # Read-only root (security-hardening anchor) + writable scratch here
      # only: repo checkouts (tempfile.mkdtemp under /tmp) and scanner
      # scratch state (semgrep HOME, mcp_checker projects-dir). Wiped on
      # every container restart; each job also rm -rf's its own checkout.
      - /tmp:rw,nosuid,size=1024m
    user: "1002:1002"
    networks:
      # DB: pairwise, scanner_worker_app role only (see V063 grants) — no
      # opa/redis/ollama/proxy reachability even if this container is fully
      # compromised by malicious repo content.
      - scanner-worker-db-net
      # Egress: git provider hosts + vuln-feed hosts ONLY, via the same
      # allowlisting squid proxy pattern as lab-mcp-m365
      # (lab/egress-proxy/squid.conf) — see podman-compose.lab.yml for the
      # lab wiring (this network is internal:true / no egress by default;
      # the lab overlay redefines it and attaches lab-egress-proxy).
      - scanner-worker-egress-net
    depends_on:
      db:
        condition: service_healthy
    # No env_file — inject exactly what scan_engine.py/db.py/git_clone.py
    # read. In particular: no GATEWAY_SHARED_SECRET, no VAULT_*, no
    # PLATFORM_SECRETS_*, no other proxy credential.
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-mcp_security}
      - SCANNER_WORKER_DB_USER=${SCANNER_WORKER_DB_USER:-scanner_worker_app}
      - SCANNER_WORKER_DB_PASSWORD=${SCANNER_WORKER_DB_PASSWORD}
      # Read-only, provider-scoped git clone token(s) — the worker's own
      # narrow credential, distinct from proxy's platform_secrets store.
      - GIT_CLONE_TOKEN_GITHUB=${GIT_CLONE_TOKEN_GITHUB:-}
      - GIT_CLONE_TOKEN_BITBUCKET=${GIT_CLONE_TOKEN_BITBUCKET:-}
      - HTTPS_PROXY=http://lab-egress-proxy:3128
      - SCAN_WORKER_POLL_INTERVAL=${SCAN_WORKER_POLL_INTERVAL:-3}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    logging: *default-logging

  # ============================================================
  # PRD-0001 M3: Trust Envelope Labeler Renewal Sidecar
  # ============================================================
  labeler-renewal:
    # Holds sub_ca.key (provisioner credential) and rotates the labeler leaf every 12 min.
    # The proxy mounts labeler-data read-only and can never access sub_ca.key.
    image: python:3.12-slim
    container_name: mcp-labeler-renewal
    restart: unless-stopped
    command: >
      sh -c "pip install cryptography --quiet --no-cache-dir &&
             python3 /scripts/renew-labeler-leaf.py"
    volumes:
      - labeler-data:/labeler
      - ./infra/pki:/scripts:ro
    environment:
      - LABELER_PKI_DIR=/labeler
      - LABELER_LEAF_TTL_MINUTES=15
      - LABELER_RENEWAL_INTERVAL_SECONDS=720
    networks:
      - observability-net
    profiles:
      - trust-envelope
    logging: *default-logging

# Docker Secrets — secret values are injected as files, not plain env vars (INV-008)
# step_ca_password: the provisioner password for step-ca ACME provisioner
# Written to ~/.mcp/step-ca-password (mode 0600, dir 0700) by `make up` / `make dev-up`
# from STEP_CA_PROVISIONER_PASSWORD in .env. Using file: source (not environment:) for
# podman-compose compatibility — v1.6+ does not support the environment source for runtime secrets.
secrets:
  step_ca_password:
    file: ${HOME}/.mcp/step-ca-password

name: mcp-security-platform

# Production-like Docker Compose configuration.
# For local development overrides (hot reload, debug ports), use docker-compose.dev.yml.
# Start:             docker compose up -d
# Start with dev:    docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Security properties enforced here:
#   INV-007: MinIO WORM via minio-init (Object Lock configured at bucket creation)
#   INV-008: All secrets from .env or Docker secrets — never hardcoded
#   INV-009: mTLS enforced at gateway; proxy is not exposed to host
#   INV-012: OPA bundle signing enabled in production (ENVIRONMENT=production)
#
# Network topology (ARCHITECTURE.md §10.1):
#   gateway-net:       gateway <-> proxy (and grafana for dashboard proxy)
#   internal-net:      opa, ollama, db, redis, compliance-checker (internal: true)
#                      — proxy is NOT here (F-001); backends peer + podman lab
#   proxy-{opa,ollama,redis,db}-net: dedicated pairwise proxy<->backend (F-001)
#   observability-net: loki, promtail, grafana, alertmanager, minio, compliance-checker (internal: true)
#                      — proxy NOT here (F-001); audit ships stdout->Promtail
#   step-ca-net:       gateway, step-ca, proxy (internal: true)

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

x-restart-policy: &restart-always
  restart: always

# Shared security hardening applied to all non-gateway containers.
# Gateway (Nginx) cannot be fully read-only because it writes PID files and temp files;
# those services get tmpfs mounts instead of read_only: true.
# read_only: true pairs with tmpfs mounts on /tmp (already present per service) so
# containers have no writable layer outside declared tmpfs/volume mounts.
x-security-hardening: &security-hardening
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

networks:
  # External-facing bridge — only gateway and grafana (for dashboard proxy) are here
  gateway-net:
    driver: bridge

  # Internal service mesh — no external access; processes talk service-to-service
  internal-net:
    driver: bridge
    internal: true

  # Observability pipeline — internal; Grafana bridges to gateway-net for UI
  observability-net:
    driver: bridge
    internal: true

  # CA network — step-ca is on this isolated network
  step-ca-net:
    driver: bridge
    internal: true

  # Vault network — isolated from all other services; only the proxy reaches Vault
  vault-net:
    driver: bridge
    internal: true

  # F-001: dedicated pairwise proxy<->backend networks. The proxy is NOT on
  # the flat internal-net mesh, so a compromised sidecar (opa/ollama/redis/db)
  # can no longer reach proxy:8000 to forge an identity. Each backend keeps
  # internal-net (podman lab + peer comms) and additionally joins exactly the
  # one pairwise net the proxy dials it on.
  proxy-opa-net:
    driver: bridge
    internal: true
  proxy-ollama-net:
    driver: bridge
    internal: true
  proxy-redis-net:
    driver: bridge
    internal: true
  proxy-db-net:
    driver: bridge
    internal: true

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  loki-data:
    driver: local
  minio-data:
    driver: local
  grafana-data:
    driver: local
  ollama-models:
    driver: local
  # opa-policies is bind-mounted from ./policies/rego — not a named volume —
  # so OPA always loads the current policy files from the repo checkout.
  step-ca-data:
    driver: local
  vault-data:
    driver: local
  vault-tls:
    driver: local

services:

  # ============================================================
  # LAYER 1: GATEWAY
  # ============================================================

  gateway:
    # owasp/modsecurity-crs:nginx-alpine includes Nginx 1.25 + ModSecurity 3 + OWASP CRS
    # TODO @sha256: pin to immutable digest before promoting to staging/prod.
    # Run: docker pull owasp/modsecurity-crs:4.25-nginx-alpine-lts && docker inspect --format='{{index .RepoDigests 0}}' owasp/modsecurity-crs:4.25-nginx-alpine-lts
    image: owasp/modsecurity-crs:4.25-nginx-alpine-lts
    container_name: mcp-gateway
    <<: [*restart-always, *security-hardening]
    ports:
      # GATEWAY_HTTP_PORT / GATEWAY_HTTPS_PORT default to 80/443 (production).
      # Rootless Podman labs set these to 8088/8443 in .env.lab to avoid
      # binding privileged ports on the host.
      - "${GATEWAY_HTTP_PORT:-80}:80"
      - "${GATEWAY_HTTPS_PORT:-443}:443"
    volumes:
      - ./gateway/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway/nginx/conf.d:/etc/nginx/conf.d:ro
      # ModSecurity custom MCP rules (base CRS rules provided by image)
      - ./gateway/modsecurity:/etc/modsecurity.d/custom:ro
      # TLS server cert + CA cert from step-ca (read-only; step-ca owns this volume)
      - step-ca-data:/etc/nginx/certs:ro
    tmpfs:
      # Nginx needs writable /tmp for proxy temp files, body buffers, and PID
      - /tmp:size=64m,mode=1777
      - /var/cache/nginx:size=64m,mode=0755
      - /var/run:size=4m,mode=0755
      # ModSecurity CRS image creates /etc/nginx/modsecurity.d at runtime
      - /etc/nginx/modsecurity.d:size=16m,mode=0777
    networks:
      - gateway-net
      - step-ca-net
    depends_on:
      proxy:
        condition: service_healthy
      step-ca:
        condition: service_healthy
    environment:
      - NGINX_CLIENT_MAX_BODY_SIZE=${NGINX_CLIENT_MAX_BODY_SIZE:-10m}
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  step-ca:
    # Smallstep step-ca: internal CA for mTLS client/server certificates (INV-010)
    # TODO @sha256: pin to immutable digest before promoting to staging/prod.
    # Run: docker pull smallstep/step-ca:0.27.4 && docker inspect --format='{{index .RepoDigests 0}}' smallstep/step-ca:0.27.4
    image: smallstep/step-ca:0.27.4
    container_name: mcp-step-ca
    <<: [*restart-always, *security-hardening]
    # step-ca binary uses filesystem capabilities; rootless Podman requires
    # full cap set + no-new-privileges:false to exec it on macOS/Linux VM.
    # Safe: step-ca is only on step-ca-net (internal-only, no external exposure).
    security_opt:
      - no-new-privileges:false
    cap_drop: []
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
    volumes:
      - step-ca-data:/home/step
      - ./gateway/step-ca:/scripts:ro
    tmpfs:
      - /tmp:size=16m,mode=1777
    networks:
      - step-ca-net
    environment:
      - DOCKER_STEPCA_INIT_NAME=MCP Security Platform CA
      - DOCKER_STEPCA_INIT_DNS_NAMES=step-ca,localhost
      - DOCKER_STEPCA_INIT_PROVISIONER_NAME=${STEP_CA_PROVISIONER_NAME}
      # Password is injected as a Docker secret — not a plain env var (INV-008)
      - DOCKER_STEPCA_INIT_PASSWORD_FILE=/run/secrets/step_ca_password
      # INV-010: Maximum TTL is 24h — enforced in CA provisioner config
      - STEP_CA_MAX_TLS_DURATION=${STEP_CA_MAX_TLS_DURATION:-24h}
    secrets:
      - step_ca_password
    logging: *default-logging
    healthcheck:
      # step health check against the CA's own HTTPS endpoint
      test: ["CMD", "step", "ca", "health", "--ca-url", "https://localhost:9000",
             "--root", "/home/step/certs/root_ca.crt"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ============================================================
  # LAYER 2: SECURITY PROXY
  # ============================================================

  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
      target: production
    image: mcp-security-proxy:latest
    container_name: mcp-proxy
    <<: [*restart-always, *security-hardening]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    # Not exposed to host — only reachable from gateway via gateway-net
    expose:
      - "8000"
    volumes:
      # OPA policies bind-mounted read-only (git is the source of truth)
      - ./policies/rego:/app/policies:ro
    tmpfs:
      - /tmp:size=64m,mode=1777
    # Non-root user (UID 1001 defined in proxy/Dockerfile)
    user: "1001:1001"
    networks:
      # F-001: inbound ONLY via gateway-net (gateway + grafana + proxy).
      # NOT on internal-net — sidecars cannot reach proxy:8000 anymore.
      - gateway-net
      # F-001: proxy is NOT on observability-net. Audit events ship via
      # stdout -> Promtail (docker_sd_configs / docker.sock), not a network
      # push, and proxy makes no call to loki/minio/alertmanager. Removing
      # it stops compliance-checker (also on observability-net) from being
      # able to reach proxy:8000.
      - step-ca-net         # cert issuance
      - vault-net           # KMS master secret (pairwise)
      - proxy-opa-net       # policy eval egress (pairwise)
      - proxy-ollama-net    # LLM risk scoring egress (pairwise)
      - proxy-redis-net     # rate/session/cache egress (pairwise)
      - proxy-db-net        # persistence egress (pairwise)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_started
    env_file:
      - .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  opa:
    # OPA 0.63+ static binary image (no shell, minimal attack surface)
    image: openpolicyagent/opa:0.63.0-static
    container_name: mcp-opa
    <<: [*restart-always, *security-hardening]
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-format=json"
      - "--log-level=info"
      - "--set=decision_logs.console=true"
      # INV-012: signed-only runtime policy is now the DEFAULT (HS256 symmetric,
      # identical to scripts/sign_policy_bundle.sh — no crypto-scheme change).
      # OPA verifies .signatures.json at load time AND on every bundle refresh,
      # refusing any unsigned or tampered bundle.
      # Development uses docker-compose.dev.yml which overrides with the
      # read-only directory mount (watch mode, no signature — permitted by INV-012
      # for ENVIRONMENT=development only).
      # Before starting: run `make sign-policy-bundle` to produce bundle.tar.gz.
      - "--verification-key=${POLICY_SIGNING_KEY}"
      - "--verification-key-id=mcp-policy-signing-key-v1"
      - "--signing-alg=HS256"
      - "--scope=write"
      - "--bundle"
      - "/policies/bundle.tar.gz"
    volumes:
      # Signed bundle mounted read-only — produced by `make sign-policy-bundle`.
      # OPA refuses to load if the bundle's .signatures.json does not verify
      # against POLICY_SIGNING_KEY. git is the source of truth for the Rego
      # source; bundle.tar.gz is the signed artefact derived from it.
      - ./policies/bundle.tar.gz:/policies/bundle.tar.gz:ro
    networks:
      - internal-net      # peer/lab compatibility
      - proxy-opa-net      # F-001: pairwise channel the proxy dials
    # SECURITY: OPA must NEVER be exposed to the host network in production.
    # In production: remove port mapping entirely; proxy reaches OPA via proxy-opa-net only.
    # Lab only: expose (not ports:) restricts OPA to container-internal networking only —
    # 127.0.0.1:8181 is NOT accessible from the Mac host with this configuration.
    # If you need host-side debugging in the lab, temporarily add:
    #   ports: ["127.0.0.1:8181:8181"]
    # and remove it immediately after. Never use "0.0.0.0:8181:8181" in any environment.
    expose:
      - "8181"
    # OPA static binary runs as nobody (UID 65534) by default
    user: "65534:65534"
    logging: *default-logging
    healthcheck:
      # OPA 0.63 static binary has no shell, curl, or wget.
      # Health is verified externally via http://localhost:8181/health from the host.
      # The proxy's OPA client retries on connection failure, so no blocking health
      # check is needed here. "NONE" disables the docker-level healthcheck.
      test: ["NONE"]

  ollama:
    # Ollama: local LLM inference for tool risk scoring (air-gapped, no external API)
    # TODO @sha256: pin to immutable digest before promoting to staging/prod.
    # Run: docker pull ollama/ollama:0.9.3 && docker inspect --format='{{index .RepoDigests 0}}' ollama/ollama:0.9.3
    image: ollama/ollama:0.9.3
    container_name: mcp-ollama
    <<: [*restart-always, *security-hardening]
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"
        reservations:
          memory: 512m
    volumes:
      # ollama-models persists downloaded model weights (re-pulling is slow)
      - ollama-models:/root/.ollama
    tmpfs:
      - /tmp:size=256m,mode=1777
    networks:
      - internal-net      # peer/lab compatibility
      - proxy-ollama-net   # F-001: pairwise channel the proxy dials
    expose:
      - "11434"
    environment:
      # Limit parallelism to 2 concurrent requests (risk scoring is not latency-critical)
      - OLLAMA_NUM_PARALLEL=2
      # Keep only 1 model loaded to limit memory footprint
      - OLLAMA_MAX_LOADED_MODELS=1
    logging: *default-logging
    healthcheck:
      # /api/tags returns the list of available models; empty list is OK, 200 means healthy
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # GPU support: uncomment if NVIDIA GPU is available on the host
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  db:
    image: postgres:16-alpine
    container_name: mcp-db
    <<: [*restart-always, *security-hardening]
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Migrations run at startup via docker-entrypoint-initdb.d (only on first init)
      - ./infra/db/migrations:/docker-entrypoint-initdb.d:ro
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/run/postgresql:size=4m,mode=0777
    networks:
      - internal-net      # compliance-checker reaches db here; podman lab
      - proxy-db-net       # F-001: pairwise channel the proxy dials
    # Not exposed to host — reachable from proxy (proxy-db-net) and
    # compliance-checker (internal-net) only
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-mcp_security}
      - POSTGRES_USER=${DB_USER:-mcp_app}
      # DB_PASSWORD is required — no default to force explicit configuration
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mcp_app} -d ${DB_NAME:-mcp_security}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Vault — production-style: file storage backend, manual init+unseal.
  # Dev mode (in-memory, well-known root token) is enabled ONLY in the
  # podman-compose.lab.yml overlay. Running this base compose without an
  # overlay yields a sealed Vault that requires `vault operator init` and
  # `vault operator unseal` before use — never a well-known root token.
  vault:
    image: hashicorp/vault:1.17
    container_name: mcp-vault
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
        reservations:
          memory: 128m
    environment:
      VAULT_LOCAL_CONFIG: |
        {
          "storage": {"file": {"path": "/vault/data"}},
          "listener": [{
            "tcp": {
              "address": "0.0.0.0:8200",
              "tls_disable": false,
              "tls_cert_file": "/vault/tls/server.crt",
              "tls_key_file":  "/vault/tls/server.key"
            }
          }],
          "ui": false,
          "disable_mlock": true
        }
      # Prevents the entrypoint from calling setcap (which needs CAP_SETFCAP,
      # unavailable in rootless Podman user namespaces)
      VAULT_DISABLE_MLOCK: "1"
    command: vault server -config=/vault/config/local.json
    cap_add:
      - IPC_LOCK
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    volumes:
      - vault-data:/vault/data
      - vault-tls:/vault/tls:ro
    tmpfs:
      - /vault/config:size=8m,mode=0755
      - /tmp:size=16m,mode=1777
    networks:
      - vault-net
    <<: [*security-hardening, *restart-always]
    logging: *default-logging
    healthcheck:
      # TLS listener: skip verify because step-ca root is not in the vault image trust store.
      # vault status exits 0 (active) or 1 (sealed/standby); either means Vault is up.
      # Exit codes 1 and 2 are both acceptable here — we only want to catch hard failures.
      test: ["CMD", "vault", "status", "-address=https://localhost:8200", "-tls-skip-verify"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: mcp-redis
    <<: [*restart-always, *security-hardening]
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "0.5"
        reservations:
          memory: 64m
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --loglevel notice
    volumes:
      - redis-data:/data
    tmpfs:
      - /tmp:size=16m,mode=1777
    networks:
      - internal-net      # peer/lab compatibility
      - proxy-redis-net    # F-001: pairwise channel the proxy dials
    expose:
      - "6379"
    # Redis Alpine runs as root inside container by default; non-root requires
    # custom image. For production, consider bitnami/redis which supports non-root.
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================================
  # LAYER 3: OBSERVABILITY
  # ============================================================

  loki:
    image: grafana/loki:3.0.0
    container_name: mcp-loki
    <<: [*restart-always, *security-hardening]
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    tmpfs:
      - /tmp:size=64m,mode=1777
    networks:
      - observability-net
    expose:
      - "3100"
    # Loki runs as nobody (65534) in the official image
    user: "10001:10001"
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  promtail:
    image: grafana/promtail:3.0.0
    container_name: mcp-promtail
    <<: [*restart-always, *security-hardening]
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./observability/loki/promtail.yml:/etc/promtail/promtail.yml:ro
      # Docker socket: required for docker_sd_configs log discovery
      # Read-only: promtail only reads container metadata and log streams via API
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /tmp:size=32m,mode=1777
    networks:
      - observability-net
    depends_on:
      loki:
        condition: service_healthy
    logging: *default-logging

  grafana:
    image: grafana/grafana-oss:11.0.0
    container_name: mcp-grafana
    <<: [*restart-always, *security-hardening]
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    tmpfs:
      - /tmp:size=32m,mode=1777
    networks:
      # observability-net: access to Loki datasource
      - observability-net
      # gateway-net: Nginx reverse proxies the Grafana UI (users access via HTTPS)
      - gateway-net
    expose:
      - "3000"
    # Grafana runs as grafana user (472) in the official image
    user: "472:472"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      # GRAFANA_ADMIN_PASSWORD is required — no default to force explicit config
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN:-localhost}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_USERS_ALLOW_SIGN_UP=false
      # Anonymous access disabled in production (INV-009: authentication required)
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      # Disable analytics / telemetry
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    depends_on:
      loki:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: mcp-alertmanager
    <<: [*restart-always, *security-hardening]
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    env_file:
      - .env
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /alertmanager:size=64m,mode=0777
    networks:
      - observability-net
    expose:
      - "9093"
    # Alertmanager runs as nobody in the official image
    user: "65534:65534"
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  minio:
    # MinIO: S3-compatible WORM object store for audit log archival (INV-007)
    # Must be started before minio-init to allow bucket configuration.
    # TODO @sha256: pin to immutable digest before promoting to staging/prod.
    # Run: docker pull minio/minio:RELEASE.2025-04-22T22-12-26Z && docker inspect --format='{{index .RepoDigests 0}}' minio/minio:RELEASE.2025-04-22T22-12-26Z
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: mcp-minio
    <<: [*restart-always, *security-hardening]
    # --console-address exposes the MinIO web console on :9001 (internal only)
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    tmpfs:
      - /tmp:size=64m,mode=1777
    networks:
      observability-net:
        # Alias so both "minio" (compose DNS) and "mcp-minio" (container name /
        # MINIO_ENDPOINT in .env) resolve to the same container.
        aliases:
          - mcp-minio
    expose:
      - "9000"
      # 9001 (console) is exposed but internal only — not mapped to host in prod
      - "9001"
    environment:
      # Credentials must be set in .env — no defaults (INV-008)
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  minio-init:
    # One-shot container that configures the WORM bucket after MinIO starts.
    # Uses restart: on-failure so it retries if MinIO isn't ready yet.
    # Does NOT use restart: always — it should exit 0 after successful setup.
    # TODO @sha256: pin to immutable digest — keep in sync with minio/minio version.
    # Run: docker pull minio/mc:RELEASE.2025-07-21T05-28-08Z && docker inspect --format='{{index .RepoDigests 0}}' minio/mc:RELEASE.2025-07-21T05-28-08Z
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    container_name: mcp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - observability-net
    env_file:
      - .env
    volumes:
      - ./infra/scripts/setup-minio.sh:/setup-minio.sh:ro
    entrypoint: ["/bin/sh", "/setup-minio.sh"]
    # Retry on failure (e.g., race with MinIO startup) but not on success
    restart: on-failure

  compliance-checker:
    # Daily cron job (02:00 UTC): samples 1000 audit events, checks 10 PII/credential
    # patterns, verifies hash integrity, writes report to PostgreSQL and MinIO.
    # See ARCHITECTURE.md §5.3 (Compliance Report Generation).
    build:
      context: ./observability/compliance-checker
      dockerfile: Dockerfile
    image: mcp-compliance-checker:latest
    container_name: mcp-compliance-checker
    <<: [*restart-always, *security-hardening]
    tmpfs:
      - /tmp:size=32m,mode=1777
    # Non-root user (UID 1001 defined in compliance-checker/Dockerfile)
    user: "1001:1001"
    networks:
      # Reads from PostgreSQL (internal-net)
      - internal-net
      # Writes compliance reports to MinIO (observability-net)
      - observability-net
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - COMPLIANCE_CRON_SCHEDULE=${COMPLIANCE_CRON_SCHEDULE:-0 2 * * *}
      - COMPLIANCE_SAMPLE_SIZE=${COMPLIANCE_SAMPLE_SIZE:-1000}
    logging: *default-logging

# Docker Secrets — secret values are injected as files, not plain env vars (INV-008)
# step_ca_password: the provisioner password for step-ca ACME provisioner
# File is generated at setup time from .env; gitignored via infra/secrets/*
secrets:
  step_ca_password:
    file: ./infra/secrets/step_ca_password

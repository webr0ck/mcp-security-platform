# compose.standard.yml — MCP Security Platform · Tier 2: Standard
#
# Includes engine tier and adds Keycloak (OIDC), Loki, Promtail, Grafana.
# No users by default — create via Keycloak admin console at http://localhost:8082
#
# First-time setup:
#   cp deployments/standard/.env.example .env
#   bash scripts/init-standard.sh
#   docker compose -f compose.standard.yml up -d
#
# Keycloak: http://localhost:8082   Grafana: http://localhost:3000

include:
  - compose.engine.yml

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

networks:
  observability-net:
    driver: bridge
    internal: true

volumes:
  loki-data:
    driver: local
  grafana-data:
    driver: local
  keycloak-data:
    driver: local

services:

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: mcp-keycloak
    command: ["start-dev", "--import-realm"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Note: read_only not applied — Keycloak writes to /opt/keycloak/data (mounted volume)
    tmpfs:
      - /tmp
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_PROXY_CLIENT_SECRET: ${KC_PROXY_CLIENT_SECRET}
      KC_GRAFANA_CLIENT_SECRET: ${KC_GRAFANA_CLIENT_SECRET}
      JAVA_OPTS_KC_HEAP: "-Xms64m -Xmx512m"
    volumes:
      - ./deployments/standard/realm-mcp-standard.json:/opt/keycloak/data/import/realm-mcp.json:ro
      - keycloak-data:/opt/keycloak/data
    ports:
      - "8082:8080"
    networks:
      - gateway-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080 && echo -e \"GET /realms/mcp HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && head -1 <&3 | grep -q 200' && exit 0 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    logging: *default-logging

  keycloak-seeder:
    image: alpine:3.19
    container_name: mcp-keycloak-seeder
    restart: "no"
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./lab/keycloak/seed.sh:/seed.sh:ro
    command: ["sh", "-c", "apk add --no-cache curl jq bash -q && bash /seed.sh"]
    environment:
      KC_URL: http://keycloak:8080
      KC_REALM: mcp
      KC_ADMIN: admin
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_PROXY_CLIENT_SECRET: ${KC_PROXY_CLIENT_SECRET}
      KC_GRAFANA_CLIENT_SECRET: ${KC_GRAFANA_CLIENT_SECRET}
    networks:
      - gateway-net
    logging: *default-logging

  loki:
    image: grafana/loki:3.0.0
    container_name: mcp-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    networks:
      - observability-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    logging: *default-logging

  promtail:
    image: grafana/promtail:3.0.0
    container_name: mcp-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/promtail:/etc/promtail:ro
    networks:
      - observability-net
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  grafana:
    image: grafana/grafana-oss:11.0.0
    container_name: mcp-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Keycloak"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${KC_GRAFANA_CLIENT_SECRET}
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email roles"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "http://localhost:8082/realms/mcp/protocol/openid-connect/auth"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "http://keycloak:8080/realms/mcp/protocol/openid-connect/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "http://keycloak:8080/realms/mcp/protocol/openid-connect/userinfo"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(roles[*], 'grafana-admin') && 'Admin' || 'Viewer'"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - gateway-net
      - observability-net
    depends_on:
      loki:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging: *default-logging

# Pre-commit hooks (ROADMAP P2.5 / INV-008 gap closure).
#
#   pip install pre-commit && pre-commit install
#
# Local hooks call the same tools the CI gate uses, so a developer cannot
# commit a secret or a topology regression that CI would later reject. The
# gate fails closed: a missing tool is a failure, not a skip.
repos:
  - repo: local
    hooks:
      - id: trufflehog-secret-scan
        name: trufflehog secret scan (INV-008)
        entry: "bash -c 'command -v trufflehog >/dev/null 2>&1 || { echo trufflehog-not-installed; exit 1; }; trufflehog git file://. --since-commit HEAD --only-verified --fail'"
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: f001-network-isolation
        name: F-001 proxy network isolation gate
        entry: "python3 scripts/check_network_isolation.py"
        language: system
        pass_filenames: false
        files: '^docker-compose\.ya?ml$'
        stages: [pre-commit]

      - id: rego-deny-by-default
        name: INV-003 OPA deny-by-default present
        entry: "bash -c 'grep -q \"default allow := false\" policies/rego/authz.rego'"
        language: system
        pass_filenames: false
        files: '^policies/rego/'
        stages: [pre-commit]

      - id: dep-audit-python
        name: pip-audit — Python dependency CVE scan
        entry: "bash -c 'command -v pip-audit >/dev/null 2>&1 || { echo pip-audit not installed: pip3 install pip-audit; exit 1; }; cd proxy && pip-audit --progress-spinner off'"
        language: system
        pass_filenames: false
        files: '^proxy/pyproject\.toml$'
        stages: [pre-commit]

      - id: dep-audit-npm
        name: npm audit — UI dependency CVE scan
        entry: "bash -c 'cd ui && npm audit --audit-level=high'"
        language: system
        pass_filenames: false
        files: '^ui/package(-lock)?\.json$'
        stages: [pre-commit]

      - id: dep-audit-grype
        name: grype — manifest CVE scan (pip + npm)
        entry: "bash scripts/dep-audit.sh --skip-images --no-fail-low"
        language: system
        pass_filenames: false
        files: '^(proxy/pyproject\.toml|ui/package-lock\.json)$'
        stages: [pre-push]

      - id: lockfile-present
        name: supply chain — lockfile must exist
        entry: "bash -c 'test -f ui/package-lock.json || { echo ui/package-lock.json missing; exit 1; }'"
        language: system
        pass_filenames: false
        stages: [pre-commit]

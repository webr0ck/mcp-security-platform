# compose.engine.yml — MCP Security Platform · Tier 1: Engine
#
# Minimal installation: gateway + proxy + policy + identity store.
# Bring your own IDP: set OIDC_ENABLED=true + OIDC_ISSUER_URL in .env.
# Admin panel (https://localhost/admin) is local-network only (nginx ACL).
#
# First-time setup:
#   cp deployments/engine/.env.example .env   # fill secrets
#   bash scripts/init-engine.sh               # generates ADMIN_PASSWORD
#   docker compose -f compose.engine.yml up -d
#
# Requires: Docker Compose v2.20+ (include: directive)
name: mcp-security-platform

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

x-restart-policy: &restart-always
  restart: always

x-security-hardening: &security-hardening
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

networks:
  gateway-net:
    driver: bridge
  internal-net:
    driver: bridge
    internal: true
  step-ca-net:
    driver: bridge
    internal: true
  vault-net:
    driver: bridge
    internal: true
  proxy-opa-net:
    driver: bridge
    internal: true
  proxy-redis-net:
    driver: bridge
    internal: true
  proxy-db-net:
    driver: bridge
    internal: true

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  step-ca-data:
    driver: local
  vault-data:
    driver: local
  vault-tls:
    driver: local

services:

  # ── Layer 1: Gateway ───────────────────────────────────────────────────────
  gateway:
    image: owasp/modsecurity-crs:nginx-alpine
    container_name: mcp-gateway
    <<: [*restart-always, *security-hardening]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./gateway/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./gateway/modsecurity:/etc/modsecurity.d/custom:ro
      - step-ca-data:/etc/nginx/certs:ro
    networks:
      - gateway-net
      - step-ca-net
    depends_on:
      step-ca:
        condition: service_healthy
      proxy:
        condition: service_healthy
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    logging: *default-logging

  # ── step-ca: internal mTLS CA ──────────────────────────────────────────────
  step-ca:
    image: smallstep/step-ca:0.26.1
    container_name: mcp-step-ca
    <<: *restart-always
    environment:
      DOCKER_STEPCA_INIT_NAME: MCP Security Platform CA
      DOCKER_STEPCA_INIT_DNS_NAMES: "step-ca,localhost"
      DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT: "true"
      DOCKER_STEPCA_INIT_PASSWORD_FILE: /run/secrets/step_ca_password
    secrets:
      - step_ca_password
    volumes:
      - step-ca-data:/home/step
    networks:
      - step-ca-net
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "step", "ca", "health", "--ca-url=https://step-ca:9000", "--root=/home/step/certs/root_ca.crt"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging

  # ── Layer 2: Security Proxy ────────────────────────────────────────────────
  proxy:
    image: ghcr.io/mcp-security-platform/proxy:latest
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: mcp-proxy
    <<: [*restart-always, *security-hardening]
    env_file: .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
    networks:
      - gateway-net
      - proxy-opa-net
      - proxy-redis-net
      - proxy-db-net
      - vault-net
      - step-ca-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
      vault:
        condition: service_healthy
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging

  # ── OPA: Policy engine ─────────────────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:0.65.0-rootless
    container_name: mcp-opa
    <<: [*restart-always, *security-hardening]
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=info
      - --log-format=json
      - /policies
    volumes:
      - ./policies/rego:/policies:ro
    networks:
      - proxy-opa-net
      - internal-net
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  # ── PostgreSQL: State store ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: mcp-db
    <<: [*restart-always, *security-hardening]
    environment:
      POSTGRES_DB: ${DB_NAME:-mcp_security}
      POSTGRES_USER: ${DB_USER:-mcp_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - internal-net
      - proxy-db-net
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mcp_app}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  # ── Vault: Secrets + credential broker ────────────────────────────────────
  vault:
    image: hashicorp/vault:1.17
    container_name: mcp-vault
    <<: [*restart-always, *security-hardening]
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-change-me-in-production}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    networks:
      - vault-net
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging

  # ── Redis: Session + nonce + rate-limit cache ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mcp-redis
    <<: [*restart-always, *security-hardening]
    command: redis-server --requirepass ${REDIS_PASSWORD} --save ""
    volumes:
      - redis-data:/data
    networks:
      - proxy-redis-net
      - internal-net
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging: *default-logging

secrets:
  step_ca_password:
    file: ./gateway/step-ca/step_ca_password

# compose.engine.yml — MCP Security Platform · Tier 1: Engine
#
# Minimal installation: gateway + proxy + policy + identity store.
# Bring your own IDP: set OIDC_ENABLED=true + OIDC_ISSUER_URL in .env.
# Admin panel (https://localhost/admin) is local-network only (nginx ACL).
#
# First-time setup:
#   cp deployments/engine/.env.example .env   # fill secrets
#   bash scripts/init-engine.sh               # generates ADMIN_PASSWORD
#   docker compose -f compose.engine.yml up -d
#
# Requires: Docker Compose v2.20+ (include: directive)
name: mcp-security-platform

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

x-restart-policy: &restart-always
  restart: always

x-security-hardening: &security-hardening
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

networks:
  gateway-net:
    driver: bridge
  internal-net:
    driver: bridge
    internal: true
  step-ca-net:
    driver: bridge
    internal: true
  vault-net:
    driver: bridge
    internal: true
  proxy-opa-net:
    driver: bridge
    internal: true
  proxy-redis-net:
    driver: bridge
    internal: true
  proxy-db-net:
    driver: bridge
    internal: true

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  step-ca-data:
    driver: local
  vault-data:
    driver: local
  vault-tls:
    driver: local

services:

  # ── Layer 1: Gateway ───────────────────────────────────────────────────────
  gateway:
    # TODO @sha256: pin to immutable digest before promoting to staging/prod.
    # Run: docker pull owasp/modsecurity-crs:4.14.0-nginx-alpine && docker inspect --format='{{index .RepoDigests 0}}' owasp/modsecurity-crs:4.14.0-nginx-alpine
    image: owasp/modsecurity-crs:4.14.0-nginx-alpine
    container_name: mcp-gateway
    <<: [*restart-always, *security-hardening]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./gateway/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./gateway/modsecurity:/etc/modsecurity.d/custom:ro
      - step-ca-data:/etc/nginx/certs:ro
    networks:
      - gateway-net
      - step-ca-net
    depends_on:
      step-ca:
        condition: service_healthy
      proxy:
        condition: service_healthy
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── step-ca: internal mTLS CA ──────────────────────────────────────────────
  step-ca:
    image: smallstep/step-ca:0.26.1
    container_name: mcp-step-ca
    <<: [*restart-always, *security-hardening]
    environment:
      DOCKER_STEPCA_INIT_NAME: MCP Security Platform CA
      DOCKER_STEPCA_INIT_DNS_NAMES: "step-ca,localhost"
      DOCKER_STEPCA_INIT_PROVISIONER_NAME: ${STEP_CA_PROVISIONER_NAME}
      DOCKER_STEPCA_INIT_PASSWORD_FILE: /run/secrets/step_ca_password
      STEP_CA_MAX_TLS_DURATION: ${STEP_CA_MAX_TLS_DURATION:-24h}
    secrets:
      - step_ca_password
    volumes:
      - step-ca-data:/home/step
    networks:
      - step-ca-net
    tmpfs:
      - /tmp
      - /home/step/logs
    healthcheck:
      test: ["CMD", "step", "ca", "health", "--ca-url=https://step-ca:9000", "--root=/home/step/certs/root_ca.crt"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging

  # ── Layer 2: Security Proxy ────────────────────────────────────────────────
  proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile
      target: production
    image: mcp-security-proxy:latest
    container_name: mcp-proxy
    <<: [*restart-always, *security-hardening]
    env_file: .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    # Non-root user (UID 1001 defined in proxy/Dockerfile)
    user: "1001:1001"
    networks:
      - gateway-net
      - proxy-opa-net
      - proxy-redis-net
      - proxy-db-net
      - vault-net
      - step-ca-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
      vault:
        condition: service_healthy
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  # ── OPA: Policy engine ─────────────────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:0.65.0-rootless
    container_name: mcp-opa
    <<: [*restart-always, *security-hardening]
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --authentication=token
      - --authorization=basic
      - --log-level=info
      - --log-format=json
      - --set=decision_logs.console=true
      # INV-012: signed bundle is the default. Run `make sign-policy-bundle`
      # before starting this tier. POLICY_SIGNING_KEY must be set in .env.
      - --verification-key=${POLICY_SIGNING_KEY}
      - --verification-key-id=mcp-policy-signing-key-v1
      - --signing-alg=HS256
      # CR-15 / NOTE: --scope=write removed — see docker-compose.yml's identical
      # comment. `opa build` (the repo's only signing tool) cannot embed a `scope`
      # claim into the bundle signature, so every freshly signed bundle has
      # scope=None and OPA rejected it with "scope mismatch" -> crashloop. This
      # tier had drifted from the base compose's already-applied fix.
      - --bundle
      - /policies/bundle.tar.gz
    volumes:
      # Signed bundle mounted read-only — produced by `make sign-policy-bundle`.
      - ./policies/bundle.tar.gz:/policies/bundle.tar.gz:ro
    networks:
      - proxy-opa-net
    secrets:
      - opa_bearer_token
    environment:
      OPAL_AUTHENTICATION_TOKEN: /run/secrets/opa_bearer_token
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  # ── PostgreSQL: State store ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: mcp-db
    <<: [*restart-always, *security-hardening]
    environment:
      POSTGRES_DB: ${DB_NAME:-mcp_security}
      POSTGRES_USER: ${DB_USER:-mcp_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - internal-net
      - proxy-db-net
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mcp_app} -d ${DB_NAME:-mcp_security}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  # ── Vault TLS init: obtains cert from step-ca before Vault starts ──────────
  vault-tls-init:
    # Pin to explicit version — never use :latest for the TLS cert bootstrap container
    image: smallstep/step-cli:0.26.2
    container_name: mcp-vault-tls-init
    restart: "no"
    command: >
      sh -c "
        step ca certificate vault vault-tls/server.crt vault-tls/server.key
          --ca-url=https://step-ca:9000
          --root=/home/step/certs/root_ca.crt
          --not-after=8760h
          --provisioner=admin 2>/dev/null ||
        echo '[vault-tls-init] cert already exists, skipping'
      "
    volumes:
      - vault-tls:/vault/tls
      - step-ca-data:/home/step:ro
    networks:
      - step-ca-net
    depends_on:
      step-ca:
        condition: service_healthy

  # ── Vault: Secrets + credential broker ────────────────────────────────────
  # Production-style: file storage backend, manual init+unseal.
  # Dev mode (in-memory, well-known root token) is enabled ONLY in the
  # podman-compose.lab.yml overlay. Running this base compose without an
  # overlay yields a sealed Vault that requires `vault operator init` and
  # `vault operator unseal` before use — never a well-known root token.
  vault:
    image: hashicorp/vault:1.17
    container_name: mcp-vault
    <<: [*restart-always, *security-hardening]
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_LOCAL_CONFIG: |
        {
          "storage": {"file": {"path": "/vault/data"}},
          "listener": [{
            "tcp": {
              "address": "0.0.0.0:8200",
              "tls_disable": false,
              "tls_cert_file": "/vault/tls/server.crt",
              "tls_key_file":  "/vault/tls/server.key"
            }
          }],
          "ui": false,
          "disable_mlock": false
        }
    command: ["vault", "server"]
    volumes:
      - vault-data:/vault/data
      - vault-tls:/vault/tls:ro
    networks:
      - vault-net
    depends_on:
      vault-tls-init:
        condition: service_completed_successfully
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "vault", "status", "-address=https://localhost:8200", "-tls-skip-verify"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging

  # ── Redis: Session + nonce + rate-limit cache ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mcp-redis
    <<: [*restart-always, *security-hardening]
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --loglevel notice
    volumes:
      - redis-data:/data
    networks:
      - proxy-redis-net
      - internal-net
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging: *default-logging

secrets:
  step_ca_password:
    file: ./gateway/step-ca/step_ca_password
  opa_bearer_token:
    file: ./infra/secrets/opa-bearer-token

# docker-compose.dev.yml — Development overrides for MCP Security Platform
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   OR via Makefile: make dev-up
#
# What this file changes from production compose:
#   1. Exposes internal ports (db, redis, opa, loki) to host for direct dev access
#   2. Proxy: hot-reload via volume mount + uvicorn --reload
#   3. Gateway: mTLS disabled (ssl_verify_client off) for easier curl testing
#   4. Grafana: anonymous access enabled (no password prompt for dev dashboards)
#   5. OPA: bundle signing disabled (ENVIRONMENT=development, per INV-012)
#   6. Compliance checker: runs every minute instead of daily (faster feedback)
#   7. Vault: dev mode (in-memory, auto-unsealed) — bypasses setcap (CAP_SETFCAP
#      unavailable in rootless Podman user namespaces)
#
# NEVER use this file in staging or production.

services:

  proxy:
    # Vault dev mode: use http + fixed root token (matches vault service override below)
    environment:
      - VAULT_ADDR=http://mcp-vault:8200
      - VAULT_TOKEN=root
      - VAULT_CA_BUNDLE=
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      # RELOAD=true is read by the CMD to enable uvicorn hot-reload
      - RELOAD=true
    # Override OPA dependency condition for dev/lab: OPA static binary has no
    # shell/curl for in-container health checks. Use service_started so compose
    # doesn't block on a health check that can never pass in this image.
    depends_on:
      opa:
        condition: service_started
    build:
      # Development target includes hot-reload, debugpy, dev dependencies
      # Context is project root so the Dockerfile can reach local packages
      # (e.g. observability/mcp-audit-logger) that are not on PyPI.
      context: .
      dockerfile: proxy/Dockerfile
      target: development
    volumes:
      # Bind-mount the full proxy directory for hot-reload.
      # This means code changes reflect immediately without image rebuild.
      # :cached is a macOS performance hint (no-op on Linux).
      - ./proxy:/app:cached
      # Also mount policies for development (already in base compose)
      - ./policies/rego:/app/policies:ro
      # Repo-root-anchored mounts so filesystem unit tests resolve absolute
      # paths. These tests compute `Path(__file__).parents[3]` expecting the
      # host layout `<repo>/proxy/tests/unit/...`; the `./proxy:/app` bind
      # collapses the `proxy/` level, so in-container parents[3] == `/`. Mount
      # `policies/` and `infra/` at `/` so `/policies/...` and `/infra/...`
      # resolve (test-only convenience; read-only).
      - ./policies:/policies:ro
      - ./infra:/infra:ro
      - ./scripts:/scripts:ro
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app
      --log-level debug
    ports:
      # Expose proxy directly for local testing without going through gateway
      - "8000:8000"
      # debugpy: attach VS Code or PyCharm remote debugger on port 5678
      - "5678:5678"

  db:
    # Expose PostgreSQL to host so developers can use psql/pgAdmin/Postico directly
    ports:
      - "5432:5432"
    environment:
      # Allow a simple dev password via env — .env should have DB_PASSWORD set
      - POSTGRES_PASSWORD=${DB_PASSWORD:-devpassword}

  redis:
    # RT-NEW-002: no host port binding — Redis is only reachable from proxy-redis-net.
    # For dev inspection: podman exec mcp-redis redis-cli -a $REDIS_PASSWORD
    labels:
      com.mcp.security-note: "RT-NEW-002: no host port — prevents auth cache injection via LAN"

  opa:
    # RT-005 fix: OPA has no authentication. Binding to 0.0.0.0:8181 lets any
    # network peer read the full grants/policy database without credentials.
    # Restrict to loopback for local Rego development: `curl localhost:8181/...`
    # To open temporarily: override with `ports: ["0.0.0.0:8181:8181"]` in a
    # local docker-compose.override.yml (never commit that file).
    ports:
      - "127.0.0.1:8181:8181"
    # INV-012: development is the only environment where bundle signing is
    # disabled. This override replaces the signed bundle.tar.gz command from
    # docker-compose.yml with an unsigned read-only directory mount so that
    # Rego file changes reload immediately (--watch) without needing to
    # re-sign on every save. NEVER use this override in staging/production.
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-format=json"
      # Debug-level OPA logging shows every policy evaluation — useful for Rego dev
      - "--log-level=debug"
      # INV-002: load OPA config for decision log masking (primary redaction layer).
      - "--config-file=/opa-config/opa-config.yaml"
      - "--set=decision_logs.console=true"
      - "--bundle"
      # Mount to /rego-policies (not /policies) to avoid OCI sub-bind-mount conflict:
      # prod compose mounts bundle.tar.gz INSIDE /policies, which fails when /policies
      # is itself a bind-mount directory.  podman-compose merges volume lists, so we
      # cannot remove the prod mount; instead we use a non-overlapping path here.
      - "/rego-policies"
      # --watch: OPA automatically reloads when policy files change on disk
      - "--watch"
      # Bundle signing DISABLED in development (per INV-012: development is exempt)
      # DO NOT add --verification-key or --signing-alg here
    volumes:
      # Unsigned read-only directory mount for hot-reload development.
      # Uses /rego-policies to avoid collision with the prod bundle.tar.gz mount
      # at /policies/bundle.tar.gz (podman-compose merges both volume lists).
      - ./policies/rego:/rego-policies:ro
      # INV-002: OPA config for decision log masking (primary redaction layer).
      # Separate mount so the config file is available even with the bundle override.
      - ./policies/rego/opa-config.yaml:/opa-config/opa-config.yaml:ro

  ollama:
    # Expose Ollama for direct model testing from host
    ports:
      - "11434:11434"

  grafana:
    ports:
      - "3000:3000"
    environment:
      # Debug logging for Grafana plugin and datasource troubleshooting
      - GF_LOG_LEVEL=debug
      # Allow a dev password; if not set, falls back to 'devpassword'
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-devpassword}
      # Enable anonymous access in dev so developers don't need to log in
      # for dashboard inspection. NEVER enable in staging/production.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer

  loki:
    # Expose Loki for direct LogQL queries from host (e.g., Grafana on host machine)
    ports:
      - "3100:3100"

  alertmanager:
    ports:
      - "9093:9093"

  minio:
    # Expose MinIO API and console for dev inspection
    ports:
      - "9000:9000"
      # MinIO web console — useful for browsing WORM bucket contents in dev
      - "9001:9001"

  vault:
    # Rootless Podman cannot grant CAP_SETFCAP, which the Vault 1.17 Docker
    # entrypoint requires to run `setcap cap_ipc_lock=+ep /bin/vault`.
    # Dev mode: in-memory, auto-unsealed, no TLS, fixed root token.
    # entrypoint + command together replace the prod command completely.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "vault server -dev -dev-root-token-id=root -dev-listen-address=0.0.0.0:8200"
    # Drop all caps so rootless Podman doesn't attempt CAP_SETFCAP
    cap_drop:
      - ALL
    volumes: []
    tmpfs:
      - /root:size=4m,mode=0700
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=root
      - VAULT_ADDR=http://0.0.0.0:8200
      - VAULT_DISABLE_MLOCK=1
      - SKIP_CHOWN=1
      - SKIP_SETCAP=1
    healthcheck:
      # String form matches prod type so podman-compose can merge (list+str errors).
      # vault is in PATH; runs as /bin/sh -c "vault status ..."
      test: "vault status -address=http://localhost:8200"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    ports:
      - "8200:8200"

  compliance-checker:
    environment:
      # Run every minute in dev for rapid feedback during compliance checker development.
      # Production default is "0 2 * * *" (daily at 02:00 UTC).
      - COMPLIANCE_CRON_SCHEDULE=${COMPLIANCE_CRON_SCHEDULE:-* * * * *}
      - LOG_LEVEL=DEBUG

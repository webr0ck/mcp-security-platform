# deployments/poc/wazuh/filebeat.yml
# LOG SHIPPING TLS: ssl.enabled: true is set. For POC, verification_mode: none
# uses opportunistic TLS without cert validation. Production deployments must:
# 1. Generate a CA cert and filebeat client cert from the step-ca service
# 2. Mount them into the filebeat container at /etc/filebeat/certs/
# 3. Change ssl.verification_mode: full
#
# Filebeat sidecar — ships mcp-proxy structured audit logs to Wazuh manager.
#
# Detection rules source of truth: ./detections/*.yml (Sigma format)
# Compiled Wazuh rules (for runtime): loaded by wazuh-manager from
#   deployments/poc/wazuh/rules/ via volume mount.
#
# This config reads Docker container logs via the socket and forwards
# only mcp-proxy events to Wazuh manager on port 5044 (Logstash/Beats protocol).

filebeat.inputs:
  # Rootless Podman stores container logs at
  # ~/.local/share/containers/storage/overlay-containers/<id>/userdata/*.log
  # The host path is mounted at /podman-containers in the filebeat container
  # via the compose.poc.yml filebeat volumes override.
  # Docker path (/var/lib/docker/containers) does NOT exist in a Podman environment.
  - type: log
    paths:
      - /podman-containers/*/userdata/*.log
    json.keys_under_root: true
    json.add_error_key: false
    json.overwrite_keys: true
    processors:
      - decode_json_fields:
          fields: ["message"]
          target: "json"
          overwrite_keys: true
          add_error_key: false

processors:
  - drop_event:
      when:
        not:
          contains:
            container.name: "mcp-proxy"
  - add_fields:
      target: fields
      fields:
        log_type: mcp_audit
        platform: mcp-security-platform
        detection_rules: "detections/*.yml (Sigma)"

output.logstash:
  hosts: ["wazuh-manager:5044"]
  ssl.enabled: true
  ssl.certificate_authorities:
    - /etc/filebeat/certs/ca.crt
  ssl.certificate: /etc/filebeat/certs/filebeat.crt
  ssl.key: /etc/filebeat/certs/filebeat.key
  # For POC: set ssl.verification_mode: none if self-signed certs are used.
  # For production: provide valid CA cert and enable full verification.
  ssl.verification_mode: none

logging.level: warning
logging.to_files: false

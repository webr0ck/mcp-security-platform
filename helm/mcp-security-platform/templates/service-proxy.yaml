apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-security-platform.fullname" . }}-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-security-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
spec:
  type: {{ .Values.proxy.service.type }}
  selector:
    {{- include "mcp-security-platform.proxySelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.proxy.service.port }}
      targetPort: http
      protocol: TCP

# promtail.yml — Promtail scrape configuration for MCP Security Platform
#
# Promtail runs as a sidecar log shipper. It scrapes container stdout logs
# via the Docker socket and ships structured JSON logs to Loki.
#
# Jobs:
#   mcp-proxy       — FastAPI audit events (JSON, rich label extraction)
#   nginx-access    — Nginx structured JSON access logs
#   mcp-compliance  — Compliance checker daily report output
#
# Pipeline stages parse JSON, extract timestamps, and promote key fields to
# Loki labels. Labels are selective — high-cardinality fields (like full
# client_id or tool arguments) are kept as log line content, not labels.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

# Position file tracks read progress; survives container restarts
positions:
  filename: /tmp/promtail-positions.yaml

# Loki push endpoint — Loki is on observability-net, reachable by service name
clients:
  - url: http://loki:3100/loki/api/v1/push
    # Batch log lines for efficiency
    batchwait: 1s
    batchsize: 1048576  # 1 MB batch max

# ─── Scrape configurations ────────────────────────────────────────────────────
scrape_configs:

  # ===========================================================================
  # Job: mcp-proxy
  # Scrapes MCP Security Proxy (FastAPI) stdout logs.
  # Log format: structured JSON emitted by mcp-audit-logger library.
  # Key labels extracted: event_type, outcome, level
  # High-cardinality fields kept in log body: client_id, tool_name, tool_id
  # ===========================================================================
  - job_name: mcp-proxy
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["mcp-proxy"]

    relabel_configs:
      # Only keep logs from the mcp-proxy container
      - source_labels: [__meta_docker_container_name]
        regex: /mcp-proxy
        action: keep

      # Promote container name as a label (useful for multi-instance queries)
      - source_labels: [__meta_docker_container_name]
        target_label: container
        replacement: "$1"

      # Static job label
      - target_label: job
        replacement: mcp-proxy

    pipeline_stages:
      # Parse the outer JSON log line emitted by structlog/mcp-audit-logger
      - json:
          expressions:
            # Extract fields that become labels (low cardinality only)
            event_type: event_type
            outcome: outcome    # ALLOW | DENY | ERROR
            level: level        # info | warning | error
            # Extract fields for timestamp parsing
            timestamp: timestamp
            # High-cardinality fields remain in the log body (not labels)
            # client_id, tool_name, tool_id, request_id are queryable via LogQL

      # Parse timestamp from the log event itself (not Docker daemon timestamp)
      # mcp-audit-logger emits ISO 8601 timestamps in the "timestamp" field
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - "2006-01-02T15:04:05.000Z"

      # Promote selected low-cardinality fields to Loki labels
      # Cardinality rule: labels should have O(10s) not O(1000s) unique values
      - labels:
          event_type:   # e.g. TOOL_INVOCATION, TOOL_REGISTERED, ANOMALY_DETECTED
          outcome:      # ALLOW, DENY, ERROR — always low cardinality
          level:        # info, warning, error, critical

      # Derive log_type=audit for lines that carry an event_type field.
      # Alert rules query {job="mcp-proxy", log_type="audit"} to isolate the
      # structured audit stream from any unstructured proxy stdout noise.
      # The template emits "audit" when event_type was extracted (non-empty),
      # and empty string otherwise; empty label values are dropped by Loki.
      - template:
          source: event_type
          template: '{{ if .Value }}audit{{ end }}'
          output: log_type
      - labels:
          log_type:     # "audit" for structured audit events; absent for other lines

      # Drop health check poll noise from the log stream
      # (proxy emits a log line for every /health/ready probe from Nginx)
      - drop:
          expression: '.*"path":"/health.*".*'

  # ===========================================================================
  # Job: nginx-access
  # Scrapes Nginx gateway structured JSON access logs.
  # Log format: json_access defined in nginx.conf.
  # Labels: status (HTTP status code group), ssl_client_present
  # ===========================================================================
  - job_name: nginx-access
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["mcp-gateway"]

    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /mcp-gateway
        action: keep

      - source_labels: [__meta_docker_container_name]
        target_label: container
        replacement: "$1"

      - target_label: job
        replacement: nginx-access

    pipeline_stages:
      # Parse Nginx json_access format (all fields defined in nginx.conf log_format)
      - json:
          expressions:
            status: status
            request: request
            remote_addr: remote_addr
            ssl_client_s_dn_cn: ssl_client_s_dn_cn
            timestamp: time

      # Derive a low-cardinality status group label (2xx, 3xx, 4xx, 5xx)
      # rather than labelling by individual status code (high cardinality)
      - template:
          source: status
          template: |
            {{ if eq .Value "200" }}2xx
            {{- else if eq .Value "201" }}2xx
            {{- else if eq .Value "204" }}2xx
            {{- else if regexMatch "^2" .Value }}2xx
            {{- else if regexMatch "^3" .Value }}3xx
            {{- else if regexMatch "^4" .Value }}4xx
            {{- else if regexMatch "^5" .Value }}5xx
            {{- else }}unknown
            {{- end }}
          output: status_group

      # Label whether the request was mTLS-authenticated (CN present = yes)
      - template:
          source: ssl_client_s_dn_cn
          template: '{{ if .Value }}mtls{{ else }}no-mtls{{ end }}'
          output: auth_type

      - labels:
          status_group:   # 2xx, 3xx, 4xx, 5xx
          auth_type:      # mtls or no-mtls

      # Drop /health endpoint polls to reduce noise (load balancer probes)
      - drop:
          expression: '.*GET /health.*'

  # ===========================================================================
  # Job: mcp-opa-decisions
  # Scrapes OPA sidecar (mcp-opa) decision log output.
  # OPA emits one structured JSON line per policy decision when started with
  # --set=decision_logs.console=true (set in docker-compose.yml).
  #
  # INV-002 MANDATORY: OPA decision logs include the full policy input in the
  # "input" field, which contains the raw tool params sent by the caller.
  # Params may contain secrets, PII, or other sensitive data.
  # The replace stage below REDACTS the "params" value from every log line
  # before the line is shipped to Loki.  This is a non-negotiable control:
  # Loki is queryable by the auditor role and must never contain raw params.
  #
  # Labels extracted: decision_id (for cross-referencing with audit_events),
  # result_allow (true/false), bundle_revision.
  # ===========================================================================
  - job_name: mcp-opa-decisions
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["mcp-opa"]

    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /mcp-opa
        action: keep

      - source_labels: [__meta_docker_container_name]
        target_label: container
        replacement: "$1"

      - target_label: job
        replacement: mcp-opa-decisions

    pipeline_stages:
      # -----------------------------------------------------------------------
      # INV-002 redaction: strip the raw "params" value from the OPA input
      # before parsing or shipping.  OPA decision log structure:
      #   {"decision_id":"<uuid>","input":{"params":{...},"client_id":"..."},...}
      # We replace the value of the "params" key (any JSON object or primitive)
      # with the literal string "[REDACTED:params]" so the line can be ingested
      # without exposing raw tool arguments.
      #
      # NOTE: This Promtail replace stage is DEFENSE-IN-DEPTH only.
      # The PRIMARY masking layer is OPA-side via decision_logs.mask_paths in
      # policies/rego/opa-config.yaml, which redacts /input/params and
      # /input/arguments before the log line is emitted. This regex is retained
      # as a secondary catch in case the OPA config is absent or bypassed, but
      # it is non-recursive and will not handle deeply nested JSON correctly.
      # -----------------------------------------------------------------------
      - replace:
          expression: '"params"\s*:\s*(\{[^}]*\}|"[^"]*"|\[[^\]]*\]|[^,}]+)'
          replace: '"params":"[REDACTED:params]"'

      # Parse the redacted JSON line to extract label fields.
      - json:
          expressions:
            decision_id: decision_id
            result_allow: result.allow
            bundle_revision: bundles.mcp.revision
            timestamp: timestamp

      # Parse OPA's own timestamp (RFC3339 format).
      - timestamp:
          source: timestamp
          format: RFC3339
          fallback_formats:
            - RFC3339Nano
            - "2006-01-02T15:04:05Z"

      # Promote low-cardinality fields to Loki labels.
      # decision_id has high cardinality but is the primary cross-reference key —
      # kept as a label so analysts can look up by ID in LogQL.
      # result_allow is low cardinality (true/false).
      - labels:
          result_allow:   # true or false — policy outcome

      # Drop OPA startup/health noise (bundle download, server ready, etc.)
      # These lines do not contain "decision_id" and are not policy decisions.
      - drop:
          expression: '.*"decision_id".*'
          invert_match: true

  # ===========================================================================
  # Job: mcp-compliance
  # Scrapes compliance checker cron output.
  # Format: JSON lines with check results.
  # ===========================================================================
  - job_name: mcp-compliance
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
        filters:
          - name: name
            values: ["mcp-compliance-checker"]

    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /mcp-compliance-checker
        action: keep

      - source_labels: [__meta_docker_container_name]
        target_label: container

      - target_label: job
        replacement: mcp-compliance

    pipeline_stages:
      - json:
          expressions:
            level: level
            check_result: check_result   # pass | fail
            category: category           # pii, credentials, hash_integrity, etc.

      - labels:
          level:
          check_result:
          category:

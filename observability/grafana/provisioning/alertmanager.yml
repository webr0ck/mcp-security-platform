# Alertmanager configuration for MCP Security Platform
# All secrets are injected via environment variables.
# See .env.example for required ALERTMANAGER_* variables.

global:
  resolve_timeout: 5m
  smtp_from: "${ALERTMANAGER_EMAIL_FROM}"
  smtp_smarthost: "${ALERTMANAGER_SMTP_HOST}"
  smtp_auth_username: "${ALERTMANAGER_EMAIL_FROM}"

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "default-receiver"

  routes:
    # Critical severity: immediate notification
    - match:
        severity: critical
      group_wait: 10s
      repeat_interval: 1h
      receiver: "critical-receiver"

    # Anomaly alerts: dedicated route
    - match:
        alertname: MCPAnomalyDetected
      group_wait: 30s
      repeat_interval: 4h
      receiver: "security-receiver"

    # Compliance failures: dedicated route
    - match:
        alertname: MCPComplianceCheckFailed
      group_wait: 60s
      repeat_interval: 24h
      receiver: "compliance-receiver"

receivers:
  - name: "default-receiver"
    webhook_configs:
      - url: "${ALERTMANAGER_SLACK_WEBHOOK_URL}"
        send_resolved: true

  - name: "critical-receiver"
    email_configs:
      - to: "${ALERTMANAGER_EMAIL_TO}"
        require_tls: true
    webhook_configs:
      - url: "${ALERTMANAGER_SLACK_WEBHOOK_URL}"
        send_resolved: true

  - name: "security-receiver"
    email_configs:
      - to: "${ALERTMANAGER_EMAIL_TO}"
        require_tls: true

  - name: "compliance-receiver"
    email_configs:
      - to: "${ALERTMANAGER_EMAIL_TO}"
        require_tls: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "instance"]

# Prometheus scrape + alerting config (CR-17 / WP-D1).
#
# Scrapes GET /metrics on the proxy and scanner-worker (see
# proxy/app/routers/metrics.py and scanner_worker/metrics.py). Alert rules
# live in rules.yml (loaded via rule_files below) and fire into the existing
# Alertmanager (mcp-alertmanager:9093, already deployed for Loki-ruler
# alerts — this reuses the same instance rather than standing up a second
# one).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["mcp-alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: mcp-proxy
    metrics_path: /metrics
    static_configs:
      - targets: ["proxy:8000"]
        labels:
          service: proxy

  - job_name: mcp-scanner-worker
    static_configs:
      - targets: ["scanner-worker:9100"]
        labels:
          service: scanner-worker

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus

  # build_worker/metrics.py exists and is unit-tested (mirrors
  # scanner_worker/metrics.py, port 9101) but build_worker/ has no
  # docker-compose service definition yet (WP-B3 Task 1 scope note — the
  # package was never wired into the lab compose stack). No scrape target
  # added here on purpose: a target pointing at a host that will never
  # resolve would just be permanent target-down noise with no fix available
  # until that compose wiring lands. Add a `mcp-build-worker` job here
  # (targets: ["build-worker:9101"]) in the same session that adds the
  # compose service.

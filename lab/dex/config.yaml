# lab/dex/config.yaml — Dex local OIDC provider for MCP Security Platform lab
# Test users: alice@corp (password: labpassword), bob@corp (password: labpassword)
# DO NOT USE IN PRODUCTION — static passwords, dev mode only

issuer: http://localhost:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

logger:
  level: debug
  format: json

oauth2:
  skipApprovalScreen: true
  responseTypes:
    - code

expiry:
  deviceRequests: "5m"
  signingKeys: "6h"
  idTokens: "24h"
  refreshTokens:
    validIfNotUsedFor: "720h"
    absoluteLifetime: "3960h"
    disableRotation: false
    reuseInterval: "3s"

# The proxy registers as this OAuth2 client
staticClients:
  - id: mcp-proxy
    secret: mcp-proxy-secret
    redirectURIs:
      - http://localhost:8000/auth/callback/dex
    name: MCP Security Proxy
    public: false

  # WP-A3/Task-12 (CR-04 remainder): a SECOND external OAuth client, distinct
  # from mcp-proxy above, used ONLY to prove the NEW generic/dynamic
  # external_oauth_user_token dispatcher path (adapters/generic_oauth.py +
  # dynamic_external_oauth.py, server_registry.service_name='dex-external')
  # against Dex acting as a plain second IdP — never touches the legacy
  # static dex.py adapter (service='dex', the mcp-proxy client above, used by
  # the lab-dex-cal/dex-calendar enrollment). Redirect URIs cover both the
  # real gateway HTTPS path (PROXY_BASE_URL) and the container-loopback path.
  - id: mcp-dex-generic
    secret: mcp-dex-generic-secret
    redirectURIs:
      - https://100.119.138.35:8443/auth/callback/dex-external
      - http://localhost:8000/auth/callback/dex-external
    name: MCP Generic External-OAuth Test Client (WP-A3 dynamic path)
    public: false

enablePasswordDB: true

# Static test users — bcrypt cost 10, password: labpassword
# Generated with: htpasswd -nbBC 10 "" labpassword | tr -d ':\n'
# To regenerate: htpasswd -nbBC 10 "" labpassword | tr -d ':\n'
staticPasswords:
  - email: alice@corp
    hash: "$2y$10$cWtDDZtQZci4Gi8A2yg4F.DS.7n9pqscMtrVvXglt9FAaBapjY2fS"
    username: alice
    userID: "alice-uid-00000001"
  - email: bob@corp
    hash: "$2y$10$cWtDDZtQZci4Gi8A2yg4F.DS.7n9pqscMtrVvXglt9FAaBapjY2fS"
    username: bob
    userID: "bob-uid-00000002"

# lab/dex/config.yaml — Dex local OIDC provider for MCP Security Platform lab
# Test users: alice@corp (password: labpassword), bob@corp (password: labpassword)
# DO NOT USE IN PRODUCTION — static passwords, dev mode only

issuer: http://localhost:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

logger:
  level: debug
  format: json

oauth2:
  skipApprovalScreen: true
  responseTypes:
    - code

expiry:
  deviceRequests: "5m"
  signingKeys: "6h"
  idTokens: "24h"
  refreshTokens:
    validIfNotUsedFor: "720h"
    absoluteLifetime: "3960h"
    disableRotation: false
    reuseInterval: "3s"

# The proxy registers as this OAuth2 client
staticClients:
  - id: mcp-proxy
    secret: mcp-proxy-secret
    redirectURIs:
      - http://localhost:8000/auth/callback/dex
    name: MCP Security Proxy
    public: false

enablePasswordDB: true

# Static test users — bcrypt cost 10, password: labpassword
# Generated with: htpasswd -nbBC 10 "" labpassword | tr -d ':\n'
# To regenerate: htpasswd -nbBC 10 "" labpassword | tr -d ':\n'
staticPasswords:
  - email: alice@corp
    hash: "$2y$10$cWtDDZtQZci4Gi8A2yg4F.DS.7n9pqscMtrVvXglt9FAaBapjY2fS"
    username: alice
    userID: "alice-uid-00000001"
  - email: bob@corp
    hash: "$2y$10$cWtDDZtQZci4Gi8A2yg4F.DS.7n9pqscMtrVvXglt9FAaBapjY2fS"
    username: bob
    userID: "bob-uid-00000002"

# Use this file if you need to override specific parts that are not in environment variables

# Exclusion for CRS rule 932260 (Remote Command Execution: Direct Unix Command
# Execution) false-positive on the literal MCP tool/function name 'whoami'.
# The echo MCP server's introspection tool is legitimately named 'whoami'
# (spec H8 — reports caller identity + a redacted credential preview), and
# CRS 932260 pattern-matches that literal string as a shell-injection
# indicator wherever it appears in request args. The tool_name/function-name
# field is platform-controlled (must resolve to an actual row in
# tool_registry via the onboarding/scan/approval pipeline), not free-text
# user input, so excluding just this field from 932260 does not weaken real
# RCE protection. Found via ModSecurity audit log, 2026-07-14.
SecRuleUpdateTargetById 932260 "!ARGS:json.params.arguments.arguments.name"
SecRuleUpdateTargetById 932260 "!ARGS:json.params.arguments.name"

# Fix 9 (2026-07-17): rule 931100 ("Possible Remote File Inclusion (RFI)
# Attack: URL Parameter using IP Address") fires on any http://<ip>/... value
# in ARGS:json.upstream_url -- collides with the legitimate provide-url step
# for a self-hosted MCP server reachable only by IP (e.g. over Tailscale),
# not just by an internal container hostname. upstream_url is already
# SSRF-validated server-side (validate_upstream_url_ssrf() in
# server_onboarding.py, private-CIDR allowlisted) before this field is ever
# trusted, so this exemption is redundant-defense-in-depth being turned off
# for one specific, already-validated field -- not a general RFI bypass.
SecRuleUpdateTargetById 931100 "!ARGS:json.upstream_url"

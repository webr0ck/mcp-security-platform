# Use this file if you need to override specific parts that are not in environment variables

# Field-scoped exemption: rule 932260 (Remote Command Execution: Direct Unix
# Command Execution) false-positives on the literal MCP tool/function name
# 'whoami'. The echo MCP server's introspection tool is legitimately named
# 'whoami' (spec H8). The tool/function-name field is platform-controlled (must
# resolve to a real tool_registry row via onboarding/scan/approval), not
# free-text user input, so excluding just this field does not weaken real RCE
# protection. Found via ModSecurity audit log, 2026-07-14.
SecRuleUpdateTargetById 932260 "!ARGS:json.params.arguments.arguments.name"
SecRuleUpdateTargetById 932260 "!ARGS:json.params.arguments.name"

# Field-scoped exemption: rule 931100 (RFI pattern — "Possible Remote File
# Inclusion Attack: URL Parameter using IP Address") false-positives on any
# legitimate http://<ip>/... value submitted in the submission workflow's
# upstream_url field (self-hosted backends reachable only by private/Tailscale
# IP, not DNS). Scoped narrowly to that one JSON field — does not touch the
# rule for any other parameter. See docs/mcp-onboarding acceptance test §6.1.
SecRuleUpdateTargetById 931100 "!ARGS:json.upstream_url"

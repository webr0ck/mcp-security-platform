# squid.conf — MCP lab egress proxy allowlist
# =============================================================================
# Auditable egress policy for lab MCP servers.
# ONLY the hosts in the allowlist below may be reached via this proxy.
# All other destinations are denied.
#
# This file is the canonical egress policy document. Any change here is a
# security-relevant change and must be reviewed.
#
# Security design: all MCP servers have lab-net internal: false → can reach
# internet. This proxy is the only permitted egress path for services on
# the internal-only mcp-egress-net. Services NOT on mcp-egress-net cannot
# use this proxy.
#
# Task 2.4: lab-mcp-m365 routes Entra / Graph calls through this proxy.
# =============================================================================

# ── Bind ─────────────────────────────────────────────────────────────────────
http_port 3128

# ── ACL: permitted destination domains ────────────────────────────────────────
# Microsoft Entra ID (OAuth token endpoint)
acl allowed_sites dstdomain login.microsoftonline.com
# Microsoft Graph API
acl allowed_sites dstdomain graph.microsoft.com
# Microsoft Graph CDN (certificate revocation + metadata)
acl allowed_sites dstdomain graph.microsoft.com
acl allowed_sites dstdomain manage.office.com

# ── ACL: permitted source networks (mcp-egress-net segment) ───────────────────
# Squid resolves this at connect time; we allow all src inside this proxy.
# Network-level restriction is enforced by compose: only mcp-egress-net
# services can reach this container.
acl mcp_clients src all

# ── Access rules ─────────────────────────────────────────────────────────────
# HTTPS CONNECT is required for TLS endpoints; allow only to allowed_sites
http_access allow mcp_clients allowed_sites
# Deny everything else — default-closed
http_access deny all

# ── Logging ──────────────────────────────────────────────────────────────────
# Log to stdout so Promtail can scrape it
access_log stdio:/proc/self/fd/1 squid

# ── Tuning ───────────────────────────────────────────────────────────────────
# Do not cache — pass-through proxy only
cache deny all
# No DNS prefetch
dns_prefetch 0
# Reduce information leak in error pages
error_detail off

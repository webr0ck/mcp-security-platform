# squid.conf — MCP lab egress proxy allowlist
# =============================================================================
# Auditable egress policy for lab MCP servers.
# ONLY the hosts in the allowlist below may be reached via this proxy.
# All other destinations are denied.
#
# This file is the canonical egress policy document. Any change here is a
# security-relevant change and must be reviewed.
#
# Security design: all MCP servers have lab-net internal: false → can reach
# internet. This proxy is the only permitted egress path for services on
# the internal-only mcp-egress-net. Services NOT on mcp-egress-net cannot
# use this proxy.
#
# Task 2.4: lab-mcp-m365 routes Entra / Graph calls through this proxy.
# CR-14 / WP-B1: scanner-worker routes git-clone + vuln-feed egress through
# this same proxy (scanner-worker-egress-net) — reusing the allowlist
# pattern rather than standing up a second squid instance.
# =============================================================================

# ── Bind ─────────────────────────────────────────────────────────────────────
http_port 3128

# ── Rootless Podman compatibility ─────────────────────────────────────────────
# Container starts as proxy user (uid 13). /run/squid/ is proxy-owned; use it
# for the PID file so squid doesn't need write access to /run/ (root-owned).
pid_filename /run/squid/squid.pid

# ── ACL: permitted destination domains ────────────────────────────────────────
# Microsoft Entra ID (OAuth token endpoint)
acl allowed_sites dstdomain login.microsoftonline.com
# Microsoft Graph API
acl allowed_sites dstdomain graph.microsoft.com
# Microsoft Graph CDN (certificate revocation + metadata)
acl allowed_sites dstdomain graph.microsoft.com
acl allowed_sites dstdomain manage.office.com

# CR-14 / WP-B1: scanner-worker git clone + dependency-vuln feed hosts.
# Exact hosts only — no wildcards. Extend here (with review) if a new
# git provider or vuln feed is enabled in git_providers.
acl allowed_sites dstdomain github.com
acl allowed_sites dstdomain codeload.github.com
acl allowed_sites dstdomain objects.githubusercontent.com
acl allowed_sites dstdomain pypi.org
acl allowed_sites dstdomain files.pythonhosted.org

# CR-12 / WP-B2: multi-ecosystem dependency-CVE scanner layers — each host
# is exactly what its scanner needs at runtime, nothing broader.
#   osv-scanner  -> api.osv.dev (advisory queries), deps.dev (package metadata)
#   npm audit    -> registry.npmjs.org (npm's own audit API)
#   govulncheck  -> proxy.golang.org (module proxy), sum.golang.org (checksum db)
acl allowed_sites dstdomain api.osv.dev
acl allowed_sites dstdomain deps.dev
acl allowed_sites dstdomain registry.npmjs.org
acl allowed_sites dstdomain proxy.golang.org
acl allowed_sites dstdomain sum.golang.org

# T5: lab-mcp-catfacts — real, no-auth, live third-party REST API demo server.
acl allowed_sites dstdomain catfact.ninja

# ── ACL: permitted source networks (mcp-egress-net / scanner-worker-egress-net) ─
# Squid resolves this at connect time; we allow all src inside this proxy.
# Network-level restriction is enforced by compose: only services on
# mcp-egress-net or scanner-worker-egress-net can reach this container.
acl mcp_clients src all

# ── Access rules ─────────────────────────────────────────────────────────────
# HTTPS CONNECT is required for TLS endpoints; allow only to allowed_sites
http_access allow mcp_clients allowed_sites
# Deny everything else — default-closed
http_access deny all

# ── Logging ──────────────────────────────────────────────────────────────────
# Log to stdout so Promtail can scrape it
access_log stdio:/proc/self/fd/1 squid

# ── Tuning ───────────────────────────────────────────────────────────────────
# Do not cache — pass-through proxy only
cache deny all
# Squid 5+: dns_prefetch and error_detail are removed; no replacement needed


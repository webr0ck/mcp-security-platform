# Lab alertmanager config — alerts fire but go to null receiver (no real webhook needed).
# Production config is at observability/alertmanager/alertmanager.yml.
global:
  resolve_timeout: 5m

route:
  receiver: "null"
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: "null"

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "job"]

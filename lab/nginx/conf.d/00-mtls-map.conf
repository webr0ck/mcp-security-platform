# 00-mtls-map.conf — PRD-0006 R-2 (loaded before mcp-proxy-lab.conf, http context)
#
# The modsecurity-crs nginx build (1.30.1) does NOT expose $ssl_client_s_dn_cn
# (verified: "unknown variable"), so extract the CN from $ssl_client_s_dn (which
# it does expose) with a regex, then path-scope it.
#
# $client_cert_cn is the CN pulled from the verified client cert's subject DN.
map $ssl_client_s_dn $client_cert_cn {
    default              "";
    "~CN=(?<cn>[^,/]+)"  $cn;
}

# X-Client-Cert-CN is populated ONLY on the mTLS-required path (/api/v1/tools/);
# "" everywhere else so a client cannot spoof identity by sending the header
# directly or presenting a valid cert on a non-mTLS path (ssl_verify_client
# optional). Mirrors gateway/nginx/nginx.conf:54-57 (adapted for the CN regex).
map $request_uri $client_cert_cn_safe {
    default            "";
    "~^/api/v1/tools/" $client_cert_cn;
}

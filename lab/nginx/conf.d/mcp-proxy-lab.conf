# mcp-proxy-lab.conf — LAB ONLY (rootless Podman / macOS)
#
# Differences from production mcp-proxy.conf:
#   - Uses mkcert cert when lab/nginx/localhost+2.pem exists, otherwise falls
#     back to the OWASP CRS auto-generated self-signed cert.
#   - mTLS disabled (ssl_verify_client off) — no step-ca client CA in lab
#   - X-Client-Cert-CN always empty (no cert to extract CN from)
#
# Production config: gateway/nginx/conf.d/mcp-proxy.conf

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ─── HTTPS vhost ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # Prefer mkcert cert (trusted by browser/Claude Code); fall back to CRS self-signed.
    # Generate with: mkcert localhost 127.0.0.1 localhost
    ssl_certificate     /etc/nginx/lab-certs/server.crt;
    ssl_certificate_key /etc/nginx/lab-certs/server.key;
    # A-02: explicit TLS 1.3 only — don't rely on CRS image default which may allow 1.2.
    ssl_protocols TLSv1.3;

    # PRD-0006 R-2: mTLS agent identity in the lab. step-ca root CA verifies
    # client certs; mTLS is OPTIONAL globally (API-key/OIDC clients present no
    # cert) and only REQUIRED on /api/v1/tools/ (location block below). 'optional'
    # (not optional_no_ca) means a presented cert MUST chain to this CA.
    ssl_client_certificate /etc/nginx/lab-certs/step-ca-root.crt;
    ssl_verify_client optional;

    # Re-resolve upstream DNS on each request so nginx picks up new container IPs
    # after a compose recreate (Podman internal DNS = subnet gateway of gateway-net).
    # 10.89.6.1 is typical for this setup; override NGINX_RESOLVER env var if it differs.
    resolver 10.89.6.1 valid=5s ipv6=off;
    set $upstream_proxy http://proxy:8000;
    # ponytail: KC proxied through HTTPS gateway so SameSite cookies work (no HTTP→HTTPS switch)
    set $upstream_kc http://lab-keycloak:8080;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Request-Id $request_id always;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # Common proxy settings
    proxy_http_version 1.1;
    # $http_host preserves the client's Host INCLUDING the port (e.g. localhost:8443).
    # $host strips the port, which makes the proxy build portless OIDC callback URLs
    # (https://localhost/...) that don't match the :8443 redirect URIs registered
    # in Keycloak/Entra. Keep the port so derived callback URLs are correct.
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id      $request_id;
    # PRD-0006 R-2: forward the mTLS CN ONLY for /api/v1/tools/ (via the map in
    # nginx.conf); "" elsewhere so it cannot be spoofed. The proxy treats
    # X-Client-Cert-CN as authoritative, so the gateway must only populate it on
    # the verified-cert path.
    proxy_set_header X-Client-Cert-CN  $client_cert_cn_safe;
    # Shared gateway secret so the proxy trusts X-Client-Cert-CN (auth.py
    # _is_trusted_proxy, hmac.compare_digest). Generated at lab setup from
    # GATEWAY_SHARED_SECRET into a gitignored include — never hardcoded (INV-008).
    # Wildcard include tolerates absence: if lab/scripts/setup-mtls-lab.sh hasn't
    # run, no secret is sent, the proxy won't trust the CN, and the lab degrades
    # to non-mTLS (OIDC/API-key) behaviour rather than failing to start.
    include /etc/nginx/secrets/*.conf;

    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    30s;

    # Bug fix (bare GET /api/v1/tools): nginx auto-redirects /api/v1/tools ->
    # /api/v1/tools/ (a prefix `location /api/v1/tools/` is defined), and its
    # absolute Location dropped the non-standard :8443 port
    # (https://host/api/v1/tools/ -> lands on :443, broken). absolute_redirect off
    # makes nginx emit a RELATIVE Location (/api/v1/tools/), which the browser
    # resolves against the original request URL, preserving scheme+host+port.
    absolute_redirect off;

    # /api/v1/tools/ — mTLS REQUIRED (PRD-0006 R-2, mirrors prod mcp-proxy.conf).
    # A valid step-ca client cert must be presented; the map in nginx.conf then
    # forwards its CN as X-Client-Cert-CN so the proxy resolves an agent principal.
    location /api/v1/tools/ {
        if ($ssl_client_verify != SUCCESS) {
            return 401 '{"error":"client_certificate_required","message":"mTLS client certificate required for this endpoint"}';
        }
        limit_req zone=api burst=5 nodelay;
        proxy_pass $upstream_proxy;
    }

    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass $upstream_proxy;
    }

    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"gateway","mode":"lab"}';
        add_header Content-Type application/json;
    }

    location /auth/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass $upstream_proxy;
    }

    # MCP streamable-HTTP endpoint — used by Claude Code / MCP clients
    location /mcp {
        limit_req zone=api burst=50 nodelay;
        proxy_pass $upstream_proxy;
        # SSE / streaming support
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # OAuth 2.1 discovery — must be public (no auth), consumed by MCP clients
    location /.well-known/ {
        proxy_pass $upstream_proxy;
        access_log off;
    }

    # RT-001 defence: explicitly deny any request for env/secret/config files
    # that could be served by a development HTTP server running in the project root.
    location ~* "(^|/)\.(env|git|htpasswd|pem|key|crt|p12|pfx)(|\..*)?$" {
        return 403 '{"error":"forbidden"}';
        add_header Content-Type application/json;
    }
    location ~* "\.(env|secret|conf|yml|yaml|json|toml|ini)$" {
        return 403 '{"error":"forbidden"}';
        add_header Content-Type application/json;
    }

    # Keycloak login/auth flows proxied through HTTPS to avoid SameSite cookie issues.
    # modsecurity off: KC is an internal trusted service; WAF rules fire on KC's
    # own form params (e.g. login-actions URLs, state tokens trigger RFI/SQLi rules).
    location /realms/ {
        modsecurity off;
        # nginx add_header does not inherit into a location block that
        # redeclares any add_header of its own — redeclare the others here
        # too, and use SAMEORIGIN (not the server-wide DENY) so Keycloak's
        # own same-origin 3p-cookie-detection iframe
        # (/realms/mcp/protocol/openid-connect/3p-cookies/step1.html, used by
        # the admin console) isn't blocked by our own clickjacking header.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        proxy_pass $upstream_kc;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
        proxy_read_timeout 60s;
    }
    location /resources/ {
        modsecurity off;
        proxy_pass $upstream_kc;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
        access_log off;
        expires 1h;
    }

    # Keycloak admin console (SPA + its REST API). KC_HOSTNAME_STRICT=true is
    # pinned to LAB_GATEWAY_URL (this gateway's own https://host:8443 origin —
    # see podman-compose.lab.yml), so hitting Keycloak's admin console on its
    # directly-exposed port (8082) fails strict-hostname validation and hangs
    # on "Loading the Admin UI" forever. Proxying it through here instead,
    # under the origin KC actually expects, is the fix.
    #
    # Scoped to /admin/mcp/, /admin/master/, /admin/realms/ specifically —
    # NOT a blanket /admin/ — because this proxy's own app already owns
    # /admin/credentials (routers/admin_credentials.py) and a generic
    # /admin/{tab} redirect (routers/lab_links.py); a catch-all /admin/ proxy
    # to Keycloak would silently break both.
    location ~ ^/admin/(mcp|master|realms)/ {
        modsecurity off;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        proxy_pass $upstream_kc;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
        proxy_read_timeout 60s;
    }

    location = / {
        return 302 $scheme://$http_host/portal;
    }

    # Portal UI, static assets, and anything else the proxy serves
    location / {
        limit_req zone=api burst=50 nodelay;
        proxy_pass $upstream_proxy;
    }

    modsecurity on;
    modsecurity_rules_file /etc/modsecurity.d/custom/mcp-jsonrpc-rules.conf;
    # ponytail: lab uses numeric IP host — suppress CRS rule 920350 globally.
    # ponytail: REST API gateway needs PATCH/PUT/DELETE — suppress method enforcement (911100).
    modsecurity_rules 'SecRuleRemoveById 920350';
    modsecurity_rules 'SecRuleRemoveById 911100';
    modsecurity_rules 'SecRule REQUEST_URI "@beginsWith /api/v1/auth/oidc/callback" "id:9001,phase:1,pass,nolog,ctl:ruleRemoveById=931100"';
    # CRS 934110 flags http://localhost callback URIs in OAuth dynamic registration as SSRF,
    # and 931100 (RFI) separately flags the SAME loopback redirect_uri as "URL Parameter
    # using IP Address" (matches 127.0.0.1 literally, not just "localhost"). Native/CLI MCP
    # clients (Codex, etc.) register with a loopback redirect_uri per RFC 8252 — this is
    # spec-compliant, not SSRF/RFI. Without suppressing 931100 too, POST /oauth/register 403s
    # for any client using an IP-literal loopback redirect (e.g. http://127.0.0.1:PORT/callback),
    # which surfaces to the client as "no OAuth support" since it can never get a client_id.
    modsecurity_rules 'SecRule REQUEST_URI "@beginsWith /oauth/register" "id:9002,phase:1,pass,nolog,ctl:ruleRemoveById=934110,ctl:ruleRemoveById=931100"';
    # ponytail: /api/v1/submissions PATCH body contains "injection_mode" (a legitimate business
    # field name). CRS 941/942 rules flag the word "injection" in ARGS. Suppress XSS+SQLi body
    # scanning for this authenticated-only path; application-layer validation handles the input.
    modsecurity_rules 'SecRule REQUEST_URI "@beginsWith /api/v1/submissions" "id:9003,phase:1,pass,nolog,ctl:ruleRemoveByTag=attack-xss,ctl:ruleRemoveByTag=attack-sqli"';
    modsecurity_rules 'SecRule REQUEST_URI "@beginsWith /api/v1/admin/submissions" "id:9004,phase:1,pass,nolog,ctl:ruleRemoveByTag=attack-xss,ctl:ruleRemoveByTag=attack-sqli"';
    # ponytail: /portal/submit wizard HTML contains Python FastAPI code examples that include
    # "raise HTTPException". CRS rule 950150 "ASP.NET exception leakage" false-positives on
    # Python's HTTPException class name, scoring 4 and interrupting the response mid-stream.
    modsecurity_rules 'SecRule REQUEST_URI "@beginsWith /portal/submit" "id:9005,phase:1,pass,nolog,ctl:ruleRemoveById=950150"';
    # CRS 934110 (SSRF: "Cloud provider metadata URL in Parameter") flags any
    # http://127.0.0.1... appearing in ARGS, which fires on the *descriptive text*
    # self-service onboarding tools legitimately carry — a submitter describing
    # their new server's own (often localhost, for local dev/testing) upstream
    # URL in plan_mcp_server's `intent`, submit_mcp_server's `description`, etc.
    # These calls go through the generic /mcp JSON-RPC endpoint (both as a direct
    # tools/call and nested inside invoke_tool's arguments.arguments — the nesting
    # depth varies, so this matches on REQUEST_BODY content rather than a fixed
    # ARGS path). Scoped to requests whose body references one of the known
    # self-service tool names — not a blanket /mcp exemption, since /mcp is the
    # platform's primary invoke channel and most tool bodies should stay scanned.
    # The real network call to the submitted upstream is separately SSRF-guarded
    # at the application layer (proxy/app/services/ssrf.py) when a server is
    # actually invoked — this only concerns onboarding-wizard descriptive fields.
    modsecurity_rules 'SecRule REQUEST_BODY "@rx (plan_mcp_server|submit_mcp_server|get_server_scaffold|check_submission_status)" "id:9006,phase:2,pass,nolog,t:none,ctl:ruleRemoveById=934110"';
}

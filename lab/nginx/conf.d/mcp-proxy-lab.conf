# mcp-proxy-lab.conf — LAB ONLY (rootless Podman / macOS)
#
# Differences from production mcp-proxy.conf:
#   - Uses mkcert cert when lab/nginx/localhost+2.pem exists, otherwise falls
#     back to the OWASP CRS auto-generated self-signed cert.
#   - mTLS disabled (ssl_verify_client off) — no step-ca client CA in lab
#   - X-Client-Cert-CN always empty (no cert to extract CN from)
#
# Production config: gateway/nginx/conf.d/mcp-proxy.conf

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ─── HTTPS vhost ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # Prefer mkcert cert (trusted by browser/Claude Code); fall back to CRS self-signed.
    # Generate with: mkcert localhost 127.0.0.1 203.0.113.10
    ssl_certificate     /etc/nginx/lab-certs/server.crt;
    ssl_certificate_key /etc/nginx/lab-certs/server.key;

    # No CA cert in lab — mTLS not enforced (dev mode, same as ssl_verify_client off)
    ssl_verify_client off;

    # Re-resolve upstream DNS on each request so nginx picks up new container IPs
    # after a compose recreate (Podman internal DNS = subnet gateway of gateway-net).
    # 10.89.6.1 is typical for this setup; override NGINX_RESOLVER env var if it differs.
    resolver 10.89.6.1 valid=5s ipv6=off;
    set $upstream_proxy http://proxy:8000;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Request-Id $request_id always;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # Common proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id      $request_id;
    # No mTLS in lab — CN always blank (proxy falls back to API key / bearer auth)
    proxy_set_header X-Client-Cert-CN  "";
    # RT-NEW-005: gateway shared secret proves this request comes from Nginx, not a direct caller.
    # Must match GATEWAY_SHARED_SECRET in the proxy's environment.
    proxy_set_header X-Gateway-Secret  "${GATEWAY_SHARED_SECRET}";

    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    30s;

    # /api/v1/tools/ — no mTLS enforcement in lab (dev-mode bypass)
    location /api/v1/tools/ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass $upstream_proxy;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass $upstream_proxy;
    }

    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"gateway","mode":"lab"}';
        add_header Content-Type application/json;
    }

    location /auth/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass $upstream_proxy;
    }

    # MCP streamable-HTTP endpoint — used by Claude Code / MCP clients
    location /mcp {
        limit_req zone=api burst=20 nodelay;
        proxy_pass $upstream_proxy;
        # SSE / streaming support
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # OAuth 2.1 discovery — must be public (no auth), consumed by MCP clients
    location /.well-known/ {
        proxy_pass $upstream_proxy;
        access_log off;
    }

    # RT-001 defence: explicitly deny any request for env/secret/config files
    # that could be served by a development HTTP server running in the project root.
    location ~* "(^|/)\.(env|git|htpasswd|pem|key|crt|p12|pfx)(|\..*)?$" {
        return 403 '{"error":"forbidden"}';
        add_header Content-Type application/json;
    }
    location ~* "\.(env|secret|conf|yml|yaml|json|toml|ini)$" {
        return 403 '{"error":"forbidden"}';
        add_header Content-Type application/json;
    }

    location / {
        return 404 '{"error":"not_found"}';
        add_header Content-Type application/json;
    }

    modsecurity on;
    modsecurity_rules_file /etc/modsecurity.d/custom/mcp-jsonrpc-rules.conf;
}

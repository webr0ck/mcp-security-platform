# logging.conf — MCP Security Platform Lab Nginx
#
# The primary access_log directive (json_access format) and error_log are
# defined in the lab nginx.conf at the http{} level. This file must NOT add a
# second access_log to the same path — doing so mixes JSON and legacy
# combined-format lines in /var/log/nginx/access.log, which breaks the
# Promtail JSON pipeline (observability/loki/promtail.yml:124-162).
#
# Any server{} or location{} block overrides belong in the vhost conf files
# (mcp-proxy-lab.conf). No http-level log directives here.
